<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DUEL FIELD — 1103 Hot-Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --bg:#120d08; --bg-2:#161007; --surface:#1e1710; --surface-2:#292015; --surface-3:#352a1b;
  --line:rgba(201,162,75,0.22); --line-hi:rgba(201,162,75,0.45);
  --ink:#f0e7d2; --text-dim:#a2937c;
  --gold:#c9a24b; --gold-hi:#e4c06a; --gold-ink:#14100a;
  --parchment:#e9e4d6; --card-brown:#c9a24b; --card-brown-dk:#a8863d;
  --edge:rgba(201,162,75,0.22); --edge-dk:rgba(201,162,75,0.45);
  --panel:#12141c; --panel-lo:#1a1d28;
  --mon:#d29a3a; --spell:#35b08e; --trap:#9d6ede;
  --mon-normal:#d4b158; --mon-effect:#e08544; --mon-ritual:#6f9ff0;
  --mon-fusion:#a97fe8; --mon-synchro:#ece9e2; --mon-xyz:#8d8d9c;
  --forbidden:#ef6b5e; --limited:#e3a94f; --semi:#74a8ec;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(201,162,75,0.07), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
  font-size:14px; line-height:1.5;
  display:flex; flex-direction:column; height:100dvh; overflow:hidden;
}
h1,h2,h3,.mincho{font-family:"Shippori Mincho",serif}
button{font-family:inherit;color:inherit;cursor:pointer}

/* ---------- top bar ---------- */
/* ---------- 極小ステータスバー（常時表示はこれだけ） ---------- */
.statusbar{
  flex:0 0 auto; display:flex; align-items:center; gap:8px;
  padding:4px 10px; border-bottom:1px solid var(--line);
  background:var(--bg-2); min-height:26px; font-size:11px; overflow:hidden;
}
.sb-turn{font-family:"Shippori Mincho",serif;font-weight:800;font-size:12px;color:var(--gold-hi);white-space:nowrap}
.sb-phase{
  font-size:10.5px;font-weight:700;color:var(--gold-ink);background:var(--gold);
  padding:2px 8px;border-radius:2px;white-space:nowrap;letter-spacing:.04em;
}
.sb-lp{margin-left:auto;display:flex;gap:8px;align-items:center;white-space:nowrap}
.sb-lp b{font-family:"Shippori Mincho",serif;font-size:12px}
.sb-lp .me{color:var(--gold-hi)}
.sb-lp .op{color:var(--text-dim)}
.sb-warn{font-size:10px;font-weight:700;color:#0d0a06;background:var(--spell);
  padding:2px 7px;border-radius:9px;white-space:nowrap;animation:pulse 1.1s ease-in-out infinite}
.sb-warn.trap{background:var(--trap);color:#120a1f}
header{
  display:none;
}
header .brand{font-family:"Shippori Mincho",serif;font-weight:800;letter-spacing:.14em;font-size:15px;color:var(--gold-hi)}
header .brand small{display:block;font-size:9px;letter-spacing:.34em;color:var(--text-dim);font-weight:400;font-family:"Zen Kaku Gothic New"}
header .spacer{flex:1}
.turn-flag{
  font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;
  padding:5px 14px;border:1px solid var(--line-hi);border-radius:2px;
  background:var(--surface-2);letter-spacing:.08em;white-space:nowrap;
}
.turn-flag b{color:var(--gold-hi)}

/* ---------- phase strip ---------- */
.phases{
  flex:0 0 auto; display:flex; align-items:stretch; gap:3px; padding:7px 10px; overflow-x:auto;
  border-bottom:1px solid var(--line); background:var(--bg-2);
}
.phase{
  flex:0 0 auto; padding:7px 12px; font-size:11px; letter-spacing:.04em;
  border:1px solid var(--line); border-radius:4px; background:transparent;
  color:var(--text-dim); white-space:nowrap; display:flex; align-items:center;
}
.phase.on{background:var(--gold);color:var(--gold-ink);border-color:var(--gold-hi);
  font-weight:800;font-size:12px;box-shadow:0 0 12px rgba(201,162,75,0.25)}
.phase.done{color:var(--gold);border-color:var(--edge-dk)}
.phase-next{
  flex:0 0 auto;margin-left:auto;padding:7px 14px;font-size:12px;font-weight:700;white-space:nowrap;
  border:1px solid var(--line-hi);border-radius:4px;background:var(--surface-2);color:var(--gold-hi);
}
.phase-next:active{background:var(--surface-3)}

/* ---------- guide strip（今やるべきこと）---------- */
.guide{
  flex:0 0 auto; display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:7px 2px 0; min-height:30px;
}
.guide .g-phase{
  font-family:"Shippori Mincho",serif; font-weight:800; font-size:13px;
  color:var(--gold-ink); background:var(--gold); border:1px solid var(--gold-hi);
  padding:3px 11px; border-radius:3px; letter-spacing:.06em; white-space:nowrap;
}
.guide .g-can{
  font-size:10.5px; color:var(--gold-hi); border:1px solid var(--edge-dk);
  padding:3px 9px; border-radius:11px; white-space:nowrap; background:rgba(201,162,75,0.06);
}
.guide .g-can.mute{color:var(--text-dim); border-color:var(--line); background:transparent}
.guide .g-chainwarn{
  margin-left:auto; font-size:11px; font-weight:700; color:#0d0a06;
  background:var(--spell); padding:4px 11px; border-radius:12px; white-space:nowrap;
  animation:pulse 1.1s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

/* header menu button */
.hdr-btn{
  width:34px;height:30px;border:1px solid var(--line-hi);border-radius:3px;
  background:var(--surface-2);color:var(--gold-hi);font-size:17px;line-height:1;font-weight:700;
}
.hdr-btn:active{background:var(--surface-3)}

/* ---------- board ---------- */
.board{flex:1 1 auto; overflow-y:auto; padding:6px 8px 2px; display:flex; flex-direction:column; gap:5px}
.side{
  border:1px solid var(--line); border-radius:4px; padding:4px 5px 5px;
  background:linear-gradient(var(--surface),var(--bg-2));
}
.side.opp{border-color:rgba(157,110,222,0.28)}
.side.active-side{border-color:var(--gold-hi);box-shadow:0 0 0 1px var(--gold-hi) inset, 0 0 22px rgba(201,162,75,0.08)}
.side-head{display:flex;align-items:center;gap:6px;margin-bottom:4px;min-height:20px}
.side-name{font-family:"Shippori Mincho",serif;font-weight:700;letter-spacing:.04em;font-size:11px}
.side-tag{font-size:8px;letter-spacing:.18em;color:var(--text-dim)}
.lp-box{margin-left:auto;display:flex;align-items:center;gap:4px}
.lp-val{font-family:"Shippori Mincho",serif;font-weight:800;font-size:15px;min-width:54px;text-align:right;letter-spacing:.02em}
.lp-val.low{color:var(--forbidden)}
.lp-btn{
  width:22px;height:22px;line-height:1;border:1px solid var(--line);border-radius:2px;
  background:var(--surface-2);color:var(--ink);font-size:12px;font-weight:700;
}
.lp-btn:active{background:var(--surface-3)}

.zones{display:flex;flex-direction:column;gap:4px}
.zrow{display:grid;grid-template-columns:16px 1fr;gap:4px;align-items:start}
.zrow .lab{font-size:7.5px;letter-spacing:.02em;color:var(--text-dim);text-align:center;
  writing-mode:vertical-rl;text-orientation:upright;padding-top:2px;justify-self:center}
.slots{display:grid;gap:4px}
.slots.mz,.slots.sz{grid-template-columns:repeat(5,1fr)}
.slots.line5{grid-template-columns:repeat(5,1fr)}
.pile{display:flex;flex-direction:column;align-items:stretch;gap:3px}
.pile .slot{width:100%}
.pile-lab{font-size:7.5px;letter-spacing:.04em;color:var(--text-dim);text-align:center}
.pile-n{
  position:absolute;bottom:2px;right:2px;z-index:4;min-width:16px;text-align:center;
  font-size:9px;font-weight:800;padding:1px 3px;border-radius:8px;
  background:var(--gold-ink);color:var(--gold-hi);border:1px solid var(--edge-dk);
}
.slot{
  aspect-ratio:59/86; border:1px dashed var(--line); border-radius:3px;
  background:rgba(0,0,0,0.18); display:flex;align-items:center;justify-content:center;
  position:relative; overflow:hidden;
}
.slot.field{aspect-ratio:59/86}
.slot .ph{font-size:8px;color:var(--text-dim);letter-spacing:.1em}

/* ---------- card ---------- */
.card{
  width:100%;height:100%;border-radius:3px;position:relative;overflow:hidden;
  border:1px solid var(--edge-dk); background:var(--surface-3);
  display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;
}
.card.def{aspect-ratio:auto}
.card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card .nm{
  position:relative;z-index:2;font-size:8px;line-height:1.15;padding:2px 3px;
  background:linear-gradient(transparent,rgba(0,0,0,0.82));color:var(--parchment);
  max-height:50%;overflow:hidden;font-weight:500;
}
.card.set-mon{transform:rotate(90deg) scale(.92)} /*守備表示は横向き */
.card .badge{
  position:absolute;top:2px;left:2px;z-index:3;font-size:7px;letter-spacing:.06em;
  padding:1px 4px;border-radius:2px;background:var(--gold);color:var(--gold-ink);font-weight:700;
}
.card.k-s .badge{background:var(--spell)}
.card.k-t .badge{background:var(--trap)}
.card.facedown{background:#0d0a06}
.card.facedown img{opacity:.96}

/* ---------- hand ---------- */
.handbar{
  flex:0 0 auto; border-top:1px solid var(--line);
  background:linear-gradient(var(--bg-2),var(--surface));
}
.hand-head{display:flex;align-items:center;gap:8px;padding:7px 12px 0}
.hand-head .who{font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;letter-spacing:.06em;color:var(--gold-hi)}
.hand-head .cnt{font-size:11px;color:var(--text-dim)}
.hand-head .hint{margin-left:auto;font-size:9px;color:var(--text-dim);letter-spacing:.08em}
.hand{display:flex;gap:6px;overflow-x:auto;padding:6px 8px}
.hand .hcard{flex:0 0 60px;aspect-ratio:59/86}
.hand .hcard .nm{font-size:9px}

/* ---------- controls ---------- */
.controls{
  flex:0 0 auto; display:flex; gap:6px; padding:8px 12px;
  border-top:1px solid var(--line); background:var(--bg-2); overflow-x:auto;
}
.btn{
  flex:0 0 auto; padding:9px 14px; border-radius:3px; font-size:12px; font-weight:700;
  letter-spacing:.04em; border:1px solid var(--line-hi); background:var(--surface-2); color:var(--ink);
}
.btn:active{background:var(--surface-3)}
.btn.gold{background:var(--gold);color:var(--gold-ink);border-color:var(--gold-hi)}
.btn.ghost{background:transparent}

/* ---------- log ---------- */
.log{
  flex:0 0 auto; max-height:82px; overflow-y:auto; padding:6px 12px 10px;
  border-top:1px solid var(--line); background:var(--bg); font-size:10.5px; color:var(--text-dim);
}
.log .li{padding:1px 0;border-bottom:1px solid rgba(201,162,75,0.06)}
.log .li b{color:var(--gold-hi);font-weight:700}

/* ---------- modal (bottom sheet) ---------- */
.veil{
  position:fixed;inset:0;background:rgba(6,4,2,0.72);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center;z-index:50;
}
.veil.on{display:flex}
.sheet{
  width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;
  border:1px solid var(--line-hi);border-bottom:none;
  border-radius:14px 14px 0 0;background:linear-gradient(var(--surface),var(--bg-2));
  padding:14px 16px calc(16px + env(safe-area-inset-bottom,0));
  animation:sheetup .18s ease-out;
}
@keyframes sheetup{from{transform:translateY(14px);opacity:.4}to{transform:translateY(0);opacity:1}}
.sheet .grip{width:38px;height:4px;border-radius:2px;background:var(--line-hi);margin:0 auto 12px}
/* card preview header inside sheet */
.sheet-card{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.sheet-thumb{flex:0 0 66px;aspect-ratio:59/86;border-radius:5px;overflow:hidden;
  border:1px solid var(--edge-dk);background:var(--surface-3);position:relative}
.sheet-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sheet-info{flex:1;min-width:0}
.sheet h3{margin:0 0 5px;font-size:16px;letter-spacing:.03em;color:var(--gold-hi);line-height:1.25}
.sheet .meta{font-size:11px;color:var(--text-dim);line-height:1.6}
.sheet .eff{font-size:11.5px;color:var(--ink);background:rgba(0,0,0,0.22);border:1px solid var(--line);
  border-radius:4px;padding:9px 11px;margin-bottom:14px;max-height:130px;overflow-y:auto;white-space:pre-wrap;line-height:1.55}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.act-grid.wide{grid-template-columns:1fr}
.act-label{font-size:9px;letter-spacing:.18em;color:var(--text-dim);margin:14px 2px 7px;text-transform:none}
.act-label:first-of-type{margin-top:0}
.act{padding:13px 10px;border:1px solid var(--line);border-radius:5px;background:var(--surface-2);
  font-size:13px;text-align:center;font-weight:600;min-height:46px;display:flex;align-items:center;justify-content:center}
.act:active{background:var(--surface-3)}
.act.warn{border-color:var(--forbidden);color:var(--forbidden)}
/* chain */
.chain-list{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.chain-link{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:5px;
  border:1px solid var(--line);background:var(--surface-2)}
.chain-link.top{border-color:var(--gold-hi);box-shadow:0 0 10px rgba(201,162,75,0.18)}
.chain-link .cl-no{font-family:"Shippori Mincho",serif;font-weight:800;color:var(--gold-hi);min-width:18px}
.chain-link .cl-nm{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chain-link .cl-ss{font-size:10px;color:var(--spell);font-weight:700}
.chain-link .cl-who{font-size:9px;color:var(--text-dim);letter-spacing:.06em}
.chain-badge{display:inline-block;min-width:16px;text-align:center;font-size:10px;font-weight:800;
  padding:1px 5px;border-radius:8px;background:var(--spell);color:#0d0a06;margin-left:5px}
.sheet .close{margin-top:14px;width:100%;padding:14px;text-align:center;background:transparent;
  border:1px solid var(--line);border-radius:6px;color:var(--text-dim);font-size:13px;font-weight:600}

textarea{
  width:100%;min-height:120px;background:rgba(0,0,0,0.28);border:1px solid var(--line);
  border-radius:3px;color:var(--ink);font-family:"Zen Kaku Gothic New";font-size:12px;padding:10px;resize:vertical;
}
.sub{font-size:10px;color:var(--text-dim);margin:6px 0 2px;letter-spacing:.04em}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tab-title{font-size:10px;letter-spacing:.2em;color:var(--text-dim);margin:2px 0 8px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* ---------- このターンにやったこと ---------- */
.turnlog{
  flex:0 0 auto; display:flex; gap:5px; align-items:center; overflow-x:auto;
  padding:5px 2px 0; min-height:26px;
}
.turnlog .tl-lab{font-size:9px;letter-spacing:.16em;color:var(--text-dim);white-space:nowrap;flex:0 0 auto}
.turnlog .tl-chip{
  flex:0 0 auto; font-size:10.5px; color:var(--ink); background:var(--surface-2);
  border:1px solid var(--line); border-radius:11px; padding:3px 10px; white-space:nowrap;
}
.turnlog .tl-empty{font-size:10px;color:var(--text-dim)}

/* ---------- collapsible log ---------- */
.logwrap{display:none}
.log-toggle{
  width:100%; text-align:left; padding:5px 2px; font-size:10px; letter-spacing:.06em;
  color:var(--text-dim); background:transparent; border:none;
}
.log-toggle:active{color:var(--gold-hi)}
.log{max-height:120px}

/* ---------- 下部ドック（既定は折りたたみ） ---------- */
.dock{
  flex:0 0 auto; border-top:1px solid var(--line-hi);
  background:linear-gradient(var(--surface),var(--bg-2));
  padding:5px 8px calc(5px + env(safe-area-inset-bottom,0));
  display:flex; flex-direction:column; gap:5px;
  box-shadow:0 -6px 18px rgba(0,0,0,0.35);
}
/* 常時見える1行 */
.dock-bar{display:flex; align-items:stretch; gap:5px}
/* 展開時のみ出る詳細 */
.dock-body{display:flex; flex-direction:column; gap:5px; overflow:hidden;
  max-height:50dvh; transition:max-height .18s ease, opacity .18s ease, margin .18s ease; opacity:1}
.dock.collapsed .dock-body{max-height:0; opacity:0; margin:0; pointer-events:none}
.dock-actions{display:flex; align-items:stretch; gap:5px}
/* 展開ハンドル */
.d-more{
  flex:0 0 auto; min-width:42px; padding:10px 8px; border-radius:5px; font-size:15px; line-height:1;
  border:1px solid var(--line-hi); background:var(--surface-2); color:var(--gold-hi);
  display:flex; align-items:center; justify-content:center;
}
.d-more:active{background:var(--surface-3)}

/* フェーズ行：戻る / 現在フェーズ表示 / 進む */
.d-prev,.d-next{
  flex:0 0 auto; min-width:56px; padding:11px 12px; border-radius:5px; font-size:12px; font-weight:700;
  border:1px solid var(--line-hi); background:var(--surface-2); color:var(--ink);
  display:flex; align-items:center; justify-content:center; letter-spacing:.03em;
}
.d-prev:active,.d-next:active{background:var(--surface-3)}
.d-next.primary{
  flex:1 1 auto; background:var(--gold); color:var(--gold-ink); border-color:var(--gold-hi);
  font-size:14px; font-weight:800; letter-spacing:.05em; min-height:48px;
  box-shadow:0 0 14px rgba(201,162,75,0.2);
}
.d-next.endturn{background:var(--surface-2);color:var(--gold-hi);border-color:var(--line-hi)}
.d-phase-cur{
  flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border:1px solid var(--line); border-radius:5px; background:rgba(201,162,75,0.05);
  padding:4px 8px; min-width:0;
}
.d-phase-cur .cur{font-family:"Shippori Mincho",serif;font-weight:800;font-size:14px;color:var(--gold-hi);letter-spacing:.06em}
.d-phase-cur .nxt{font-size:9px;color:var(--text-dim);letter-spacing:.06em;margin-top:1px}

/* アクション行 */
.d-act{
  flex:1 1 0; min-width:0; padding:11px 6px; border-radius:5px; font-size:12px; font-weight:700;
  border:1px solid var(--line); background:var(--surface-2); color:var(--ink);
  display:flex; align-items:center; justify-content:center; gap:4px; min-height:46px; letter-spacing:.02em;
}
.d-act:active{background:var(--surface-3)}
.d-act.gold{background:var(--gold);color:var(--gold-ink);border-color:var(--gold-hi)}
.d-act.undo{color:var(--gold-hi);border-color:var(--line-hi)}
.d-act:disabled{opacity:.34}
.d-act .kb{font-size:10px;font-weight:800;padding:1px 6px;border-radius:9px;background:var(--spell);color:#0d0a06}

/* チェーン解決の強調表示 */
.chain-link.resolving{border-color:var(--spell);box-shadow:0 0 12px rgba(53,176,142,0.3);background:rgba(53,176,142,0.08)}
.chain-next-hint{
  font-size:12px;font-weight:700;color:var(--spell);text-align:center;
  padding:8px;margin:2px 0 8px;border:1px dashed var(--spell);border-radius:5px;background:rgba(53,176,142,0.06);
}
.chain-link .cl-tag{font-size:9px;color:var(--text-dim);letter-spacing:.04em;margin-left:4px}

/* battle step sheet */
.bt-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 12px;
  font-family:"Shippori Mincho",serif;font-size:15px}
.bt-row .vs{color:var(--text-dim);font-size:12px}
.bt-row .a-atk{color:var(--mon-effect);font-weight:800}
.bt-row .a-def{color:var(--spell);font-weight:800}
.bt-outcome{font-size:12px;text-align:center;color:var(--gold-hi);margin-bottom:10px}

/* ---------- LP 計算機 ---------- */
.lp-val{border:none;background:transparent;padding:2px 4px;border-radius:3px}
.lp-val:active{background:var(--surface-3)}
.lp-now{font-size:11.5px;color:var(--text-dim);margin-bottom:10px}
.lp-now b{color:var(--gold-hi);font-size:14px;font-family:"Shippori Mincho",serif}
.lp-prev{color:var(--forbidden);font-weight:700}
.lp-prev.up{color:var(--spell)}
.lp-display{
  font-family:"Shippori Mincho",serif;font-weight:800;font-size:30px;text-align:right;
  padding:10px 14px;border:1px solid var(--line-hi);border-radius:6px;
  background:rgba(0,0,0,0.3);color:var(--gold-hi);margin-bottom:10px;letter-spacing:.04em;
}

<body>

<!-- 盤面が主役。上部の常時表示は極小のステータスバー1本だけ -->

<div class="board" id="board"></div>

<!-- チェーンは積まれている間ずっと見える -->

  <div class="hand" id="hand"></div>
</div>

<!-- ===== 下部ドック：既定は折りたたみ。タップで展開 ===== -->
<div class="dock collapsed" id="dock">
  <!-- 常時見えるのはこの1行だけ（フェーズ＋次へ＋戻す） -->
  <div class="dock-bar" id="dockBar"></div>
  <!-- 展開時に出る詳細 -->
  <div class="dock-body" id="dockBody">
    <div class="dock-actions" id="dockActions"></div>
    <div class="guide" id="guide"></div>
    <div class="turnlog" id="turnlog"></div>
    <button class="log-toggle" id="logToggle" onclick="toggleLog()">ログを開く ▾</button>
    <div class="log" id="log" hidden></div>
  </div>
</div>

<!-- action modal -->
<div class="veil" id="veil"><div class="sheet" id="sheet"></div></div>

<script>
/* =========================================================================
   DUEL FIELD — 2人ホットシート対戦アプリ（土台）
   全状態は gameState に集約。applyAction(gameState, action) だけが状態を変更する。
   描画は render() が gameState を読むだけ（DOM から状態を書き換えない）。
   → 将来: action を相手に送り、双方が同じ applyAction を実行すればオンライン対戦化できる。
   ========================================================================= */

/* ---- ダミーカードデータ（起動時に index.html の完全版へ差し替わる）----
   実データは boot() が index.html の <script id="carddata"> から読み込む。
   各カード: {n,k,atk,def,lv,ra,at,st,ex,sub,e,c,lm?}
*/
const DUMMY_DB = [
  {n:"サイバー・ドラゴン", k:"m", atk:2100, def:1600, lv:5, ra:"機械", at:"光", st:["効果"], ex:false, sub:"", e:"相手フィールドにのみモンスターが存在する場合、このカードはリリースなしで召喚できる。", c:"70095154"},
  {n:"死者蘇生", k:"s", ra:"", at:"", st:[], ex:false, sub:"", e:"自分または相手の墓地のモンスター1体を対象として発動できる。そのモンスターを自分フィールドに特殊召喚する。", c:"83764718"},
  {n:"聖なるバリア －ミラーフォース－", k:"t", ra:"", at:"", st:[], ex:false, sub:"", e:"相手モンスターの攻撃宣言時に発動できる。相手フィールドの攻撃表示モンスターを全て破壊する。", c:"44095762"},
  {n:"E・HERO エアーマン", k:"m", atk:1800, def:300, lv:4, ra:"戦士", at:"風", st:["効果"], ex:false, sub:"", e:"このカードが召喚に成功した時、以下の効果から1つを選択して発動できる。①自分フィールドのHEROの数まで相手にダメージ。②デッキからHEROモンスター1体を手札に加える。", c:"22103890"},
  {n:"増殖するG", k:"m", atk:500, def:200, lv:2, ra:"昆虫", at:"地", st:["効果"], ex:false, sub:"", e:"このカードを手札から捨てて発動できる。このターン、相手が特殊召喚するたびに自分は1枚ドローする。", c:"90953320"},
  {n:"灰流うらら", k:"m", atk:0, def:1800, lv:3, ra:"アンデット", at:"炎", st:["チューナー","効果"], ex:false, sub:"", e:"デッキから手札・墓地・フィールドに加える効果、特殊召喚する効果を無効にする。", c:"14558127"},
  {n:"サンダー・ボルト", k:"s", ra:"", at:"", st:[], ex:false, sub:"", e:"相手フィールドのモンスターを全て破壊する。", c:"71413901"},
  {n:"激流葬", k:"t", ra:"", at:"", st:[], ex:false, sub:"", e:"モンスターが召喚・反転召喚・特殊召喚された時に発動できる。フィールドのモンスターを全て破壊する。", c:"90351981"},
  {n:"ブラック・ホール", k:"s", ra:"", at:"", st:[], ex:false, sub:"", e:"フィールドのモンスターを全て破壊する。", c:"83764719"},
  {n:"サイクロン", k:"s", ra:"", at:"", st:[], ex:false, sub:"速攻", e:"フィールドの魔法・罠カード1枚を対象として発動できる。そのカードを破壊する。", c:"05318639"},
];
let CARD_DB = DUMMY_DB.slice();
const IMG_BASE = "images/cards_small/";
const IMG_BACK = "images/card_back.webp";

/* -------------------- 定数 -------------------- */
const PHASES = [
  {id:"draw", jp:"ドロー"}, {id:"standby", jp:"スタンバイ"},
  {id:"main1", jp:"メイン1"}, {id:"battle", jp:"バトル"},
  {id:"main2", jp:"メイン2"}, {id:"end", jp:"エンド"},
];
const ZONE_LIMITS = { mz:5, sz:5, field:1 };
const PNAME = ["プレイヤー I", "プレイヤー II"];

/* -------------------- gameState -------------------- */
/* players[p] = {lp, hand[], deck[], mz[], sz[], field, grave[], banish[], ex[]}
   各ゾーンは "配置カード" の配列。カード＝{id(DB index), face:'up'|'down', pos:'atk'|'def'} */
let gameState = null;

function makePlayer(){
  return {
    lp:8000, hand:[], deck:[], mz:[], sz:[], field:null, grave:[], banish:[], ex:[],
    normalSummonUsed:false,   // 通常召喚権（1ターン1回）
    ssHistory:[],             // このターンの特殊召喚履歴 [{name, from, turn}]
    graveHistory:[],          // このターンの墓地送り履歴 [{name, from, turn}]
    effectFlags:{},           // 永続的なフラグ（1ターン1度の使用済み等）
    temporaryFlags:{},        // ターン終了で消えるフラグ
  };
}
function newGame(){
  // 1103環境は先攻ドローあり。ターン1もドローフェイズから始める。
  return {
    turn:1, phase:"draw", activePlayer:0, firstPlayer:0,
    players:[makePlayer(), makePlayer()],
    log:[], chain:[],
    drawnThisTurn:false,
    priority:0,        // 優先権を持つプレイヤー
    pending:[],        // 発動待ち効果 [{player, name, note}]
    reserved:[],       // 予約効果（このターン終了時など）[{player, name, at, note}]
    scriptLog:[],      // カードスクリプトの処理トレース（デバッガー用）
  };
}

/* -------------------- applyAction --------------------
   全ての状態変化はここを通す。副作用は gameState と log のみ。 */
function applyAction(gs, a){
  const P = gs.players[a.player ?? gs.activePlayer];
  switch(a.type){

    case "SET_PHASE":
      gs.phase = a.phase;
      logIt(gs, `${nameOf(gs.activePlayer)}：${phaseJp(a.phase)}へ`);
      break;

    case "PASS_TURN": {
      // ターン終了時の予約効果を消化
      const due = gs.reserved.filter(r=>r.at==="endPhase" && r.turn===gs.turn);
      due.forEach(r=>logIt(gs, `予約効果：${r.name}（${nameOf(r.player)}）`));
      gs.reserved = gs.reserved.filter(r=>!(r.at==="endPhase" && r.turn===gs.turn));
      gs.activePlayer = gs.activePlayer === 0 ? 1 : 0;
      gs.turn += 1;
      gs.phase = "draw";
      gs.drawnThisTurn = false;
      gs.priority = gs.activePlayer;
      // 召喚権・攻撃済み・ターン中履歴をリセット
      gs.players.forEach(pl=>{
        pl.normalSummonUsed = false;
        pl.ssHistory = [];
        pl.graveHistory = [];
        pl.temporaryFlags = {};
        pl.mz.forEach(c=>{ if(c) c.attacked = false; });
      });
      logIt(gs, `<b>ターン ${gs.turn}</b> — ${nameOf(gs.activePlayer)}の手番（先攻ドローあり）`);
      break;
    }

    case "LP":
      P.lp = Math.max(0, P.lp + a.delta);
      logIt(gs, `${nameOf(a.player)} LP ${a.delta>0?"+":""}${a.delta} → ${P.lp}`);
      break;

    case "DRAW": {
      const n = a.n ?? 1;
      for(let i=0;i<n;i++){
        if(!P.deck.length) break;
        const c = P.deck.shift();
        c.face = 'up';           // 手札は常に表向き（タップ不要で内容が読める）
        c.pos  = 'atk';
        P.hand.push(c);
      }
      // ドローフェイズの通常ドローを記録（ガイド表示用）
      if(gs.phase==="draw" && (a.player ?? gs.activePlayer)===gs.activePlayer) gs.drawnThisTurn = true;
      logIt(gs, `${nameOf(a.player)}：${n}枚ドロー`);
      break;
    }

    case "LOAD_DECK":
      P.deck = a.deck;            // [{id,face,pos}...]
      P.ex   = a.ex || [];
      logIt(gs, `${nameOf(a.player)}：デッキ ${a.deck.length}枚 / EX ${(a.ex||[]).length}枚 読込`);
      break;

    case "SHUFFLE":
      shuffle(P.deck);
      logIt(gs, `${nameOf(a.player)}：デッキシャッフル`);
      break;

    case "MOVE": {
      // from/to は "hand","mz","sz","field","grave","banish","deck","ex"
      const card = removeFrom(P, a.from, a.fromIndex);
      if(!card) break;
      if(a.face) card.face = a.face;
      if(a.pos)  card.pos  = a.pos;
      placeInto(P, a.to, card, a.deckPos);
      logIt(gs, `${nameOf(a.player)}：${cardName(card)} を ${zoneJp(a.from)}→${zoneJp(a.to)}${a.face==='down'?'（裏）':''}${a.pos==='def'?'（守備）':''}`);
      break;
    }

    case "FLIP": {
      const card = zoneCard(P, a.zone, a.index);
      if(card){ card.face = card.face==='up'?'down':'up'; logIt(gs, `${nameOf(a.player)}：${cardName(card)} を反転`); }
      break;
    }

    case "TOGGLE_POS": {
      const card = zoneCard(P, a.zone, a.index);
      if(card){ card.pos = card.pos==='atk'?'def':'atk'; logIt(gs, `${nameOf(a.player)}：${cardName(card)} 表示形式変更`); }
      break;
    }

    case "ATTACK": {
      // 攻撃したモンスターに攻撃済みフラグを立てる（1ターン1回制限の管理）
      if(P.mz[a.atkIdx]) P.mz[a.atkIdx].attacked = true;
      // a: {player, atkIdx, target:'direct'|monsterIdx}
      const atkCard = P.mz[a.atkIdx];
      if(!atkCard){ break; }
      const atkDB = CARD_DB[atkCard.id]||{};
      const oppP = gs.players[a.player===0?1:0];
      const aATK = a.atkOverride!=null ? a.atkOverride : (atkDB.atk||0);
      if(a.target==='direct'){
        oppP.lp = Math.max(0, oppP.lp - aATK);
        logIt(gs, `<b>攻撃</b> ${cardName(atkCard)}(${aATK}) が直接攻撃 → ${nameOf(a.player===0?1:0)} に ${aATK} ダメージ（LP ${oppP.lp}）`);
      } else {
        const defCard = oppP.mz[a.target];
        if(!defCard){ break; }
        const defDB = CARD_DB[defCard.id]||{};
        const defending = defCard.pos==='def';
        const dVal = a.defOverride!=null ? a.defOverride : (defending ? (defDB.def||0) : (defDB.atk||0));
        let msg = `<b>戦闘</b> ${cardName(atkCard)}(攻${aATK}) vs ${cardName(defCard)}(${defending?'守':'攻'}${dVal})：`;
        if(defending){
          // 攻撃表示 vs 守備表示
          if(aATK > dVal){ dropXyzMaterials(oppP,defCard); oppP.mz.splice(a.target,1); oppP.grave.push(reset(defCard)); msg += `守備モンスター破壊`; }
          else if(aATK < dVal){ const dmg=dVal-aATK; P.lp=Math.max(0,P.lp-dmg); msg += `反射ダメージ ${dmg} → ${nameOf(a.player)}（LP ${P.lp}）`; }
          else { msg += `相打ちならず（貫通なし）`; }
        } else {
          // 攻撃表示同士
          if(aATK > dVal){ const dmg=aATK-dVal; dropXyzMaterials(oppP,defCard); oppP.mz.splice(a.target,1); oppP.grave.push(reset(defCard)); oppP.lp=Math.max(0,oppP.lp-dmg); msg += `相手モンスター破壊＋${dmg}ダメージ（LP ${oppP.lp}）`; }
          else if(aATK < dVal){ const dmg=dVal-aATK; const gi=P.mz.indexOf(atkCard); if(gi>=0){dropXyzMaterials(P,atkCard);P.mz.splice(gi,1);P.grave.push(reset(atkCard));} P.lp=Math.max(0,P.lp-dmg); msg += `自分モンスター破壊＋${dmg}ダメージ（LP ${P.lp}）`; }
          else { const gi=P.mz.indexOf(atkCard); if(gi>=0){dropXyzMaterials(P,atkCard);P.mz.splice(gi,1);P.grave.push(reset(atkCard));} dropXyzMaterials(oppP,defCard); oppP.mz.splice(a.target,1); oppP.grave.push(reset(defCard)); msg += `相打ち（両者破壊）`; }
        }
        logIt(gs, msg);
      }
      break;
    }

    /* ---- チェーン（手動） ---- */
    case "CHAIN_ADD": {
      // a: {player, from:'hand'|'mz'|'sz'|'field', index, ss}
      gs.chain.push({ player:a.player, cardId:a.cardId, name:a.name, ss:a.ss, from:a.from, index:a.index });
      logIt(gs, `チェーン${gs.chain.length}：${nameOf(a.player)} が ${a.name}（SS${a.ss}）を発動`);
      break;
    }
    case "CHAIN_RESOLVE_TOP": {
      // 逆順解決：末尾（最後に積んだ＝一番上）から1つ処理して取り除く
      if(!gs.chain.length) break;
      const link = gs.chain.pop();
      logIt(gs, `解決：チェーン${gs.chain.length+1} ${link.name}（効果は手動で処理してください）`);
      break;
    }
    case "CHAIN_CLEAR": {
      gs.chain = [];
      logIt(gs, `チェーンをクリア`);
      break;
    }

    /* ================= 効果処理プリミティブ =================
       全ての効果はこれらの組み合わせで表現する。applyAction を通るので
       スナップショット／Undo／ログが自動的に効く。 */

    /* 指定ゾーンのカードを墓地へ（破壊・墓地送り共通）
       a:{player, zone:'mz'|'sz'|'field', index, reason} */
    case "FX_TO_GRAVE": {
      const card = removeFrom(P, a.zone, a.index);
      if(!card) break;
      dropXyzMaterials(P, card);
      P.grave.push(reset(card));
      P.graveHistory.push({name:cardName(card), from:a.zone, turn:gs.turn});
      logIt(gs, `${a.reason||"効果"}：${nameOf(a.player)}の ${cardName(card)} を墓地へ`);
      break;
    }

    /* 複数まとめて墓地へ（全体破壊用）。a:{player, zone, reason} */
    case "FX_WIPE_ZONE": {
      const arr = P[a.zone] || [];
      const names = arr.map(c=>cardName(c));
      while(arr.length){ const w=arr.pop(); dropXyzMaterials(P,w); P.grave.push(reset(w)); }
      if(names.length) logIt(gs, `${a.reason||"効果"}：${nameOf(a.player)}の ${names.join("・")} を破壊`);
      break;
    }

    /* 墓地/除外/デッキ/手札 から フィールドへ特殊召喚
       a:{player, from, fromIndex, pos, reason} */
    case "FX_SPECIAL_SUMMON": {
      if(P.mz.length >= ZONE_LIMITS.mz){ logIt(gs, `モンスターゾーンが一杯です`); break; }
      const card = removeFrom(P, a.from, a.fromIndex);
      if(!card) break;
      card.face='up'; card.pos = a.pos||'atk'; card.attacked=false;
      P.mz.push(card);
      P.ssHistory.push({name:cardName(card), from:a.from, turn:gs.turn});
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} を特殊召喚（${card.pos==='def'?'守備':'攻撃'}）`);
      break;
    }

    /* デッキ→手札（サーチ）。a:{player, deckIndex, reason} */
    case "FX_SEARCH": {
      const card = removeFrom(P, "deck", a.deckIndex);
      if(!card) break;
      card.face='up';
      P.hand.push(card);
      shuffle(P.deck);
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} を手札に加えた（デッキシャッフル）`);
      break;
    }

    /* デッキ→墓地（落とす）。a:{player, deckIndex, reason} */
    case "FX_MILL": {
      const card = removeFrom(P, "deck", a.deckIndex);
      if(!card) break;
      P.grave.push(reset(card));
      shuffle(P.deck);
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} をデッキから墓地へ`);
      break;
    }

    /* デッキトップから n 枚墓地へ。a:{player, n, reason} */
    case "FX_MILL_TOP": {
      const n = a.n||1; const names=[];
      for(let i=0;i<n;i++){ if(!P.deck.length) break; const c=P.deck.shift(); names.push(cardName(c)); P.grave.push(reset(c)); }
      logIt(gs, `${a.reason||"効果"}：デッキトップ ${names.join("・")||"0枚"} を墓地へ`);
      break;
    }

    /* フィールド→手札（バウンス）。a:{player, zone, index, reason} */
    case "FX_BOUNCE": {
      const card = removeFrom(P, a.zone, a.index);
      if(!card) break;
      dropXyzMaterials(P, card);
      card.face='up'; card.pos='atk';
      P.hand.push(card);
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} を手札に戻した`);
      break;
    }

    /* 除外。a:{player, zone, index, reason} */
    case "FX_BANISH": {
      const card = removeFrom(P, a.zone, a.index);
      if(!card) break;
      dropXyzMaterials(P, card);
      P.banish.push(reset(card));
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} を除外`);
      break;
    }

    /* 手札を捨てる（コスト）。a:{player, handIndex, reason} */
    case "FX_DISCARD": {
      const card = removeFrom(P, "hand", a.handIndex);
      if(!card) break;
      P.grave.push(reset(card));
      logIt(gs, `${a.reason||"コスト"}：${cardName(card)} を手札から捨てた`);
      break;
    }

    /* 手札→デッキトップ。a:{player, handIndex, reason} */
    case "FX_HAND_TO_TOP": {
      const card = removeFrom(P, "hand", a.handIndex);
      if(!card) break;
      card.face='down';
      P.deck.unshift(card);
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} をデッキトップへ`);
      break;
    }

    /* 表示形式・表裏の指定変更。a:{player, zone, index, face?, pos?} */
    case "FX_SET_STATE": {
      const card = zoneCard(P, a.zone, a.index);
      if(!card) break;
      if(a.face) card.face = a.face;
      if(a.pos)  card.pos  = a.pos;
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} を${a.face==='down'?'裏側':''}${a.pos==='def'?'守備表示':a.pos==='atk'?'攻撃表示':''}に`);
      break;
    }

    /* 発動したカード自身を墓地へ（通常魔法・罠の処理後） */
    case "FX_SELF_TO_GRAVE": {
      const card = removeFrom(P, a.zone, a.index);
      if(!card) break;
      P.grave.push(reset(card));
      logIt(gs, `${cardName(card)} は墓地へ`);
      break;
    }

    /* EXデッキから特殊召喚し、素材を処理する
       a:{player, exIndex, materials:[mzIndex...], kind:'synchro'|'xyz'|'fusion', pos} */
    case "FX_EX_SUMMON": {
      const exCard = P.ex[a.exIndex];
      if(!exCard){ break; }
      if(P.mz.length - a.materials.length >= ZONE_LIMITS.mz){
        logIt(gs, `モンスターゾーンが足りません`); break;
      }
      const db = CARD_DB[exCard.id]||{};
      // 素材を場から取り除く（大きい添字から消してズレを防ぐ）
      const mats = a.materials.slice().sort((x,y)=>y-x);
      const matCards = [];
      mats.forEach(mi=>{
        const c = P.mz.splice(mi,1)[0];
        if(c) matCards.push(c);
      });
      const matNames = matCards.map(c=>cardName(c)).reverse();
      // EXデッキから取り出して場へ
      P.ex.splice(a.exIndex,1);
      exCard.face = 'up';
      exCard.pos  = a.pos || 'atk';
      if(a.kind === 'xyz'){
        // エクシーズは素材をカードの下に重ねる
        exCard.xyz = matCards.map(c=>reset(c));
      } else {
        // シンクロ・融合は素材を墓地へ
        matCards.forEach(c=>P.grave.push(reset(c)));
      }
      P.mz.push(exCard);
      const kindJa = {synchro:"シンクロ召喚", xyz:"エクシーズ召喚", fusion:"融合召喚"}[a.kind]||"特殊召喚";
      logIt(gs, `<b>${kindJa}</b>：${matNames.join(" ＋ ")} → ${cardName(exCard)}`);
      break;
    }

    /* エクシーズ素材を1つ取り除く（効果コスト）
       a:{player, mzIndex, reason} */
    case "FX_DETACH": {
      const c = P.mz[a.mzIndex];
      if(!c || !c.xyz || !c.xyz.length){ logIt(gs, `エクシーズ素材がありません`); break; }
      const m = c.xyz.shift();
      P.grave.push(reset(m));
      logIt(gs, `${a.reason||"効果"}：${cardName(c)} の素材 ${cardName(m)} を取り除いた（残${c.xyz.length}）`);
      break;
    }


    /* ===== 追加プリミティブ ===== */

    /* 通常召喚（召喚権を消費）。a:{player, handIndex, pos} */
    case "NORMAL_SUMMON": {
      if(P.normalSummonUsed){ logIt(gs, `このターンは既に通常召喚しています`); break; }
      if(P.mz.length >= ZONE_LIMITS.mz){ logIt(gs, `モンスターゾーンが一杯です`); break; }
      const card = removeFrom(P, "hand", a.handIndex);
      if(!card) break;
      card.face='up'; card.pos=a.pos||'atk'; card.attacked=false;
      P.mz.push(card);
      P.normalSummonUsed = true;
      logIt(gs, `<b>通常召喚</b>：${cardName(card)}（${card.pos==='def'?'守備':'攻撃'}）`);
      break;
    }

    /* セット（モンスター）。召喚権を消費。a:{player, handIndex} */
    case "SET_MONSTER": {
      if(P.normalSummonUsed){ logIt(gs, `このターンは既に通常召喚しています`); break; }
      if(P.mz.length >= ZONE_LIMITS.mz){ logIt(gs, `モンスターゾーンが一杯です`); break; }
      const card = removeFrom(P, "hand", a.handIndex);
      if(!card) break;
      card.face='down'; card.pos='def'; card.attacked=false;
      P.mz.push(card);
      P.normalSummonUsed = true;
      logIt(gs, `セット：モンスターを裏側守備表示で置いた`);
      break;
    }

    /* セット（魔法・罠）。a:{player, handIndex, toField} */
    case "SET_ST": {
      const zone = a.toField ? "field" : "sz";
      if(zone==="sz" && P.sz.length >= ZONE_LIMITS.sz){ logIt(gs, `魔法・罠ゾーンが一杯です`); break; }
      if(zone==="field" && P.field){ logIt(gs, `フィールドゾーンが埋まっています`); break; }
      const card = removeFrom(P, "hand", a.handIndex);
      if(!card) break;
      card.face='down'; card.pos='atk';
      if(zone==="field") P.field = card; else P.sz.push(card);
      logIt(gs, `セット：カードを伏せた`);
      break;
    }

    /* デッキへ戻す。a:{player, zone, index, toBottom} */
    case "FX_RETURN_DECK": {
      const card = removeFrom(P, a.zone, a.index);
      if(!card) break;
      dropXyzMaterials(P, card);
      card.face='down'; card.pos='atk';
      if(a.toBottom) P.deck.push(card); else P.deck.unshift(card);
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} をデッキ${a.toBottom?"ボトム":"トップ"}へ`);
      break;
    }

    /* 無効化フラグを立てる（裁定はプレイヤーが行う。アプリは状態を保持する）
       a:{player, zone, index, reason} */
    case "FX_NEGATE": {
      const card = zoneCard(P, a.zone, a.index);
      if(!card) break;
      card.negated = true;
      logIt(gs, `${a.reason||"効果"}：${cardName(card)} の効果を無効化`);
      break;
    }

    /* エクシーズ素材として重ねる。a:{player, targetMz, from, fromIndex} */
    case "FX_OVERLAY": {
      const target = P.mz[a.targetMz];
      if(!target){ logIt(gs, `重ねる先が見つかりません`); break; }
      const card = removeFrom(P, a.from, a.fromIndex);
      if(!card) break;
      target.xyz = target.xyz || [];
      target.xyz.push(reset(card));
      logIt(gs, `${cardName(card)} を ${cardName(target)} の素材として重ねた`);
      break;
    }

    /* 優先権の移動。a:{to} */
    case "SET_PRIORITY":
      gs.priority = a.to;
      logIt(gs, `優先権：${nameOf(a.to)}`);
      break;

    /* 発動待ち効果の登録／消化。a:{player, name, note} */
    case "PENDING_ADD":
      gs.pending.push({player:a.player, name:a.name, note:a.note||""});
      logIt(gs, `発動待ち：${a.name}（${nameOf(a.player)}）`);
      break;
    case "PENDING_RESOLVE": {
      const item = gs.pending.splice(a.index,1)[0];
      if(item) logIt(gs, `発動待ちを処理：${item.name}`);
      break;
    }
    case "PENDING_CLEAR":
      gs.pending = [];
      logIt(gs, `発動待ちをクリア`);
      break;

    /* 予約効果（このターンのエンドフェイズに戻す等）。a:{player, name, at, note} */
    case "RESERVE_ADD":
      gs.reserved.push({player:a.player, name:a.name, at:a.at||"endPhase", turn:gs.turn, note:a.note||""});
      logIt(gs, `予約：${a.name}（${a.at==="endPhase"?"エンドフェイズ":a.at}）`);
      break;
    case "RESERVE_REMOVE": {
      const r = gs.reserved.splice(a.index,1)[0];
      if(r) logIt(gs, `予約を解除：${r.name}`);
      break;
    }

    /* 攻撃済みフラグ操作（1ターン1回制限の管理）。a:{player, mzIndex, value} */
    case "SET_ATTACKED": {
      const c = P.mz[a.mzIndex];
      if(c) c.attacked = !!a.value;
      break;
    }

    case "RESET":
      Object.assign(gs, newGame());
      logIt(gs, "盤面をリセット");
      break;
  }
  return gs;
}

/* -------------------- ゾーン操作ヘルパ -------------------- */
function removeFrom(P, zone, idx){
  if(zone==="field"){ const c=P.field; P.field=null; return c; }
  const arr = P[zone]; if(!arr) return null;
  return arr.splice(idx,1)[0];
}
function placeInto(P, zone, card, deckPos){
  if(zone==="field"){ P.field = card; return; }
  const arr = P[zone];
  if(zone==="deck"){
    card.face='down'; card.pos='atk';
    if(deckPos==="bottom") arr.push(card); else arr.unshift(card);
    return;
  }
  // 手札・墓地・除外は常に表向きで扱う（手札はタップせず読めるように）
  if(zone==="hand" || zone==="grave" || zone==="banish"){ card.face='up'; card.pos='atk'; }
  arr.push(card);
}
function zoneCard(P, zone, idx){ return zone==="field" ? P.field : P[zone]?.[idx]; }
/* 墓地・除外へ送る際にカードの表示状態を正規化 */
function reset(card){ return { id:card.id, face:'up', pos:'atk' }; }
/* 場を離れるカードが持つエクシーズ素材を墓地へ送る（本体処理の前に呼ぶ） */
function dropXyzMaterials(P, card){
  if(card && card.xyz && card.xyz.length){
    card.xyz.forEach(m=>P.grave.push(reset(m)));
    card.xyz = [];
  }
}

/* -------------------- ログ / 名前 -------------------- */
function logIt(gs, msg){ gs.log.unshift({t:Date.now(), msg}); if(gs.log.length>60) gs.log.pop(); }
function nameOf(p){ return PNAME[p]; }
function phaseJp(id){ return (PHASES.find(x=>x.id===id)||{}).jp || id; }
function zoneJp(z){ return {hand:"手札",mz:"モンスター",sz:"魔法罠",field:"フィールド",grave:"墓地",banish:"除外",deck:"デッキ",ex:"EX"}[z]||z; }
function cardName(card){ return CARD_DB[card.id]?.n || "カード"; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

/* =========================================================================
   RENDER — gameState を読んで描画するだけ
   ========================================================================= */
function render(){
  const gs = gameState;
  const view = gs.activePlayer;          // 手番プレイヤー視点
  const opp  = view===0?1:0;
  const P = gs.players[view];
  const curIdx = PHASES.findIndex(x=>x.id===gs.phase);
  const chN = gs.chain.length;

  const fp = gs.firstPlayer ?? 0;

  /* ===== 極小ステータスバー（常時表示はこれだけ） ===== */
  const rp = view===0?1:0;
  const reactN = reactableCards(rp).length;
  const warn = chN
    ? `<span class="sb-warn">チェーン${chN}</span>`
    : (gs.phase==="battle" && reactN ? `<span class="sb-warn trap">伏せ${reactN}</span>` : "");
  document.getElementById("statusbar").innerHTML =
    `<span class="sb-turn">T${gs.turn} ${nameOf(view)}${view===fp?"(先)":""}</span>` +
    `<span class="sb-phase">${phaseJp(gs.phase)}</span>${warn}` +
    `<span class="sb-lp"><span class="me">${P.lp}</span><span class="op">${gs.players[opp].lp}</span></span>`;

  /* ===== guide strip：今のフェーズ＋できること（ドック展開時のみ見える） ===== */
  document.getElementById("guide").innerHTML = guideHTML(gs, view, curIdx, chN);

  /* ===== board：相手を上、手番を下 ===== */
  document.getElementById("board").innerHTML =
    sideHTML(opp, true) + sideHTML(view, false);

  /* ===== hand（手番のみ表向き） ===== */
  document.getElementById("hand").innerHTML = P.hand.map((c,i)=>
    cardHTML(c, "hcard", `openHand(${i})`, true)
  ).join("") || `<div class="hand-empty">
      <span>手札なし</span>
      <button class="he-btn" onclick="startTestDuel(true)">テストデッキですぐ開始</button>
      <button class="he-btn ghost" onclick="openDeckLoad('saved')">デッキを読み込む</button>
    </div>`;

  /* ===== このターンにやったこと ===== */
  const tl = document.getElementById("turnlog");
  tl.innerHTML = `<span class="tl-lab">このターン</span>` +
    (turnActions.length
      ? turnActions.slice(-12).map(c=>`<span class="tl-chip">${c}</span>`).join("")
      : `<span class="tl-empty">まだ操作なし</span>`);

  /* ===== full log ===== */
  document.getElementById("log").innerHTML = gs.log.map(l=>`<div class="li">${l.msg}</div>`).join("");

  /* ===== チェーンは常時スタック表示 ===== */
  renderChainStack(gs);

  /* ===== 下部ドック ===== */
  renderDock(gs, curIdx, chN);
}

/* ---- guide strip HTML ---- */
function guideHTML(gs, view, curIdx, chN){
  const P = gs.players[view];
  const loaded = P.deck.length>0 || P.hand.length>0 || P.mz.length>0 || P.sz.length>0 || P.grave.length>0;
  const phase = gs.phase;
  const R = PHASE_RULES[phase] || PHASE_RULES.main1;
  const cans = [];
  if(!loaded){
    cans.push(`<span class="g-can">テストデッキ or 保存デッキで開始</span>`);
  } else {
    if(R.draw){
      cans.push(gs.drawnThisTurn
        ? `<span class="g-can mute">ドロー済み</span>`
        : `<span class="g-can">ドロー可${gs.turn===1?"（先攻ドローあり）":""}</span>`);
    }
    if(R.normalSummon) cans.push(`<span class="g-can">通常召喚/セット</span>`);
    if(R.activateS1)   cans.push(`<span class="g-can">魔法罠 発動/セット</span>`);
    if(R.exSummon && P.ex.length) cans.push(`<span class="g-can">EX召喚可</span>`);
    if(R.attack){
      const canAtk = P.mz.some(c=>c && c.face==='up' && c.pos==='atk');
      cans.push(`<span class="g-can ${canAtk?'':'mute'}">攻撃宣言${canAtk?'':'（表側攻撃なし）'}</span>`);
    }
    // どのフェーズでも速攻魔法・罠は撃てる
    cans.push(`<span class="g-can mute">速攻魔法・罠（SS2+）</span>`);
    if(phase==="end") cans.push(`<span class="g-can">手札7枚調整</span>`);
    const rp = view===0?1:0;
    const rn = reactableCards(rp).length;
    if(rn) cans.push(`<span class="g-can react">${nameOf(rp)}は${rn}枚撃てる</span>`);
  }
  const chainWarn = chN
    ? `<span class="g-chainwarn">チェーン ${chN} 解決待ち</span>` : "";
  return `<span class="g-phase">${phaseJp(phase)}</span>${cans.join("")}${chainWarn}`;
}

/* ---- 下部ドック HTML ---- */
function renderDock(gs, curIdx, chN){
  const atEnd = gs.phase==="end";
  const nextPh = curIdx < PHASES.length-1 ? PHASES[curIdx+1].jp : null;
  const prevDisabled = curIdx<=0;
  const canUndo = HISTORY.length>0;
  const P = gs.players[gs.activePlayer];
  const exN = P.ex.length;
  const inMain = (gs.phase==="main1"||gs.phase==="main2");
  const drawDone = (gs.phase==="draw" && gs.drawnThisTurn);
  const rp = gs.activePlayer===0 ? 1 : 0;
  const reactN = reactableCards(rp).length;

  /* ===== 常時見える1行：フェーズ送り＋Undo＋展開 =====
     盤面を最大化するため、ここ以外は折りたたむ。 */
  // ドローフェイズは「ドロー」が唯一の主要行動なので、畳んだままでも押せる位置に出す
  const drawInBar = (gs.phase==="draw" && !gs.drawnThisTurn)
    ? `<button class="d-draw pulse" onclick="doDraw()">ドロー</button>` : "";
  const bar = `
    <button class="d-prev" onclick="doPhasePrev()" ${prevDisabled?'disabled':''}>◂</button>
    ${drawInBar}
    ${atEnd
      ? `<button class="d-next endturn" onclick="doPass()">ターン終了 ⇄</button>`
      : `<button class="d-next primary" onclick="doPhaseNext()">${phaseJp(gs.phase)} ▸ ${nextPh||""}</button>`}
    <button class="d-more undo" onclick="undo()" ${canUndo?'':'disabled'}>↺</button>
    <button class="d-more" onclick="redo()" ${REDO.length?'':'disabled'}>↻</button>
    <button class="d-more" onclick="toggleDock()" id="dockToggle">${DOCK_OPEN?'▾':'▴'}</button>`;

  /* ===== 展開時の詳細アクション ===== */
  const exBtn = (exN && inMain)
    ? `<button class="d-act" onclick="openExDeck(${gs.activePlayer})">EX<span class="kb">${exN}</span></button>`
    : "";
  const reactBtn = reactN
    ? `<button class="d-act react" onclick="openReact()">${nameOf(rp)}<span class="kb">${reactN}</span></button>`
    : "";
  const canDrawNow = rules().draw && !gs.drawnThisTurn;
  const drawCls = canDrawNow ? "d-act gold pulse" : (drawDone ? "d-act" : "d-act");
  const drawLabel = drawDone ? "ドロー済" : "ドロー";
  const drawClick = canDrawNow ? "doDraw()" : `showToast('${phaseJp(gs.phase)}では通常ドローできません')`;
  const actRow = `
    <button class="${drawCls}" onclick="${drawClick}">${drawLabel}</button>
    ${exBtn}${reactBtn}
    <button class="d-act" onclick="openChain()">チェーン${chN?`<span class="kb">${chN}</span>`:""}</button>
    <button class="d-act" onclick="openMenu()">≡ メニュー</button>`;

  document.getElementById("dockBar").innerHTML = bar;
  document.getElementById("dockActions").innerHTML = actRow;
  const dock = document.getElementById("dock");
  if(dock) dock.className = DOCK_OPEN ? "dock" : "dock collapsed";
}


/* =========================================================================
   スワイプでフェーズ送り（盤面を左右にスワイプ）
   ボタンを増やさずに操作ステップを減らすため。
   ========================================================================= */
function initSwipe(){
  const el = document.getElementById("board");
  if(!el || !el.addEventListener) return;
  let x0=null, y0=null, t0=0;
  el.addEventListener("touchstart", e=>{
    if(e.touches.length!==1) return;
    x0=e.touches[0].clientX; y0=e.touches[0].clientY; t0=Date.now();
  }, {passive:true});
  el.addEventListener("touchend", e=>{
    if(x0===null) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-x0, dy=t.clientY-y0, dt=Date.now()-t0;
    x0=null;
    // 横方向が縦の2倍以上、かつ十分な距離と速さのときだけフェーズ送り
    if(dt<600 && Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*2){
      if(dx<0) doPhaseNext(); else doPhasePrev();
      showToast(phaseJp(gameState.phase));
    }
  }, {passive:true});
}

/* チェーンスタックの常時表示 */
function renderChainStack(gs){
  const el = document.getElementById("chainstack");
  if(!el) return;
  if(!gs.chain.length){ el.hidden = true; el.innerHTML=""; return; }
  el.hidden = false;
  const rows = gs.chain.map((lk,i)=>{
    const top = i===gs.chain.length-1;
    return `<span class="cs-link ${top?'top':''}">${i+1}. ${lk.name}<small>SS${lk.ss}</small></span>`;
  }).reverse().join("");
  el.innerHTML = `<span class="cs-lab">チェーン</span>${rows}
    <button class="cs-go" onclick="resolveChainStep()">解決 ▸</button>`;
}

/* 場外（フィールド/墓地/除外/デッキ/EX）の行。
   相手側は盤面の一番上、自分側は一番下に置く。 */
function pileRowHTML(p, isOpp){
  return `<div class="zrow">
    <div class="lab">場外</div>
    <div class="slots line5">
      ${pileSlot(p,"field","フィールド",isOpp)}
      ${pileSlot(p,"grave","墓地",isOpp)}
      ${pileSlot(p,"banish","除外",isOpp)}
      ${pileSlot(p,"deck","デッキ",isOpp)}
      ${pileSlot(p,"ex","EX",isOpp)}
    </div>
  </div>`;
}

function zoneRowHTML(p, label, zone, count, isOpp){
  const P = gameState.players[p];
  let cells = "";
  for(let i=0;i<count;i++){
    const c = P[zone][i];
    cells += c
      ? `<div class="slot">${cardHTML(c,"", `openZone(${p},'${zone}',${i})`, !isOpp || c.face==='up')}</div>`
      : `<div class="slot"><span class="ph">${label}</span></div>`;
  }
  return `<div class="zrow"><div class="lab">${label}</div><div class="slots ${zone}">${cells}</div></div>`;
}
function pileSlot(p, zone, label, isOpp){
  const P = gameState.players[p];
  if(zone==="field"){
    const c=P.field;
    return `<div class="pile"><div class="slot field">${ c ? cardHTML(c,"",`openZone(${p},'field',0)`, !isOpp||c.face==='up') : `<span class="ph">${label}</span>`}</div><span class="pile-lab">${label}</span></div>`;
  }
  const n = P[zone].length;
  const top = P[zone][n-1];
  // EXデッキは召喚画面を開く（自分のみ）
  const onclick = (zone==="ex" && !isOpp) ? `openExDeck(${p})` : `openPile(${p},'${zone}')`;
  return `<div class="pile"><div class="slot ${zone==='ex'&&!isOpp&&n?'ex-ready':''}" onclick="${onclick}">
    ${ n ? cardHTML(top,"", onclick, zone!=="deck" && zone!=="ex") : `<span class="ph">${label}</span>` }
    ${ n>0 ? `<span class="pile-n">${n}</span>`:"" }
  </div><span class="pile-lab">${label}</span></div>`;
}

/* 1枚のカード描画。faceUp=false なら裏面 */
function cardHTML(c, extra, onclick, faceUp){
  const db = CARD_DB[c.id] || {};
  const kcls = db.k ? `k-${db.k}` : "";
  const setDown = c.face==='down';
  const defRot  = (db.k==='m' && c.pos==='def') ? 'set-mon' : '';
  if(!faceUp || setDown){
    return `<div class="card facedown ${extra}" onclick="${onclick}">
      <img src="${IMG_BACK}" onerror="this.style.display='none'">
    </div>`;
  }
  const badge = db.k==='m' ? (db.lv?`Lv${db.lv}`:"M") : db.k==='s' ? "魔" : db.k==='t' ? "罠" : "";
  const xyzN = (c.xyz && c.xyz.length) ? `<span class="xyz-n">${c.xyz.length}</span>` : "";
  return `<div class="card ${kcls} ${extra} ${defRot}" onclick="${onclick}">
    <img src="${IMG_BASE}${db.c}.webp" onerror="this.style.display='none'">
    ${badge?`<span class="badge">${badge}</span>`:""}
    ${xyzN}
    <div class="nm">${db.n||""}</div>
  </div>`;
}

/* HTML属性内(onclick="...")に安全に埋め込めるJS文字列リテラルを作る。
   JSON.stringify はダブルクォートを出すため属性が壊れる。
   シングルクォート括りにし、危険な文字を実体参照/エスケープする。 */
function jsStr(v){
  return "'" + String(v)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, "&quot;")
    .replace(/\n/g, "\\n")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;") + "'";
}
/* 配列・オブジェクトを属性内に埋め込む（ダブルクォートを実体参照化） */
function jsVal(v){
  return JSON.stringify(v).replace(/"/g, "&quot;");
}

/* ---- 対象選択のための共通ピッカー ---------------------------------- */
/* PICK: 一覧から1枚選ばせる。cards=[{label, sub, onPick}] */
function openPick(title, note, items, onCancel){
  if(!items.length){
    showToast("対象がありません");
    if(onCancel) onCancel();
    return;
  }
  const rows = items.map((it,i)=>
    `<div class="act pick-row" onclick="__pick(${i})">
       <span class="pk-nm">${it.label}</span>
       ${it.sub?`<span class="pk-sub">${it.sub}</span>`:""}
     </div>`).join("");
  PICK_ITEMS = items; PICK_CANCEL = onCancel||null;
  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:4px">${title}</h3>
    ${note?`<div class="meta" style="margin-bottom:10px">${note}</div>`:""}
    <div class="pick-list">${rows}</div>
    <button class="close" onclick="__pickCancel()">やめる</button>`;
  veil.classList.add("on");
}
let PICK_ITEMS=[], PICK_CANCEL=null;
function __pick(i){
  const it = PICK_ITEMS[i];
  PICK_ITEMS=[]; PICK_CANCEL=null;
  closeSheet();
  if(it && it.onPick) it.onPick();
}
function __pickCancel(){
  const cb = PICK_CANCEL;
  PICK_ITEMS=[]; PICK_CANCEL=null;
  closeSheet();
  if(cb) cb();
}

/* ---- フィルタ（index.html の soloAutoMatch と同仕様） ---------------- */
function autoMatch(f){
  return function(c){
    if(!c) return false;
    if(c.ex) return false;
    if(f.tk==='m' && c.k!=='m') return false;
    if(f.tk==='s' && c.k!=='s') return false;
    if(f.tk==='t' && c.k!=='t') return false;
    if(f.tk==='st' && !(c.k==='s'||c.k==='t')) return false;
    if(f.lvmax!=null && !(c.k==='m'&&c.lv!=null&&c.lv<=f.lvmax)) return false;
    if(f.lvmin!=null && !(c.k==='m'&&c.lv!=null&&c.lv>=f.lvmin)) return false;
    if(f.lv!=null && !(c.k==='m'&&c.lv===f.lv)) return false;
    if(f.at && c.at!==f.at) return false;
    if(f.ra && c.ra!==f.ra) return false;
    if(f.normal && (c.st||[]).indexOf('通常')<0) return false;
    if(f.tuner && (c.st||[]).indexOf('チューナー')<0) return false;
    if(f.atkmax!=null && !(c.atk!=null&&c.atk<=f.atkmax)) return false;
    if(f.defmax!=null && !(c.def!=null&&c.def<=f.defmax)) return false;
    if(f.arch && String(c.n).indexOf(f.arch)<0) return false;
    if(f.exclude && c.n===f.exclude) return false;
    return true;
  };
}

/* ---- ゾーン参照ヘルパ ---------------------------------------------- */
function myP(){ return gameState.players[gameState.activePlayer]; }
function oppIdx(p){ return p===0?1:0; }
function dbOf(c){ return CARD_DB[c.id]||{}; }
function labelOf(c){ const d=dbOf(c); return d.n||"カード"; }
function subOf(c){
  const d=dbOf(c);
  if(d.k==='m') return `${d.at||''}/${d.ra||''} Lv${d.lv||'-'} 攻${d.atk??'-'}`;
  return d.k==='s' ? `魔法${d.sub?'・'+d.sub:''}` : `罠${d.sub?'・'+d.sub:''}`;
}
/* デッキから条件に合うカードの位置一覧 */
function deckMatches(p, filt){
  const P = gameState.players[p]; const out=[];
  P.deck.forEach((c,i)=>{ if(filt(dbOf(c))) out.push({i, c}); });
  return out;
}
function graveMatches(p, filt){
  const P = gameState.players[p]; const out=[];
  P.grave.forEach((c,i)=>{ if(filt(dbOf(c))) out.push({i, c}); });
  return out;
}

/* ---- 宣言テーブルの実行（search / recruit / mill） ------------------- */
function runAutoEffect(p, srcName, ent, selfLoc){
  const filtBase = autoMatch(ent.f);
  const filt = (cc)=>{
    if(!cc || cc.ex) return false;
    if(ent.op==='recruit' && cc.k!=='m') return false;
    return filtBase(cc);
  };
  const P = gameState.players[p];
  if(ent.op==='recruit' && P.mz.length>=ZONE_LIMITS.mz){ showToast("モンスターゾーンが一杯です"); return; }
  const cands = deckMatches(p, filt);
  if(!cands.length){ showToast("対象がデッキにありません"); return; }
  const opJa = {search:"サーチ", mill:"墓地へ送る", recruit:"特殊召喚"}[ent.op];
  openPick(`${srcName}：${opJa}する対象`, `デッキ ${cands.length}枚が該当`,
    cands.map(({i,c})=>({
      label: labelOf(c), sub: subOf(c),
      onPick: ()=>{
        if(ent.op==='search')      act({type:"FX_SEARCH", player:p, deckIndex:i, reason:srcName});
        else if(ent.op==='mill')   act({type:"FX_MILL",   player:p, deckIndex:i, reason:srcName});
        else                       act({type:"FX_SPECIAL_SUMMON", player:p, from:"deck", fromIndex:i, pos:"atk", reason:srcName});
        afterEffect(p, selfLoc, srcName);
      }
    })));
}

/* 魔法・罠が効果を出し終えたら墓地へ送る */
function afterEffect(p, selfLoc, srcName){
  if(!selfLoc) return;
  if(selfLoc.keep) return;                 // 永続・フィールドは残す
  act({type:"FX_SELF_TO_GRAVE", player:p, zone:selfLoc.zone, index:selfLoc.index});
}

/* =========================================================================
   1103環境の汎用カード個別スクリプト
   fn(p, selfLoc) : p=発動プレイヤー, selfLoc={zone,index,keep?}
   対象選択が要るものは openPick を使う。全て act() 経由なので Undo 可。
   ========================================================================= */
const CARD_EFFECT = {

  /* ---------- 全体除去 ---------- */
  "サンダー・ボルト": function(p, loc){
    const o = oppIdx(p);
    act({type:"FX_WIPE_ZONE", player:o, zone:"mz", reason:"サンダー・ボルト"});
    afterEffect(p, loc, "サンダー・ボルト");
  },
  "ブラック・ホール": function(p, loc){
    act({type:"FX_WIPE_ZONE", player:0, zone:"mz", reason:"ブラック・ホール"});
    act({type:"FX_WIPE_ZONE", player:1, zone:"mz", reason:"ブラック・ホール"});
    afterEffect(p, loc, "ブラック・ホール");
  },
  "激流葬": function(p, loc){
    act({type:"FX_WIPE_ZONE", player:0, zone:"mz", reason:"激流葬"});
    act({type:"FX_WIPE_ZONE", player:1, zone:"mz", reason:"激流葬"});
    afterEffect(p, loc, "激流葬");
  },
  "聖なるバリア －ミラーフォース－": function(p, loc){
    const o = oppIdx(p);
    const P = gameState.players[o];
    const atkPos = [];
    P.mz.forEach((c,i)=>{ if(c.face==='up' && c.pos==='atk') atkPos.push(i); });
    if(!atkPos.length){ showToast("相手に攻撃表示モンスターがいません"); return; }
    // 後ろから消す（インデックスずれ防止）
    atkPos.slice().reverse().forEach(i=>{
      act({type:"FX_TO_GRAVE", player:o, zone:"mz", index:i, reason:"ミラーフォース"});
    });
    afterEffect(p, loc, "ミラーフォース");
  },
  "大嵐": function(p, loc){
    // 自分の発動中のこのカードは残したまま両者の魔法罠を流す
    act({type:"FX_WIPE_ZONE", player:oppIdx(p), zone:"sz", reason:"大嵐"});
    const P = gameState.players[p];
    for(let i=P.sz.length-1;i>=0;i--){
      if(loc && loc.zone==='sz' && i===loc.index) continue;
      act({type:"FX_TO_GRAVE", player:p, zone:"sz", index:i, reason:"大嵐"});
    }
    afterEffect(p, loc, "大嵐");
  },

  /* ---------- 単体除去 ---------- */
  "サイクロン": function(p, loc){
    const targets = [];

/* 手札から n 枚捨てさせる（順に選択） */
function pickDiscard(p, n, reason, done){
  const P=gameState.players[p];
  if(n<=0 || !P.hand.length){ if(done) done(); return; }
  openPick(`${reason}：捨てる手札を選ぶ（あと${n}枚）`, "",
    P.hand.map((c,i)=>({
      label: labelOf(c), sub: subOf(c),
      onPick: ()=>{
        act({type:"FX_DISCARD", player:p, handIndex:i, reason});
        pickDiscard(p, n-1, reason, done);
      }
    })), done);
}


/* =========================================================================
   EXデッキ召喚（シンクロ / エクシーズ / 融合）
   1103環境はシンクロが主力。エクシーズは9期以降のカードプール用。
   ========================================================================= */
function exKind(db){
  const st = db.st||[];
  if(st.indexOf('シンクロ')>=0) return 'synchro';
  if(st.indexOf('エクシーズ')>=0) return 'xyz';
  if(st.indexOf('融合')>=0) return 'fusion';
  return null;
}
function isTuner(db){ return (db.st||[]).indexOf('チューナー')>=0; }

/* 場の表側モンスター（素材候補）を集める */
function materialCandidates(p){
  const P = gameState.players[p];
  const out = [];
  P.mz.forEach((c,i)=>{
    if(c.face!=='up') return;          // 裏側は素材にできない
    const db = dbOf(c);
    out.push({i, c, db, lv: db.lv||0, tuner: isTuner(db)});
  });
  return out;
}

/* シンクロ：チューナー1体＋非チューナー1体以上、レベル合計が一致 */
function findSynchroCombos(p, targetLv){
  const cands = materialCandidates(p);
  const tuners = cands.filter(x=>x.tuner);
  const others = cands.filter(x=>!x.tuner);
  const combos = [];
  tuners.forEach(t=>{
    // 非チューナーの部分集合でレベル合計を合わせる
    const need = targetLv - t.lv;
    if(need <= 0) return;
    const found = subsetsSummingTo(others, need, 4);
    found.forEach(set=>{
      combos.push({
        materials: [t.i].concat(set.map(s=>s.i)),
        label: `${t.db.n}(Lv${t.lv}) ＋ ${set.map(s=>`${s.db.n}(Lv${s.lv})`).join(" ＋ ")}`
      });
    });
  });
  return combos;
}
/* エクシーズ：同レベルを規定数。ランク=lv とみなす */
function findXyzCombos(p, rank, count){
  const cands = materialCandidates(p).filter(x=>x.lv===rank);
  if(cands.length < count) return [];
  const combos = [];
  combinations(cands, count).forEach(set=>{
    combos.push({
      materials: set.map(s=>s.i),
      label: set.map(s=>`${s.db.n}(Lv${s.lv})`).join(" ＋ ")
    });
  });
  return combos;
}
/* 部分集合で合計がneedになるものを列挙（最大maxN体） */
function subsetsSummingTo(arr, need, maxN){
  const res = [];
  const n = arr.length;
  for(let size=1; size<=Math.min(maxN,n); size++){
    combinations(arr, size).forEach(set=>{
      const sum = set.reduce((s,x)=>s+x.lv,0);
      if(sum===need) res.push(set);
    });
  }
  return res;
}
function combinations(arr, k){
  const res=[];
  (function rec(start, cur){
    if(cur.length===k){ res.push(cur.slice()); return; }
    for(let i=start;i<arr.length;i++){ cur.push(arr[i]); rec(i+1,cur); cur.pop(); }
  })(0,[]);
  return res;
}
/* エクシーズの必要素材数を効果テキストから読む（「レベル4モンスター×2」） */
function xyzMaterialCount(db){
  const m = String(db.e||"").match(/レベル\s*\d+\s*モンスター\s*[×x]\s*(\d+)/);
  return m ? parseInt(m[1],10) : 2;
}

/* EXデッキを開いて召喚可能なモンスターを提示 */
function openExDeck(p){
  const P = gameState.players[p];
  if(!rules().exSummon){
    sheet.innerHTML = `<div class="grip"></div><h3>エクストラデッキ</h3>
      <div class="phase-note">${phaseJp(gameState.phase)}：${rules().note}</div>
      <div class="meta" style="margin:10px 0 12px">${whyBlocked('exSummon')}<br>
        メインフェイズに進んでから召喚してください。</div>
      <button class="close" onclick="closeSheet()">閉じる</button>`;
    veil.classList.add("on"); return;
  }
  if(!P.ex.length){
    sheet.innerHTML = `<div class="grip"></div><h3>エクストラデッキ</h3>
      <div class="meta" style="margin-bottom:12px">EXデッキにカードがありません。<br>
      デッキビルダーでEXデッキを組むと、ここから召喚できます。</div>
      <button class="close" onclick="closeSheet()">閉じる</button>`;
    veil.classList.add("on"); return;
  }
  const rows = P.ex.map((c,i)=>{
    const db = dbOf(c);
    const kind = exKind(db);
    const kindJa = {synchro:"シンクロ", xyz:"エクシーズ", fusion:"融合"}[kind] || "EX";
    // 召喚可能かを判定
    let ok=false, why="";
    if(kind==='synchro'){
      ok = findSynchroCombos(p, db.lv||0).length>0;
      why = ok ? "" : "素材が足りません";
    } else if(kind==='xyz'){
      const need = xyzMaterialCount(db);
      ok = findXyzCombos(p, db.lv||0, need).length>0;
      why = ok ? "" : `同じレベル${db.lv}が${need}体必要`;
    } else {
      ok = true;   // 融合は素材指定が複雑なので手動選択
      why = "素材を手動で選びます";
    }
    return `<div class="act pick-row ${ok?'':'dim'}" onclick="${ok?`exSummonPick(${p},${i})`:`showToast('${why}')`}">
      <span class="pk-nm">${db.n}</span>
      <span class="pk-sub">${kindJa} ${kind==='xyz'?`ランク${db.lv}`:`Lv${db.lv||'-'}`} 攻${db.atk??'-'}${ok?'':' ・'+why}</span>
    </div>`;
  }).join("");
  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:4px">エクストラデッキ（${P.ex.length}）</h3>
    <div class="meta" style="margin-bottom:10px">召喚できるものが選択できます。素材は自動で判定します。</div>
    <div class="pick-list">${rows}</div>
    <button class="close" onclick="closeSheet()">閉じる</button>`;
  veil.classList.add("on");
}

/* EXモンスターを選んだあと、素材の組み合わせを選ばせる */
function exSummonPick(p, exIndex){
  const P = gameState.players[p];
  const c = P.ex[exIndex]; const db = dbOf(c);
  const kind = exKind(db);
  let combos = [];
  if(kind==='synchro'){
    combos = findSynchroCombos(p, db.lv||0);
  } else if(kind==='xyz'){
    combos = findXyzCombos(p, db.lv||0, xyzMaterialCount(db));
  } else {
    // 融合：場のモンスターから手動で複数選択
    exFusionPick(p, exIndex);
    return;
  }
  if(!combos.length){ showToast("素材が足りません"); return; }
  if(combos.length===1){
    doExSummon(p, exIndex, combos[0].materials, kind);
    return;
  }
  openPick(`${db.n}：使用する素材を選ぶ`, `${combos.length}通りの組み合わせ`,
    combos.map(cb=>({
      label: cb.label, sub:"",
      onPick: ()=>doExSummon(p, exIndex, cb.materials, kind)
    })));
}

/* 融合：素材を順にタップして選ぶ */
let FUSION_SEL = [];
function exFusionPick(p, exIndex){
  FUSION_SEL = [];
  fusionStep(p, exIndex);
}
function fusionStep(p, exIndex){
  const P = gameState.players[p];
  const db = dbOf(P.ex[exIndex]);
  const cands = materialCandidates(p).filter(x=>FUSION_SEL.indexOf(x.i)<0);
  const chosen = FUSION_SEL.map(i=>{
    const cc = P.mz[i]; return cc ? dbOf(cc).n : "?";
  });
  const items = cands.map(x=>({
    label: x.db.n, sub:`Lv${x.lv} 攻${x.db.atk??'-'}`,
    onPick: ()=>{ FUSION_SEL.push(x.i); fusionStep(p, exIndex); }
  }));
  // 確定ボタンを先頭に
  if(FUSION_SEL.length>=2){
    items.unshift({
      label:`▶ この ${FUSION_SEL.length}体で融合召喚する`, sub:chosen.join(" ＋ "),
      onPick: ()=>doExSummon(p, exIndex, FUSION_SEL.slice(), 'fusion')
    });
  }
  openPick(`${db.n}：融合素材を選ぶ`,
    FUSION_SEL.length?`選択中：${chosen.join(" ＋ ")}`:"場のモンスターを2体以上タップ",
    items);
}
