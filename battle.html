/* =========================================================================
   墓地・手札発動の自動判別
   スクリプト未実装のカードでも、効果テキストから発動場所を推定して
   相手ターン中の割り込み候補に載せる。
   誤判定してもプレイヤーが選ばなければ発動しないので実害はない。
   ========================================================================= */
const GRAVE_PATTERNS = [
  /墓地(に存在する|の)?この(カード|１枚)を(ゲームから)?除外(して|し、|する事で|し)/,
  /自分の墓地からこのカードを(ゲームから)?除外/,
  /このカードが墓地に存在する場合.*発動/,
  /墓地のこのカードを/,
  /このカードを除外して発動/,
  /自分の墓地の(この)?カードを除外して発動/,
];
const HAND_PATTERNS = [
  /手札からこのカードを(墓地へ)?捨て(て|る事で)/,
  /このカードを手札から(墓地へ)?捨て(て|る事で)/,
  /手札の?この(カード|１枚)を(墓地へ)?捨て/,
];
/* 相手ターンでも撃てる文言（誘発即時的なタイミング） */
const QUICK_PATTERNS = [
  /相手ターン(に|中)/,
  /攻撃(宣言)?(対象に選択された)?時/,
  /攻撃対象に選択された時/,
  /攻撃を無効/,
  /直接攻撃宣言時/,
  /ダメージ計算(前|時|後)/,
  /相手が.*発動した時/,
  /相手のターン/,
  /特殊召喚(に成功|された)時/,
  /召喚・反転召喚・特殊召喚(に成功|された)時/,
  /このカードが.*選択された時/,
  /バトルフェイズ/,
];

/* テキストから発動可能ゾーンを推定する。結果はキャッシュする。 */
const ACT_ZONE_CACHE = new Map();
function detectActivateZones(db){
  if(!db || !db.n) return null;
  if(ACT_ZONE_CACHE.has(db.n)) return ACT_ZONE_CACHE.get(db.n);
  const e = String(db.e||"") + " " + String(db.e0||"");
  const zones = [];
  if(GRAVE_PATTERNS.some(r=>r.test(e))) zones.push('grave');
  if(HAND_PATTERNS.some(r=>r.test(e)))  zones.push('hand');
  const quick = QUICK_PATTERNS.some(r=>r.test(e));
  const res = zones.length ? {zones, quick} : null;
  ACT_ZONE_CACHE.set(db.n, res);
  return res;
}

/* カードが指定ゾーンから発動できるか（スクリプト宣言 → テキスト推定の順） */
function canActivateFromZone(db, zone){
  const sc = CARD_SCRIPTS[db.n];
  if(sc){
    if(!sc.activateFrom) return false;
    return sc.activateFrom.indexOf(zone) >= 0;
  }
  const det = detectActivateZones(db);
  return !!(det && det.zones.indexOf(zone) >= 0);
}
/* 相手ターン中にも撃てるか */
function isQuickFromZone(db){
  const sc = CARD_SCRIPTS[db.n];
  if(sc) return sc.quickEffect !== false;
  const det = detectActivateZones(db);
  return !!(det && det.quick);
}

/* 相手ターン中に発動できる自分のカードを集める。
   1103は伏せの読み合いが肝なので、非手番側の罠・速攻魔法をすぐ撃てるようにする。
   返り値: [{p, zone, index, db, ss}] */
/* 相手ターン中に発動できる自分のカードを集める。
   魔法罠ゾーンだけでなく、スクリプトが activateFrom で宣言した場所
   （墓地・手札・除外など）も対象にする。
   例：ネクロ・ガードナー（墓地で除外して発動）、手札誘発。 */
function reactableCards(p){
  const P = gameState.players[p];
  const out = [];
  const seen = new Set();

  /* ① 魔法・罠ゾーン（従来どおり） */
  P.sz.forEach((c,i)=>{
    const db = dbOf(c);
    const isTrap  = db.k==='t';
    const isQuick = db.k==='s' && db.sub==='速攻';
    if(isTrap || isQuick || c.face==='up'){
      out.push({p, zone:'sz', index:i, db, ss: isTrap ? (db.sub==='カウンター'?3:2) : (isQuick?2:1)});
      seen.add('sz:'+i);
    }
  });
  if(P.field){
    out.push({p, zone:'field', index:0, db:dbOf(P.field), ss:1});
  }

  /* ② 墓地・手札などから発動できるカード
     スクリプトが activateFrom を宣言していればそれを使う。
     未実装カードは効果テキストから推定する（誤検出しても選ばなければ発動しない）。 */
  const zones = ['grave','hand','banish','mz'];
  zones.forEach(zone=>{
    const arr = zone==='mz' ? P.mz : P[zone];
    (arr||[]).forEach((c,i)=>{
      if(!c) return;
      const db = dbOf(c);
      if(!canActivateFromZone(db, zone)) return;
      if(!isQuickFromZone(db)) return;          // 相手ターンに撃てないものは除く
      const sc = CARD_SCRIPTS[db.n];
      // スクリプトがあれば発動条件も確認する
      if(sc && sc.condition){
        const ctx = makeContext(p, c, zone, i, "react", {});
        let ok = true;
        try{ ok = sc.condition(ctx); }catch(e){ ok = false; }
        if(!ok) return;
      }
      out.push({p, zone, index:i, db,
                ss: sc ? (sc.priority||2) : 2,
                script: !!sc});
    });
  });
  return out;
}

/* 非手番プレイヤー（＝相手ターン中の自分）の番号 */
function reactingPlayer(){ return gameState.activePlayer===0 ? 1 : 0; }

/* 相手ターン中の割り込みパネル */
function openReact(){
  const rp = reactingPlayer();
  const list = reactableCards(rp);
  if(!list.length){
    sheet.innerHTML = `<div class="grip"></div>
      <h3 style="margin-bottom:6px">${nameOf(rp)}の割り込み</h3>
      <div class="meta" style="margin-bottom:12px">
        発動できる伏せカードがありません。<br>
        罠・速攻魔法を伏せていると、ここから相手ターン中に発動できます。</div>
      <button class="close" onclick="closeSheet()">閉じる</button>`;
    veil.classList.add("on"); return;
  }
  const rows = list.map(it=>{
    const P = gameState.players[rp];
    const card = it.zone==='field' ? P.field : (P[it.zone]||[])[it.index];
    const hidden = card && card.face==='down' && (it.zone==='sz'||it.zone==='field');
    const eff = hasEffect(it.db.n);
    // 発動場所を明示する（墓地・手札からの発動が分かるように）
    const where = it.zone==='sz'||it.zone==='field' ? "" :
      `<span class="rk-zone">${zoneJp(it.zone)}</span>`;
    const kind = it.db.k==='t'?'罠' : it.db.k==='s'?'魔法' : 'モンスター';
    const auto = it.script ? ' ⚡自動' : (eff ? ' ⚡' : ' 手動');
    return `<div class="act pick-row" onclick="reactActivate(${rp},'${it.zone}',${it.index})">
      <span class="pk-nm">${it.db.n}${hidden?'<span class="rk-set">伏</span>':''}${where}</span>
      <span class="pk-sub">${kind}${it.db.sub?'・'+it.db.sub:''} SS${it.ss}${auto}</span>
    </div>`;
  }).join("");
  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:4px">${nameOf(rp)}の割り込み</h3>
    <div class="meta" style="margin-bottom:10px">
      相手ターン中に発動できるカードです。タップすると表側にしてチェーンに積みます。</div>
    <div class="pick-list">${rows}</div>
    <button class="close" onclick="closeSheet()">閉じる</button>`;
  veil.classList.add("on");
}

/* 割り込み発動：表side にしてチェーンへ積む（効果があれば自動処理も選べる） */
function reactActivate(p, zone, index){
  const P = gameState.players[p];
  const card = zone==='field' ? P.field : (P[zone]||[])[index];
  if(!card){ showToast("カードがありません"); return; }
  const db = dbOf(card);
  const nm = db.n||"";
  const eff = hasEffect(nm);
  const sc  = CARD_SCRIPTS[nm];
  const ss  = sc && sc.priority ? sc.priority
            : (db.k==='t' ? (db.sub==='カウンター'?3:2) : (db.sub==='速攻'?2:1));
  closeSheet();
  // 場に伏せてあるカードだけ表にする（墓地・手札からの発動は不要）
  if(card.face==='down' && (zone==='sz' || zone==='field' )){
    act({type:"FX_SET_STATE", player:p, zone, index, face:"up", reason:"発動"});
  }
  // チェーンに積む
  act({type:"CHAIN_ADD", player:p, cardId:card.id, name:nm, ss, from:zone, index});
  // 解決方法を選ばせる。スクリプトが無くても手動パレットで処理できる。
  setTimeout(()=>{
    const auto = eff
      ? `<div class="act fx" onclick="closeSheet();resolveReact(${p},'${zone}',${index},${jsStr(nm)})">⚡ 解決して効果を処理</div>`
      : "";
    const eff_txt = db.e ? `<div class="eff">${String(db.e).replace(/\n/g,"<br>")}</div>` : "";
    sheet.innerHTML = `<div class="grip"></div>
      <h3 style="margin-bottom:4px">${nm}</h3>
      <div class="meta" style="margin-bottom:8px">チェーン${gameState.chain.length}に積みました（${zoneJp(zone)}から発動）。<br>
        相手がチェーンしないなら解決できます。</div>
      ${eff_txt}
      <div class="act-grid wide">
        ${auto}
        <div class="act" onclick="closeSheet();manualResolveReact(${p},'${zone}',${index},${jsStr(nm)})">手動で処理する…</div>
        <div class="act" onclick="closeSheet();openChain()">チェーンを確認する</div>
      </div>`;
    veil.classList.add("on");
  }, 60);
}
/* スクリプトが無いカードを手動で解決する。
   チェーンを解決してから汎用パレットを開き、コストの除外/墓地送りも案内する。 */
function manualResolveReact(p, zone, index, nm){
  if(gameState.chain.length) act({type:"CHAIN_RESOLVE_TOP"});
  openPrimitives(p, zone, index, nm);
}
/* 割り込みカードを解決して効果まで処理する */
function resolveReact(p, zone, index, nm){
  // チェーンから取り除く
  if(gameState.chain.length) act({type:"CHAIN_RESOLVE_TOP"});
  const db = CARD_DB[findCardIndex(nm)]||{};
  const keep = (db.sub==="永続" || db.sub==="フィールド" || db.sub==="装備");
  runEffect(p, nm, {zone, index, keep});
  render();
}
/* =========================================================================
   フェーズごとの行動制限（1103準拠）
   ドローフェイズ／スタンバイは通常召喚も攻撃もできず、
   撃てるのはスペルスピード2以上（速攻魔法・罠）だけ。
   ========================================================================= */
const PHASE_RULES = {
  draw:    { draw:true,  normalSummon:false, setCard:false, activateS1:false, attack:false, exSummon:false,
             note:"ドロー／速攻魔法・罠のみ" },
  standby: { draw:false, normalSummon:false, setCard:false, activateS1:false, attack:false, exSummon:false,
             note:"速攻魔法・罠のみ" },
  main1:   { draw:false, normalSummon:true,  setCard:true,  activateS1:true,  attack:false, exSummon:true,
             note:"召喚・セット・発動" },
  battle:  { draw:false, normalSummon:false, setCard:false, activateS1:false, attack:true,  exSummon:false,
             note:"攻撃宣言／速攻魔法・罠" },
  main2:   { draw:false, normalSummon:true,  setCard:true,  activateS1:true,  attack:false, exSummon:true,
             note:"召喚・セット・発動" },
  end:     { draw:false, normalSummon:false, setCard:false, activateS1:false, attack:false, exSummon:false,
             note:"手札7枚調整／速攻魔法・罠" },
};
function rules(){ return PHASE_RULES[gameState.phase] || PHASE_RULES.main1; }
/* スペルスピード判定 */
function spellSpeedOf(db){
  if(!db) return 1;
  if(db.k==='t') return db.sub==='カウンター' ? 3 : 2;
  if(db.k==='s' && db.sub==='速攻') return 2;
  return 1;
}
/* そのカードが今のフェーズで発動できるか。
   スペルスピード2以上（速攻魔法・罠）はいつでも発動できる。 */
function canActivateNow(db){
  if(spellSpeedOf(db) >= 2) return true;
  return rules().activateS1;
}
/* 制限に引っかかった時の理由文 */
function whyBlocked(what){
  const ph = phaseJp(gameState.phase);
  const msg = {
    normalSummon:`${ph}では通常召喚できません`,
    setCard:`${ph}ではセットできません`,
    activateS1:`${ph}では通常魔法・起動効果は発動できません（速攻魔法・罠のみ）`,
    attack:`${ph}では攻撃できません`,
    exSummon:`${ph}ではEX召喚できません`,
  };
  return msg[what] || `${ph}ではその操作はできません`;
}


/* =========================================================================
   Step11-13: カードスクリプト基盤 / イベントシステム / デバッガー

   設計:
   - スクリプトは gameState を直接触らない。必ず API 経由。
   - API は内部で act()（=applyAction）を呼ぶので Undo/Redo が効く。
   - スクリプトは UI/DOM を触らない。対象選択は API が担当する。
   - 処理の各段階は scriptLog に記録され、デバッガーで追える。
   ========================================================================= */

/* ---- デバッガー用トレース ---- */
function traceStart(name){
  gameState.scriptLog = gameState.scriptLog || [];
  gameState.scriptLog.unshift({name, t:Date.now(), steps:[]});
  if(gameState.scriptLog.length>20) gameState.scriptLog.pop();
}
function trace(msg, ok){
  const cur = (gameState.scriptLog||[])[0];
  if(cur) cur.steps.push({msg, ok: ok!==false});
}

/* ---- context を組み立てる ---- */
function makeContext(p, card, zone, index, eventName, extra){
  const gs = gameState;
  return Object.assign({
    gameState: gs,
    player: p,
    opponent: p===0?1:0,
    card, zone, index,
    phase: gs.phase,
    turn: gs.turn,
    chainDepth: gs.chain.length,
    priority: gs.priority,
    eventName: eventName||null,
    targetCandidates: [],
    selectedTargets: [],
    reason: "",
    debug: [],
  }, extra||{});
}

/* =========================================================================
   共通API（スクリプトが使える唯一の手段）
   すべて act() 経由なので Undo が効く。
   ========================================================================= */
const API = {
  /* --- 情報取得（読み取り専用） --- */
  me(ctx){ return gameState.players[ctx.player]; },
  foe(ctx){ return gameState.players[ctx.opponent]; },
  db(card){ return CARD_DB[card.id]||{}; },
  /* 場のカードを列挙 [{p, zone, index, card, db}] */
  fieldCards(opts){
    const o = opts||{};
    const out=[];
    [0,1].forEach(p=>{
      if(o.player!=null && o.player!==p) return;
      const P=gameState.players[p];
      if(o.zone==null || o.zone==='mz') P.mz.forEach((c,i)=>out.push({p,zone:'mz',index:i,card:c,db:dbOf(c)}));
      if(o.zone==null || o.zone==='sz') P.sz.forEach((c,i)=>out.push({p,zone:'sz',index:i,card:c,db:dbOf(c)}));
      if((o.zone==null || o.zone==='field') && P.field) out.push({p,zone:'field',index:0,card:P.field,db:dbOf(P.field)});
    });
    return o.filter ? out.filter(o.filter) : out;
  },
  pileCards(p, zone, filter){
    const arr = gameState.players[p][zone]||[];
    const out = arr.map((c,i)=>({p, zone, index:i, card:c, db:dbOf(c)}));
    return filter ? out.filter(filter) : out;
  },

  /* --- 盤面操作プリミティブ --- */
  destroy(t, reason){ trace(`destroy: ${labelOf(t.card)}`); act({type:"FX_TO_GRAVE", player:t.p, zone:t.zone, index:t.index, reason}); },
  destroyAll(zone, player, reason){
    trace(`destroyAll: ${zoneJp(zone)}${player!=null?`(${nameOf(player)})`:"(両者)"}`);
    const ps = player!=null ? [player] : [0,1];
    ps.forEach(p=>act({type:"FX_WIPE_ZONE", player:p, zone, reason}));
  },
  sendToGrave(t, reason){ trace(`sendToGrave: ${labelOf(t.card)}`); act({type:"FX_TO_GRAVE", player:t.p, zone:t.zone, index:t.index, reason}); },
  specialSummon(p, from, index, pos, reason){
    trace(`specialSummon: ${from}[${index}] → ${pos||'atk'}`);
    act({type:"FX_SPECIAL_SUMMON", player:p, from, fromIndex:index, pos:pos||'atk', reason});
  },
  searchDeck(p, deckIndex, reason){ trace(`search: deck[${deckIndex}]`); act({type:"FX_SEARCH", player:p, deckIndex, reason}); },
  mill(p, deckIndex, reason){ trace(`mill: deck[${deckIndex}]`); act({type:"FX_MILL", player:p, deckIndex, reason}); },
  millTop(p, n, reason){ trace(`millTop: ${n}`); act({type:"FX_MILL_TOP", player:p, n, reason}); },
  discard(p, handIndex, reason){ trace(`discard: hand[${handIndex}]`); act({type:"FX_DISCARD", player:p, handIndex, reason}); },
  returnToHand(t, reason){ trace(`returnToHand: ${labelOf(t.card)}`); act({type:"FX_BOUNCE", player:t.p, zone:t.zone, index:t.index, reason}); },
  returnToDeck(t, toBottom, reason){ trace(`returnToDeck: ${labelOf(t.card)}`); act({type:"FX_RETURN_DECK", player:t.p, zone:t.zone, index:t.index, toBottom, reason}); },
  banish(t, reason){ trace(`banish: ${labelOf(t.card)}`); act({type:"FX_BANISH", player:t.p, zone:t.zone, index:t.index, reason}); },
  changePosition(t, pos, reason){ trace(`changePosition: ${labelOf(t.card)} → ${pos}`); act({type:"FX_SET_STATE", player:t.p, zone:t.zone, index:t.index, pos, reason}); },
  flip(t, face, reason){ trace(`flip: ${labelOf(t.card)} → ${face}`); act({type:"FX_SET_STATE", player:t.p, zone:t.zone, index:t.index, face, reason}); },
  negate(t, reason){ trace(`negate: ${labelOf(t.card)}`); act({type:"FX_NEGATE", player:t.p, zone:t.zone, index:t.index, reason}); },
  overlay(p, targetMz, from, fromIndex){ trace(`overlay`); act({type:"FX_OVERLAY", player:p, targetMz, from, fromIndex}); },
  detachMaterial(p, mzIndex, reason){ trace(`detach: mz[${mzIndex}]`); act({type:"FX_DETACH", player:p, mzIndex, reason}); },
  shuffle(p){ trace(`shuffle`); act({type:"SHUFFLE", player:p}); },
  draw(p, n){ trace(`draw: ${n||1}`); act({type:"DRAW", player:p, n:n||1}); },
  damageLP(p, amount){ trace(`damage: ${nameOf(p)} -${amount}`); act({type:"LP", player:p, delta:-Math.abs(amount)}); },
  recoverLP(p, amount){ trace(`recover: ${nameOf(p)} +${amount}`); act({type:"LP", player:p, delta:Math.abs(amount)}); },
  payCost(p, amount){ trace(`payCost: ${amount}`); act({type:"LP", player:p, delta:-Math.abs(amount)}); },
  /* コントロール奪取（強奪など）。場のカードを相手の場へ移す */
  changeControl(t, toPlayer, reason){
    trace(`changeControl: ${labelOf(t.card)} → ${nameOf(toPlayer)}`);
    snapshot();
    const P = gameState.players[t.p];
    const arr = t.zone==='field' ? null : P[t.zone];
    let card;
    if(t.zone==='field'){ card = P.field; P.field=null; }
    else { card = arr.splice(t.index,1)[0]; }
    if(!card) return;
    const D = gameState.players[toPlayer];
    if(t.zone==='field'){ D.field = card; } else { D[t.zone].push(card); }
    card.controller = toPlayer;
    logIt(gameState, `${reason||"効果"}：${cardName(card)} のコントロールが ${nameOf(toPlayer)} へ`);
    render();
  },
  /* --- チェーン --- */
  addChainLink(p, card, name, ss, zone, index){
    trace(`addChainLink: ${name} (SS${ss})`);
    act({type:"CHAIN_ADD", player:p, cardId:card?card.id:0, name, ss, from:zone, index});
  },
  resolveChainLink(){ trace(`resolveChainLink`); act({type:"CHAIN_RESOLVE_TOP"}); },
  /* --- 発動待ち・予約 --- */
  registerPendingEffect(p, name, note){ trace(`pending: ${name}`); act({type:"PENDING_ADD", player:p, name, note}); },
  registerReserveEffect(p, name, at, note){ trace(`reserve: ${name}@${at}`); act({type:"RESERVE_ADD", player:p, name, at, note}); },
  /* --- フラグ --- */
  setFlag(p, key, val, temporary){
    snapshot();
    const P = gameState.players[p];
    (temporary ? P.temporaryFlags : P.effectFlags)[key] = val;
    render();
  },
  getFlag(p, key){
    const P = gameState.players[p];
    return P.effectFlags[key] ?? P.temporaryFlags[key];
  },
  /* --- 選択（UI担当。スクリプトはコールバックを受け取るだけ） --- */
  selectCard(title, candidates, onPick, note){
    trace(`selectCard: ${candidates.length}件`);

/* =========================================================================
   カードスクリプト定義
   condition / selectTargets / resolve / afterResolve / passive
   ========================================================================= */
const CARD_SCRIPTS = {};
/* 登録ヘルパ。name をキーにする（このアプリはカード名で引くため） */
function defineScript(name, def){ CARD_SCRIPTS[name] = Object.assign({name}, def); }

/* 自身を墓地へ送る標準の後処理（通常魔法・通常罠） */
function selfToGrave(ctx){
  if(!ctx.zone || ctx.keep) return;
  trace(`afterResolve: 自身を墓地へ`);
  act({type:"FX_SELF_TO_GRAVE", player:ctx.player, zone:ctx.zone, index:ctx.index});
}

/* ---- スクリプト実行（発動条件 → 対象選択 → 解決 → 後処理） ---- */
function runScript(name, p, zone, index, opts){
  const sc = CARD_SCRIPTS[name];
  if(!sc) return false;
  const P = gameState.players[p];
  const card = zone ? zoneCard(P, zone, index) : null;
  const ctx = makeContext(p, card, zone, index, "activate", opts||{});
  traceStart(name);

  // 1. 発動条件
  if(sc.condition){
    const ok = sc.condition(ctx);
    if(!ok){
      trace(`発動条件 NG：${ctx.reason||"条件を満たしていません"}`, false);
      showToast(ctx.reason || `${name} は今発動できません`);
      render();
      return true;
    }
  }
  trace(`発動条件 OK`);

  // 2. 対象選択 → 3. 解決 → 4. 後処理
  const finish = ()=>{
    if(sc.afterResolve) sc.afterResolve(ctx); else selfToGrave(ctx);
    trace(`解決終了`);
    render();
  };
  if(sc.selectTargets){
    sc.selectTargets(ctx, (targets)=>{
      ctx.selectedTargets = targets||[];
      trace(`対象確定：${ctx.selectedTargets.map(t=>labelOf(t.card)).join("、")||"なし"}`);
      sc.resolve(ctx);
      finish();
    });
  } else {
    sc.resolve(ctx);
    finish();
  }
  return true;
}

/* =========================================================================
   イベントシステム
   イベント発火 → 該当スクリプトの passive を評価 → 候補提示
   ========================================================================= */
const EVENTS = [
  "onDraw","onSummon","onNormalSummon","onSpecialSummon","onSet","onFlip",
  "onAttackDeclare","onDamageStep","onBattleDestroy","onSendToGrave","onDestroy",
  "onRemove","onChainStart","onChainResolve","onEndPhase","onStandbyPhase",
  "onPhaseChange","onTurnStart","onTurnEnd","onLPChange","onTargetDeclared","onCardActivate"
];

/* 発火候補を集める。場・手札・墓地のカードでハンドラを持つものを探す */
function collectHandlers(eventName, evt){
  const out = [];
  [0,1].forEach(p=>{
    const P = gameState.players[p];
    const scan = (zone, arr)=>{
      (arr||[]).forEach((c,i)=>{
        if(!c) return;
        const nm = dbOf(c).n;
        const sc = CARD_SCRIPTS[nm];
        const h  = sc && sc.passive && sc.passive[eventName];
        if(!h) return;
        const ctx = makeContext(p, c, zone, i, eventName, {event:evt||{}});
        // 条件を満たすものだけ候補にする
        let ok = true;
        try{ ok = h(ctx); }catch(e){ ok = false; }
        if(ok) out.push({p, zone, index:i, card:c, name:nm, ctx});
      });
    };
    scan('mz', P.mz); scan('sz', P.sz);
    if(P.field) scan('field', [P.field]);
    scan('hand', P.hand); scan('grave', P.grave);
  });
  return out;
}

/* イベント発火。候補があればプレイヤーに提示する（自動発動はしない） */
function emitEvent(eventName, evt){
  const cands = collectHandlers(eventName, evt);
  if(!cands.length) return false;
  // 相手の誘発を優先して出す（激流葬・奈落など）
  const rp = reactingPlayer();
  cands.sort((a,b)=> (a.p===rp?-1:1) - (b.p===rp?-1:1));
  setTimeout(()=>{
    const rows = cands.map((c,i)=>
      `<div class="act pick-row" onclick="__evtPick(${i})">
         <span class="pk-nm">${c.name}</span>
         <span class="pk-sub">${nameOf(c.p)}・${zoneJp(c.zone)}</span>
       </div>`).join("");
    sheet.innerHTML = `<div class="grip"></div>
      <h3 style="margin-bottom:4px">${eventJp(eventName)}</h3>
      <div class="meta" style="margin-bottom:10px">発動できるカードがあります。使用しますか？</div>
      <div class="pick-list">${rows}</div>
      <button class="close" onclick="__evtSkip()">発動しない</button>`;
    EVT_CANDS = cands;
    veil.classList.add("on");
  }, 60);
  return true;
}
let EVT_CANDS = [], EVT_AFTER = null;
function __evtPick(i){
  const c = EVT_CANDS[i]; EVT_CANDS=[];
  closeSheet();
  if(c) runScript(c.name, c.p, c.zone, c.index, {event:c.ctx.event});
}
function __evtSkip(){
  EVT_CANDS=[]; closeSheet();
  const f = EVT_AFTER; EVT_AFTER=null;
  if(f) f();
}
function eventJp(e){
  return ({
    onDraw:"ドロー時", onSummon:"召喚時", onNormalSummon:"通常召喚時",
    onSpecialSummon:"特殊召喚時", onSet:"セット時", onFlip:"反転時",
    onAttackDeclare:"攻撃宣言時", onDamageStep:"ダメージステップ", onBattleDestroy:"戦闘破壊時",
    onSendToGrave:"墓地へ送られた時", onDestroy:"破壊された時", onRemove:"場を離れた時",
    onChainStart:"チェーン開始", onChainResolve:"チェーン解決", onEndPhase:"エンドフェイズ",
    onStandbyPhase:"スタンバイフェイズ", onPhaseChange:"フェーズ変更", onTurnStart:"ターン開始",
    onTurnEnd:"ターン終了", onLPChange:"LP変動", onTargetDeclared:"対象宣言", onCardActivate:"カード発動"
  })[e] || e;
}

function hasEffect(name){
  return !!(CARD_SCRIPTS[name] || CARD_EFFECT[name] || AUTO_EFFECT[name]);
}
/* 発動トリガ種別（召喚時 / 起動）。宣言テーブルのみ持つ */
function effectTrigger(name){
  const e = AUTO_EFFECT[name];
  return e ? e.trig : "ignition";
}
/* 効果を実行する。selfLoc={zone,index,keep} */
function runEffect(p, name, selfLoc){
  // ① カードスクリプト（Step11の正式基盤）を最優先
  if(CARD_SCRIPTS[name]){
    const loc = selfLoc||{};
    return runScript(name, p, loc.zone, loc.index, {keep:loc.keep});
  }
  // ② 旧・個別実装 ③ 宣言テーブル の順にフォールバック
  const fn = CARD_EFFECT[name];
  if(fn){ fn(p, selfLoc); return true; }
  const ent = AUTO_EFFECT[name];
  if(ent){ runAutoEffect(p, name, ent, selfLoc); return true; }
  return false;
}
/* 召喚成功時に誘発する効果を自動で提示する */

/* =========================================================================
   割り込み確認
   召喚・魔法罠の発動など「相手が反応できる場面」で、
   相手が撃てる伏せを持っていれば確認を出す。
   （激流葬・奈落・神の宣告などを撃ち逃さないため）
   ========================================================================= */
let ASK_CHAIN = true;               // メニューでON/OFFできる
function askChain(triggerLabel, onContinue){
  const rp = reactingPlayer();
  const n  = ASK_CHAIN ? reactableCards(rp).length : 0;
  if(!n){ if(onContinue) onContinue(); return; }
  PENDING_CONTINUE = onContinue || null;
  setTimeout(()=>{
    sheet.innerHTML = `<div class="grip"></div>
      <h3 style="margin-bottom:4px">${triggerLabel}</h3>
      <div class="meta" style="margin-bottom:10px">
        <b style="color:var(--trap)">${nameOf(rp)}</b> は発動できるカードを ${n}枚 持っています。<br>
        チェーンしますか？</div>

/* =========================================================================
   UI アクション → applyAction → render のラッパ
   ========================================================================= */
/* ---- Undo（複数段階）＆ このターンにやったこと ---- */
const HISTORY = [];              // 直前スナップショットのスタック
const HISTORY_MAX = 40;
let turnActions = [];            // このターンの短い履歴チップ

/* SET_PHASE / PASS_TURN / SHUFFLE / LOAD_DECK はチップに出さない（ノイズ削減） */
const CHIP_SKIP = new Set(["SET_PHASE","PASS_TURN","SHUFFLE","LOAD_DECK","CHAIN_CLEAR"]);

function snapshot(){
  // 構造が単純なので JSON でディープコピー（DBは別なので安全）
  HISTORY.push(JSON.stringify(gameState));
  if(HISTORY.length>HISTORY_MAX) HISTORY.shift();
  REDO.length = 0;                 // 新しい操作をしたらRedoは破棄
}
/* Redo：Undoで戻した操作をやり直す */
function redo(){
  if(!REDO.length) return;
  HISTORY.push(JSON.stringify(gameState));
  gameState = JSON.parse(REDO.pop());
  render();
}
function act(a){
  snapshot();
  const beforeTurn = gameState.turn;
  applyAction(gameState, a);
  // ターンが変わったらチップ履歴をリセット
  if(gameState.turn !== beforeTurn) turnActions = [];
  const chip = chipFor(a);
  if(chip) turnActions.push(chip);
  render();
}
const REDO = [];
function undo(){
  if(!HISTORY.length) return;
  REDO.push(JSON.stringify(gameState));
  if(REDO.length>HISTORY_MAX) REDO.shift();
  gameState = JSON.parse(HISTORY.pop());
  // チップは厳密復元が難しいので直近1つを削るだけ（実用上これで十分）
  turnActions.pop();
  render();
}
/* action を短い日本語チップに変換（このターンにやったこと用） */
function chipFor(a){
  if(CHIP_SKIP.has(a.type)) return null;
  const P = gameState.players[a.player ?? gameState.activePlayer];
  const nm = (c)=> c ? (CARD_DB[c.id]?.n || "カード") : "カード";
  switch(a.type){
    case "DRAW": return `ドロー${(a.n??1)>1?`×${a.n}`:""}`;
    case "LP":   return `LP${a.delta>0?"+":""}${a.delta}`;
    case "MOVE": {
      const to = a.to;
      const label = {mz:"召喚/特殊",sz:"魔法罠",field:"フィールド",grave:"墓地",banish:"除外",hand:"手札戻し",deck:"デッキ戻し",ex:"EX"}[to]||to;
      const faceTag = a.face==='down' ? "セット" : label;
      return faceTag;
    }
    case "FLIP": return "反転";
    case "TOGGLE_POS": return "表示形式変更";
    case "ATTACK": return a.target==='direct' ? "直接攻撃" : "攻撃宣言";
    case "CHAIN_ADD": return `${a.name}発動`;
    case "CHAIN_RESOLVE_TOP": return "チェーン解決";
    default: return null;
  }
}

function doPhase(id){ act({type:"SET_PHASE", phase:id}); }
function doPhaseNext(){
  const i = PHASES.findIndex(x=>x.id===gameState.phase);
  if(i < PHASES.length-1){
    act({type:"SET_PHASE", phase:PHASES[i+1].id});
    const ph = gameState.phase;
    emitEvent("onPhaseChange", {phase:ph}) ||
      (ph==="standby" && emitEvent("onStandbyPhase", {phase:ph})) ||
      (ph==="end" && emitEvent("onEndPhase", {phase:ph}));
  }
}
function doPhasePrev(){
  const i = PHASES.findIndex(x=>x.id===gameState.phase);
  if(i > 0) act({type:"SET_PHASE", phase:PHASES[i-1].id});
}
function doPass(){
  emitEvent("onTurnEnd", {turn:gameState.turn});
  act({type:"PASS_TURN"});
  emitEvent("onTurnStart", {turn:gameState.turn});
}
function doDraw(){ act({type:"DRAW", n:1}); }
function doShuffle(){ act({type:"SHUFFLE"}); }
function doLP(d){ act({type:"LP", player:gameState.activePlayer, delta:d}); }
function lpAdj(p,d){ act({type:"LP", player:p, delta:d}); }

/* ================= ライフ計算機 =================
   LP値をタップして開く。数値入力＋よく使う値、半分/倍（1103は「LPを半分払って」が多い）。 */
let LP_TARGET = 0;
let LP_INPUT  = "";
function openLP(p){
  LP_TARGET = p; LP_INPUT = "";
  renderLP();
}
function renderLP(){
  const p = LP_TARGET;
  const P = gameState.players[p];
  const cur = P.lp;
  const val = parseInt(LP_INPUT||"0",10);
  const after刻 = (d)=> Math.max(0, cur + d);
  const keys = ["7","8","9","4","5","6","1","2","3","00","0","←"];
  const keyHTML = keys.map(k=>
    `<button class="lp-key" onclick="lpKey('${k}')">${k}</button>`
  ).join("");
  const quick = [100,200,300,500,800,1000,1500,2000,2500,3000]
    .map(n=>`<button class="lp-quick" onclick="lpSet(${n})">${n}</button>`).join("");

  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:4px">${nameOf(p)} のライフ</h3>
    <div class="lp-now">現在 <b>${cur}</b>${LP_INPUT?` → <span class="lp-prev">${after刻(-val)}</span> / <span class="lp-prev up">${after刻(val)}</span>`:""}</div>

    <div class="lp-display">${LP_INPUT||"0"}</div>

    <div class="lp-quickrow">${quick}</div>

    <div class="lp-pad">${keyHTML}</div>

    <div class="lp-ops">
      <button class="lp-op dmg" onclick="lpApply(-1)">− ダメージ</button>
      <button class="lp-op heal" onclick="lpApply(1)">＋ 回復</button>
    </div>
    <div class="act-label">よく使う</div>
    <div class="act-grid">
      <div class="act" onclick="lpHalf()">LPを半分にする</div>
      <div class="act" onclick="lpSetExact()">この値ちょうどにする</div>
    </div>
    <button class="close" onclick="closeSheet()">閉じる</button>`;
  veil.classList.add("on");
}
function lpKey(k){
  if(k==="←"){ LP_INPUT = LP_INPUT.slice(0,-1); }
  else if(LP_INPUT.length < 5){ LP_INPUT = (LP_INPUT==="0"?"":LP_INPUT) + k; }
  renderLP();
}
function lpSet(n){ LP_INPUT = String(n); renderLP(); }
function lpApply(sign){
  const v = parseInt(LP_INPUT||"0",10);
  if(!v){ showToast("数値を入力してください"); return; }
  act({type:"LP", player:LP_TARGET, delta: sign*v});
  LP_INPUT = "";
  closeSheet();
}
function lpHalf(){
  const P = gameState.players[LP_TARGET];
  const half = Math.floor(P.lp/2);      // 端数切り捨て（払う側）
  act({type:"LP", player:LP_TARGET, delta: -(P.lp-half)});
  closeSheet();
}
function lpSetExact(){
  const v = parseInt(LP_INPUT||"",10);
  if(isNaN(v)){ showToast("数値を入力してください"); return; }
  const P = gameState.players[LP_TARGET];

}

let PRIM_SRC = null;
/* 発動元カード自身を処理する（墓地から除外する等のコスト） */
function primSelf(op){
  const src = PRIM_SRC;
  if(!src || !src.zone){ showToast("対象が特定できません"); return; }
  closeSheet();
  const t = {p:src.p, zone:src.zone, index:src.index, card:{}};
  if(op==='banish') act({type:"FX_BANISH", player:src.p, zone:src.zone, index:src.index, reason:src.name||"コスト"});
  else              act({type:"FX_TO_GRAVE", player:src.p, zone:src.zone, index:src.index, reason:src.name||"コスト"});
}

/* 処理を選んだあと、対象を選ばせて実行する */
function primPick(op){
  const src = PRIM_SRC || {p:gameState.activePlayer};
  const p = src.p;
  const fieldTargets = ()=>{
    const out=[];
    [0,1].forEach(pl=>{
      const P=gameState.players[pl];
      P.mz.forEach((c,i)=>out.push({pl,zone:'mz',i,c}));
      P.sz.forEach((c,i)=>out.push({pl,zone:'sz',i,c}));
      if(P.field) out.push({pl,zone:'field',i:0,c:P.field});
    });
    return out;
  };
  const listOf = (arr, pl, zone)=>arr.map((c,i)=>({
    label: labelOf(c), sub: `${nameOf(pl)}の${zoneJp(zone)}`, pl, zone, i, c
  }));

  const runOnField = (title, fn)=>{
    const t = fieldTargets();
    openPick(title, "場のカードから選ぶ", t.map(x=>({
      label: x.c.face==='down' ? "裏側のカード" : labelOf(x.c),
      sub: `${nameOf(x.pl)}・${zoneJp(x.zone)}`,
      onPick: ()=>fn(x)
    })));
  };

  switch(op){
    case 'destroy':
      runOnField("破壊するカード", x=>act({type:"FX_TO_GRAVE", player:x.pl, zone:x.zone, index:x.i, reason:src.name||"効果"}));
      break;
    case 'banish':
      runOnField("除外するカード", x=>act({type:"FX_BANISH", player:x.pl, zone:x.zone, index:x.i, reason:src.name||"効果"}));
      break;
    case 'bounce':
      runOnField("手札に戻すカード", x=>act({type:"FX_BOUNCE", player:x.pl, zone:x.zone, index:x.i, reason:src.name||"効果"}));
      break;
    case 'todeck':
      runOnField("デッキに戻すカード", x=>act({type:"FX_RETURN_DECK", player:x.pl, zone:x.zone, index:x.i, reason:src.name||"効果"}));
      break;
    case 'negate':
      runOnField("無効化するカード", x=>act({type:"FX_NEGATE", player:x.pl, zone:x.zone, index:x.i, reason:src.name||"効果"}));
      break;
    case 'position':
      runOnField("表示形式を変えるカード", x=>{
        const cur = x.c.pos==='atk'?'def':'atk';
        act({type:"FX_SET_STATE", player:x.pl, zone:x.zone, index:x.i, pos:cur, reason:src.name||"効果"});
      });
      break;
    case 'flip':
      runOnField("反転するカード", x=>act({type:"FX_SET_STATE", player:x.pl, zone:x.zone, index:x.i,
        face: x.c.face==='up'?'down':'up', reason:src.name||"効果"}));
      break;
    case 'overlay': {
      const P = gameState.players[p];
      const xyzMons = P.mz.map((c,i)=>({c,i})).filter(x=>x.c.xyz);
      if(!xyzMons.length){ showToast("素材を持てるモンスターがいません"); return; }
      openPick("素材を重ねる先", "", xyzMons.map(x=>({
        label: labelOf(x.c), sub:`素材${x.c.xyz.length}`,
        onPick: ()=>{
          const others = P.mz.map((c,i)=>({c,i})).filter(y=>y.i!==x.i);
          openPick("素材にするモンスター", "", others.map(y=>({
            label: labelOf(y.c), sub: subOf(y.c),
            onPick: ()=>act({type:"FX_OVERLAY", player:p, targetMz:x.i, from:"mz", fromIndex:y.i})
          })));
        }
      })));
      break;
    }
    case 'search': {
      const P = gameState.players[p];
      openPick("デッキから手札に加える", `デッキ${P.deck.length}枚`,
        P.deck.map((c,i)=>({label:labelOf(c), sub:subOf(c),
          onPick: ()=>act({type:"FX_SEARCH", player:p, deckIndex:i, reason:src.name||"効果"})})));
      break;
    }
    case 'mill': {
      const P = gameState.players[p];
      openPick("デッキから墓地へ送る", `デッキ${P.deck.length}枚`,
        P.deck.map((c,i)=>({label:labelOf(c), sub:subOf(c),
          onPick: ()=>act({type:"FX_MILL", player:p, deckIndex:i, reason:src.name||"効果"})})));
      break;
    }
    case 'revive': {
      const P = gameState.players[p];
      const mons = P.grave.map((c,i)=>({c,i})).filter(x=>dbOf(x.c).k==='m');
      openPick("墓地から特殊召喚", "", mons.map(x=>({label:labelOf(x.c), sub:subOf(x.c),
        onPick: ()=>act({type:"FX_SPECIAL_SUMMON", player:p, from:"grave", fromIndex:x.i, pos:"atk", reason:src.name||"効果"})})));
      break;
    }
    case 'graveBanish': {
      const P = gameState.players[p];
      openPick("墓地から除外", "", P.grave.map((c,i)=>({label:labelOf(c), sub:subOf(c),
        onPick: ()=>act({type:"FX_BANISH", player:p, zone:"grave", index:i, reason:src.name||"効果"})})));
      break;
    }
    case 'discard': {
      const P = gameState.players[p];
      openPick("捨てる手札", "", P.hand.map((c,i)=>({label:labelOf(c), sub:subOf(c),
        onPick: ()=>act({type:"FX_DISCARD", player:p, handIndex:i, reason:src.name||"コスト"})})));
      break;
    }
  }
}

/* 手札のカードをタップ */
function openHand(i){
  const P = gameState.players[gameState.activePlayer];
  const c = P.hand[i]; const db = CARD_DB[c.id]||{};
  const p = gameState.activePlayer;
  const nm = db.n||"";
  const eff = hasEffect(nm);
  const R = rules();
  const ph = phaseJp(gameState.phase);
  let primary = "", secondary = "";

  /* できない操作はグレーで理由を出す（消すと「なぜ無いのか」が分からないため） */
  const btn = (ok, label, onclick, why, cls)=> ok
    ? `<div class="act ${cls||''}" onclick="${onclick}">${label}</div>`
    : `<div class="act blocked" onclick="showToast('${why}')">${label}<span class="bk">${ph}不可</span></div>`;

  if(db.k==='m'){
    const nsLeft = !P.normalSummonUsed;
    const nsWhy  = !R.normalSummon ? whyBlocked('normalSummon') : 'このターンは既に通常召喚しています';
    primary =
      btn(R.normalSummon && nsLeft, "通常召喚（攻撃）", `doNormalSummon(${i},'atk')`, nsWhy) +
      btn(R.normalSummon && nsLeft, "通常召喚（守備）", `doNormalSummon(${i},'def')`, nsWhy) +
      btn(R.setCard && nsLeft,      "セット（裏守備）", `doSetMonster(${i})`, nsWhy) +
      `<div class="act" onclick="doSpecialFromHand(${i},'atk')">特殊召喚（攻撃）</div>
       <div class="act" onclick="doSpecialFromHand(${i},'def')">特殊召喚（守備）</div>`;
    // 手札で発動する誘発（スクリプト宣言 or テキスト推定）
    const scH = CARD_SCRIPTS[nm];
    if(canActivateFromZone(db, 'hand')){
      primary = (scH
        ? `<div class="act fx" onclick="closeSheet();runScript(${jsStr(nm)},${p},'hand',${i})">⚡ 手札から効果を発動</div>`
        : `<div class="act fx" onclick="closeSheet();openPrimitives(${p},'hand',${i},${jsStr(nm)})">⚡ 手札から効果を発動（手動）</div>`) + primary;
    } else if(eff && CARD_EFFECT[nm]){
      primary = `<div class="act fx" onclick="closeSheet();runEffect(${p},${jsStr(nm)},{zone:'hand',index:${i}})">⚡ 手札から効果を発動</div>` + primary;
    }
    secondary = `
      <div class="act" onclick="fromHand(${i},'grave')">墓地へ捨てる</div>
      <div class="act" onclick="fromHand(${i},'banish')">除外</div>
      <div class="act" onclick="fromHand(${i},'deck')">デッキトップへ</div>`;
  } else {
    const toField = db.sub==="フィールド";
    const dest = toField ? 'field' : 'sz';
    const canAct = canActivateNow(db);
    const ss = spellSpeedOf(db);
    const why = `${ph}では通常魔法は発動できません（速攻魔法・罠のみ）`;
    primary =
      (eff ? btn(canAct, "⚡ 発動（効果を自動処理）", `activateFromHand(${i})`, why, "fx") : "") +
      btn(canAct, "発動（チェーンへ）", `handActivate(${i})`, why) +
      btn(R.setCard, "セット（裏）", `doSetST(${i},${toField})`, whyBlocked('setCard'));
    secondary = `
      <div class="act" onclick="fromHand(${i},'grave')">墓地へ捨てる</div>
      <div class="act" onclick="fromHand(${i},'banish')">除外</div>`;
  }
  secondary += `<div class="act" onclick="closeSheet();openPrimitives(${p},'hand',${i},${jsStr(nm)})">手動で効果処理…</div>`;
  const ssTag = db.k!=='m' ? `<span class="ss-tag">SS${spellSpeedOf(db)}</span>` : "";
  sheet.innerHTML = metaHead(db) +
    `<div class="phase-note">${ph}：${R.note}${ssTag}</div>` +
    (eff?`<div class="fx-note">このカードは効果を自動処理できます</div>`:"") +
    `<div class="act-label">プレイ</div><div class="act-grid">${primary}</div>
     <div class="act-label">その他へ送る</div><div class="act-grid">${secondary}</div>
     <button class="close" onclick="closeSheet()">閉じる</button>`;
  veil.classList.add("on");
}

/* 手札から魔法・罠を発動 → 場に置いてから効果を自動処理 */
function activateFromHand(i){
  const p = gameState.activePlayer;
  const P = gameState.players[p];
  const c = P.hand[i]; const db = CARD_DB[c.id]||{};
  const nm = db.n||"";
  const toField = db.sub==="フィールド";
  const to = toField ? "field" : "sz";
  if(to==="sz" && P.sz.length>=ZONE_LIMITS.sz){ showToast("魔法・罠ゾーンが一杯です"); return; }
  if(to==="field" && P.field){ showToast("フィールドゾーンが埋まっています"); return; }
  closeSheet();
  act({type:"MOVE", player:p, from:"hand", fromIndex:i, to, face:"up"});
  const idx = (to==="field") ? 0 : P.sz.length-1;
  const keep = (db.sub==="永続" || db.sub==="フィールド" || db.sub==="装備");
  logIt(gameState, `<b>${nm}</b> を発動`);
  render();
  // 発動に対してチェーンできるので確認してから効果を処理する
  askChain(`${nm} の発動`, ()=>{ runEffect(p, nm, {zone:to, index:idx, keep}); render(); });
}

/* 手札から魔法罠を発動：ゾーンへ置いてからチェーンに積む */
function handActivate(i){
  const p = gameState.activePlayer;
  const P = gameState.players[p];
  const c = P.hand[i]; const db = CARD_DB[c.id]||{};
  const ss = spellSpeed(db);
  if(!canChainOnto(ss)){ alert(`スペルスピードが足りません（このカードSS${ss}）`); return; }
  const to = db.sub==="フィールド" ? "field" : "sz";
  if(to==="sz" && P.sz.length>=ZONE_LIMITS.sz){ alert("魔法罠ゾーンは5枚までです"); return; }
  if(to==="field" && P.field){ alert("フィールド魔法ゾーンは1枚までです"); return; }
  act({type:"MOVE", player:p, from:"hand", fromIndex:i, to, face:"up"});
  const idx = to==="field" ? 0 : P.sz.length-1;
  act({type:"CHAIN_ADD", player:p, cardId:c.id, name:db.n, ss, from:to, index:idx});
  closeSheet();
  openChain();
}

/* 場のカードをタップ（一人回し用：両サイドとも操作可） */
function openZone(p, zone, idx){
  const P = gameState.players[p];
  const c = zoneCard(P, zone, idx); if(!c) return;
  const db = CARD_DB[c.id]||{};
  const isMon = db.k==='m';
  const faceUp = c.face==='up';
  const canAttack = isMon && faceUp && c.pos==='atk';
  const R = rules();
  const ph = phaseJp(gameState.phase);
  const blockedBtn = (label, why)=>
    `<div class="act blocked" onclick="showToast('${why}')">${label}<span class="bk">${ph}不可</span></div>`;

  // 攻撃（表側攻撃表示モンスター、かつバトルフェイズのみ）
  const already = !!c.attacked;
  const attack = !canAttack ? ""
    : (!R.attack ? blockedBtn("攻撃宣言", whyBlocked('attack'))
      : already  ? blockedBtn("攻撃宣言", "このモンスターは既に攻撃しています")
      : `<div class="act" onclick="beginAttack(${p},${idx})">攻撃宣言</div>`);
  // 無効化・攻撃済みの状態表示
  const flags = [];
  if(c.attacked) flags.push('攻撃済');
  if(c.negated)  flags.push('無効');
  const flagNote = flags.length ? `<div class="flag-note">${flags.join(' / ')}</div>` : "";

  // 効果発動。自動処理できるカードは⚡付きで最優先に出す
  const nm = db.n||"";
  const eff = hasEffect(nm);
  const keep = (db.sub==="永続" || db.sub==="フィールド" || db.sub==="装備");
  const canAct = canActivateNow(db);
  const actWhy = `${ph}では通常魔法・起動効果は発動できません（速攻魔法・罠のみ）`;
  const autoAct = !eff ? ""
    : (canAct
        ? `<div class="act fx" onclick="activateFromZone(${p},'${zone}',${idx})">⚡ 効果を発動（自動処理）</div>`
        : blockedBtn("⚡ 効果を発動", actWhy));
  // エクシーズ素材の取り除き
  const detach = (zone==="mz" && c.xyz && c.xyz.length)
    ? `<div class="act" onclick="closeSheet();act({type:'FX_DETACH',player:${p},mzIndex:${idx},reason:'効果コスト'})">素材を1つ取り除く（残${c.xyz.length}）</div>`
    : "";
  const activate = !(!isMon || faceUp) ? ""
    : (canAct
        ? `<div class="act" onclick="chainAddFromZone(${p},'${zone}',${idx})">効果を発動（チェーンへ）</div>`
        : blockedBtn("効果を発動（チェーンへ）", actWhy));

  const state = `
    ${c.face==='down'?`<div class="act" onclick="zAct('FLIP',${p},'${zone}',${idx})">表にする（反転）</div>`:""}
    ${isMon?`<div class="act" onclick="zAct('TOGGLE_POS',${p},'${zone}',${idx})">表示形式を変更</div>`:""}`;
  const move = `
    <div class="act" onclick="zMove(${p},'${zone}',${idx},'grave')">墓地へ</div>
    <div class="act" onclick="zMove(${p},'${zone}',${idx},'banish')">除外</div>
    <div class="act" onclick="zMove(${p},'${zone}',${idx},'hand')">手札へ</div>
    <div class="act" onclick="zMove(${p},'${zone}',${idx},'deck')">デッキ上へ</div>`;

  const manual = `<div class="act" onclick="closeSheet();openPrimitives(${p},'${zone}',${idx},${jsStr(db.n||'')})">手動で効果処理…</div>`;
  const primary = autoAct + detach + attack + activate + manual;
  const hasPrimary = primary.trim().length>0;
  const hasState = state.trim().length>0;
  sheet.innerHTML = metaHead(db) +
    `<div class="phase-note">${ph}：${R.note}${db.k!=='m'?`<span class="ss-tag">SS${spellSpeedOf(db)}</span>`:""}</div>` + flagNote +
    (eff?`<div class="fx-note">このカードは効果を自動処理できます</div>`:"") +
    (hasPrimary ? `<div class="act-label">アクション</div><div class="act-grid">${primary}</div>` : "") +
    (hasState ? `<div class="act-label">状態</div><div class="act-grid">${state}</div>` : "") +
    `<div class="act-label">移動</div><div class="act-grid">${move}</div>
     <button class="close" onclick="closeSheet()">閉じる</button>`;
  veil.classList.add("on");
}

/* ================= 攻撃（戦闘専用UI） ================= */
function beginAttack(p, atkIdx){
  const oppP = gameState.players[p===0?1:0];
  const atkDB = CARD_DB[gameState.players[p].mz[atkIdx].id]||{};
  const aATK = atkDB.atk||0;
  // 対象候補：相手モンスター（表側／裏側とも）＋直接攻撃（相手モンスターが0なら）
  let targets = "";
  oppP.mz.forEach((c,i)=>{
    const db=CARD_DB[c.id]||{};
    const faceUp = c.face==='up';
    let cmp="", name;
    if(faceUp){
      const defending = c.pos==='def';
      const dVal = defending ? (db.def||0) : (db.atk||0);
      name = `${db.n}`;
      // 結果プレビュー
      let out;
      if(defending){
        out = aATK>dVal ? "破壊" : aATK<dVal ? `反射${dVal-aATK}` : "変化なし";
      } else {
        out = aATK>dVal ? `破壊+${aATK-dVal}` : aATK<dVal ? `自壊-${dVal-aATK}` : "相打ち";
      }
      cmp = `<span style="font-size:10px;color:var(--text-dim)"> ${defending?'守':'攻'}${dVal} → <b style="color:var(--gold-hi)">${out}</b></span>`;
    } else {
      name = "裏側のカード";
      cmp = `<span style="font-size:10px;color:var(--text-dim)"> 裏守備（要リバース処理）</span>`;
    }
    targets += `<div class="act" style="justify-content:flex-start;text-align:left" onclick="doAttack(${p},${atkIdx},${i})">${name}${cmp}</div>`;
  });
  const directOK = oppP.mz.length===0;
  const direct = directOK
    ? `<div class="act" onclick="doAttack(${p},${atkIdx},'direct')">直接攻撃（${aATK}ダメージ）</div>`
    : `<div class="act" style="opacity:.4">直接攻撃（相手モンスターがいる）</div>`;
  // 攻撃宣言時は相手の伏せに注意（1103はここが読み合いの山場）
  const rp = p===0?1:0;
  const rn = reactableCards(rp).length;
  const warn = rn
    ? `<div class="react-warn" onclick="openReact()">
         ${nameOf(rp)}は伏せカードを${rn}枚持っています — タップして割り込み
       </div>` : "";
  sheet.innerHTML = `<div class="grip"></div>
    <div class="bt-row"><span class="a-atk">${atkDB.n}</span><span class="vs">攻 ${aATK} で攻撃</span></div>
    ${warn}
    <div class="meta" style="margin-bottom:10px;text-align:center">対象を選ぶと戦闘処理・ダメージまで自動反映します（1103準拠）</div>
    ${targets? `<div class="act-label">相手モンスターへ</div><div class="act-grid wide">${targets}</div>`:""}
    <div class="act-label">プレイヤーへ</div><div class="act-grid">${direct}</div>
    <button class="close" onclick="closeSheet()">やめる</button>`;
  veil.classList.add("on");
}
function doAttack(p, atkIdx, target){
  closeSheet();
  const atkName = (CARD_DB[gameState.players[p].mz[atkIdx]?.id]||{}).n || "モンスター";
  const go = ()=>act({type:"ATTACK", player:p, atkIdx, target});
  // 攻撃宣言に誘発するカード（ミラーフォース・次元幽閉など）を提示
  EVT_AFTER = go;
  if(!emitEvent("onAttackDeclare", {player:p, atkIdx, target, name:atkName})){
    EVT_AFTER = null;
    askChain(`${atkName} の攻撃宣言`, go);
  }
}

/* ================= チェーン（手動・スペルスピード判定） ================= */
/* SS判定：カウンター罠=3、速攻魔法/通常罠/永続罠=2、それ以外(通常/永続/装備/フィールド魔法・モンスター効果)=1 */
function spellSpeed(db){
  if(db.k==='t'){ return db.sub==='カウンター' ? 3 : 2; }      // 罠は最低SS2、カウンターはSS3
  if(db.k==='s'){ return db.sub==='速攻' ? 2 : 1; }            // 速攻魔法のみSS2
  return 1;                                                     // モンスター効果は簡易的にSS1扱い
}
/* チェーンに新しく積めるか：既存の一番上のSS以上でなければ乗せられない */
function canChainOnto(ss){
  if(!gameState.chain.length) return true;
  const top = gameState.chain[gameState.chain.length-1];
  return ss >= top.ss;
}
function chainAddFromZone(p, zone, idx){
  const c = zoneCard(gameState.players[p], zone, idx);
  const db = CARD_DB[c.id]||{};
  const ss = spellSpeed(db);
  if(!canChainOnto(ss)){
    alert(`スペルスピードが足りません（このカードSS${ss} / 現在チェーン上はSS${gameState.chain[gameState.chain.length-1].ss}）`);
    return;
  }
  // 表側でなければ発動時に表にする（セット→発動）
  if(c.face==='down'){ c.face='up'; }
  act({type:"CHAIN_ADD", player:p, cardId:c.id, name:db.n, ss, from:zone, index:idx});
  closeSheet();
  openChain();
}
function chainAddFromHand(i){
  const p = gameState.activePlayer;
  const c = gameState.players[p].hand[i];
  const db = CARD_DB[c.id]||{};
  const ss = spellSpeed(db);
  if(!canChainOnto(ss)){
    alert(`スペルスピードが足りません（このカードSS${ss}）`);
    return;
  }
  act({type:"CHAIN_ADD", player:p, cardId:c.id, name:db.n, ss, from:"hand", index:i});
  closeSheet();
  openChain();
}
/* チェーンパネル：積んだ順を見せ、逆順に1つずつ解決。
   次に解決するリンク（＝一番上＝末尾）を強調し、次のアクションを明示する。 */
function openChain(){
  const ch = gameState.chain;
  if(!ch.length){
    sheet.innerHTML = `<div class="grip"></div><h3>チェーン</h3>
      <div class="act-label">チェーンは積まれていません</div>
      <div class="meta" style="margin-bottom:12px">場・手札のカードの「効果を発動（チェーンへ）」で積みます。<br>速攻魔法・罠は相手ターンでも積めます（スペルスピード判定あり）。</div>
      <button class="close" onclick="closeSheet()">閉じる</button>`;
    veil.classList.add("on"); return;
  }
  const topIdx = ch.length-1;              // 次に解決するリンク
  const topLink = ch[topIdx];

  // チェーン1が下、最後に積んだリンクが上。次に解決するもの＝上を resolving 表示。
  let rows = "";
  for(let i=ch.length-1;i>=0;i--){
    const link = ch[i];
    const resolving = i===topIdx;
    const order = resolving ? "次に解決" : `${topIdx-i+1}番目に解決`;
    rows += `<div class="chain-link ${resolving?'resolving':''}">
      <span class="cl-no">${i+1}</span>
      <span class="cl-nm">${link.name}</span>
      <span class="cl-ss">SS${link.ss}</span>
      <span class="cl-who">${nameOf(link.player)}</span>
      <span class="cl-tag">${order}</span>
    </div>`;
  }

  const nextHint = `<div class="chain-next-hint">▶ 次に解決：チェーン${topIdx+1}「${topLink.name}」<br><span style="font-size:10px;color:var(--text-dim);font-weight:400">効果は手動で処理してから下のボタンで解決</span></div>`;

  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:8px">チェーン処理（${ch.length}）</h3>
    <div class="meta" style="margin-bottom:8px">チェーン1が最初に積まれた効果。解決は<b style="color:var(--gold-hi)">上（最後）から逆順</b>に1つずつ。</div>
    <div class="chain-list">${rows}</div>
    ${nextHint}
    <div class="act-grid wide">
      <div class="act" style="background:var(--spell);color:#0d0a06;border-color:var(--spell)" onclick="resolveChainStep()">チェーン${topIdx+1}「${topLink.name}」を解決 ▸</div>
    </div>
    <div class="act-label">その他</div>
    <div class="act-grid">
      <div class="act" onclick="closeSheet()">保留（閉じる）</div>
      <div class="act warn" onclick="if(confirm('チェーンを全て取り消します')){act({type:'CHAIN_CLEAR'});closeSheet();}">全て取消</div>
    </div>`;
  veil.classList.add("on");
}
/* 1つ解決して、残りがあれば次の解決画面を続けて出す（テンポ重視） */
function resolveChainStep(){
  act({type:'CHAIN_RESOLVE_TOP'});
  if(gameState.chain.length){ openChain(); }   // 続けて次を解決
  else { closeSheet(); }                        // 全解決したら閉じる
}

/* テストデッキを組む。実データが無い名前は飛ばし、
   40枚に満たない場合はカードデータから適当なカードで埋める。 */
function buildTestDeck(){
  const main=[], ex=[], miss=[];
  TEST_DECK.cards.forEach(e=>{
    if(!e.q) return;
    const idx = findCardIndex(e.n);
    if(idx<0){ miss.push(e.n); return; }
    for(let i=0;i<e.q;i++){
      const card = {id:idx, face:"down", pos:"atk"};
      if(CARD_DB[idx].ex) ex.push(card); else main.push(card);
    }
  });
  // EXデッキ（シンクロ・エクシーズ）
  (TEST_DECK.ex||[]).forEach(e=>{
    if(!e.q) return;
    const idx = findCardIndex(e.n);
    if(idx<0){ miss.push(e.n); return; }
    for(let i=0;i<e.q;i++) ex.push({id:idx, face:"down", pos:"atk"});
  });
  // EXが空ならカードデータからシンクロを拾って入れる（お試し用）
  if(!ex.length){
    const syn = [];
    CARD_DB.forEach((c,i)=>{
      if(c && c.ex && syn.length<10 && (c.st||[]).indexOf('シンクロ')>=0) syn.push(i);
    });
    syn.forEach(i=>ex.push({id:i, face:"down", pos:"atk"}));
  }
  // 40枚に足りなければ通常モンスター等で補充（ダミーDB時のフォールバック）
  if(main.length < 40){
    const filler = [];
    CARD_DB.forEach((c,i)=>{ if(c && !c.ex && filler.length<200) filler.push(i); });
    let fi = 0;
    while(main.length < 40 && filler.length){
      main.push({id:filler[fi % filler.length], face:"down", pos:"atk"});
      fi++;
    }
  }
  return {main, ex, side:[], miss, violations:[]};
}

/* テストデッキで即開始（両プレイヤーに配って手札を引く）
   1103は先攻ドローありなので、ドローフェイズから始める。 */
function startTestDuel(bothSides, firstPlayer){
  const parsed = buildTestDeck();
  if(!parsed.main.length){ showToast("カードデータが読み込まれていません"); return; }
  closeSheet();
  act({type:"LOAD_DECK", player:0, deck:parsed.main.slice(), ex:parsed.ex.slice()});
  act({type:"SHUFFLE", player:0});
  act({type:"DRAW", player:0, n:5});
  if(bothSides){
    const p2 = buildTestDeck();
    act({type:"LOAD_DECK", player:1, deck:p2.main, ex:p2.ex});
    act({type:"SHUFFLE", player:1});
    act({type:"DRAW", player:1, n:5});
  }
  // 先攻を設定してドローフェイズから開始
  const fp = (firstPlayer===1) ? 1 : 0;
  gameState.activePlayer = fp;
  gameState.firstPlayer  = fp;
  gameState.turn  = 1;
  gameState.phase = "draw";
  gameState.drawnThisTurn = false;
  logIt(gameState, `<b>先攻：${nameOf(fp)}</b>（1103は先攻ドローあり）`);
  render();
  showToast(`テストデッキで開始（先攻：${nameOf(fp)}）`);
}
/* index.html(1103デッキビルダー) と同じ localStorage を読む。
   保存形式: key "deck1103:<名前>" → {name, cards:[{n,q}], side:[{n,q}], date}
   編集中デッキ: key "work1103:current" → 同形式 */
const DECK_PREFIX = 'deck1103:';
const WORK_KEY    = 'work1103:current';
function LS(){ try{ return window.localStorage; }catch(e){ return null; } }

function listSavedDecks(){
  const out=[]; const ls=LS(); if(!ls) return out;
  try{
    for(let i=0;i<ls.length;i++){
      const k=ls.key(i);
      if(k && k.indexOf(DECK_PREFIX)===0){
        try{ const d=JSON.parse(ls.getItem(k)); if(d && d.cards) out.push(d); }catch(e){}
      }
    }
  }catch(e){}
  out.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  return out;
}
function getWorkDeck(){
  const ls=LS(); if(!ls) return null;
  try{
    const raw=ls.getItem(WORK_KEY); if(!raw) return null;
    const d=JSON.parse(raw);
    if(d && d.cards && d.cards.length) return d;
  }catch(e){}
  return null;
}
/* {cards:[{n,q}]} → 山札配列。保存デッキは既に1103上限が適用済みなのでそのまま採用 */
function cardsToDeck(cards){
  const main=[], ex=[], miss=[];
  (cards||[]).forEach(e=>{
    const idx = findCardIndex(e.n);
    if(idx<0){ miss.push(e.n); return; }
    const q = e.q||1;
    for(let i=0;i<q;i++){
      const card={id:idx, face:"down", pos:"atk"};
      if(CARD_DB[idx].ex) ex.push(card); else main.push(card);
    }
  });
  return {main, ex, side:[], miss, violations:[]};
}

      body = testRow + `<div class="meta" style="margin-top:10px">保存されたデッキがありません。<br>
        デッキビルダー（index.html）で保存すると、ここに出ます。<br>
        <b style="color:var(--gold-hi)">同じブラウザ・同じサイト</b>で保存したデッキのみ読み込めます。</div>`;
    } else {
      let rows = testRow;
      if(work){
        const n = (work.cards||[]).reduce((s,e)=>s+(e.q||1),0);
        rows += `<div class="dl-item" onclick="loadSaved('__work__')">
          <span class="dl-nm">${work.name||'編集中のデッキ'}<span class="dl-badge">編集中</span></span>
          <span class="dl-n">${n}枚</span></div>`;
      }
      decks.forEach((d,i)=>{
        const n = (d.cards||[]).reduce((s,e)=>s+(e.q||1),0);
        const dt = (d.date||'').slice(0,10);
        rows += `<div class="dl-item" onclick="loadSaved(${i})">
          <span class="dl-nm">${d.name||'無題'}</span>
          <span class="dl-n">${n}枚<small>${dt}</small></span></div>`;
      });
      body = `<div class="dl-list">${rows}</div>
        <div class="meta" style="margin-top:8px">タップすると読込→シャッフル→5枚ドローまで行います。</div>`;
    }
  } else {
    body = `
      <div class="meta">デッキビルダーの「テキスト」タブからコピーして貼り付け。見出し（■メインデッキ等）はそのままで大丈夫です。</div>
      <textarea id="deckText" placeholder="# 我がデッキ&#10;■メインデッキ (40)&#10;[モンスター]&#10;サイバー・ドラゴン x3&#10;E・HERO エアーマン x1&#10;[魔法]&#10;サイクロン x2"></textarea>
      <div class="row2" style="margin-top:10px">
        <button class="act" onclick="loadDeck(${p}, true)">読込＆5枚ドロー</button>
        <button class="act" onclick="loadDeck(${p}, false)">読込のみ</button>
      </div>`;
  }

  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:10px">${nameOf(p)} · デッキ読込</h3>
    ${tabs}${body}
    <button class="close" onclick="closeSheet()">閉じる</button>`;
  veil.classList.add("on");
}
/* 保存デッキを読み込む。i==='__work__' なら編集中デッキ */
function loadSaved(i){
  const p = gameState.activePlayer;
  const d = (i==='__work__') ? getWorkDeck() : listSavedDecks()[i];
  if(!d){ showToast("デッキが見つかりません"); return; }
  const parsed = cardsToDeck(d.cards);
  applyLoad(p, parsed, true);
}
/* 1103環境での同名カード上限（0/1/2/3枚）
   carddata.json の各カードが持つ lm キーを使う（lm:0=禁止,1=制限,2=準制限,無指定=無制限）。
   これによりカード名リストの手管理は不要。 */
function deckLimit(name){
  const c = CARD_DB.find(x=>x.n===name);
  if(c && typeof c.lm === "number") return c.lm;
  return 3;
}
function limitLabel(lim){ return lim===0?"禁止":lim===1?"制限":lim===2?"準制限":""; }

/* デッキテキスト解析
   index.html の書き出し形式に対応:
     # デッキ名
     ■メインデッキ (40)
     [モンスター]
     サイバー・ドラゴン x3
     ■エクストラ (15)
     ■サイド (15)
   加えて素朴な「カード名 x3」だけの羅列にも対応。
   セクション見出し・装飾行はスキップし、■サイド以降はサイドとして分離する。 */

/* 1行を {name, qty} に。カード行でなければ null */
function parseDeckLine(line){
  let s = line.trim();
  if(!s) return null;
  // コメント/見出し/セクション行を除外
  if(/^#/.test(s)) return null;                    // # デッキ名
  if(/^[■◆●▲【]/.test(s)) return null;             // ■メインデッキ (40)
  if(/^\[.*\]$/.test(s)) return null;              // [モンスター]
  if(/^-{2,}$/.test(s)) return null;               // 区切り線
  if(/^(メインデッキ|エクストラ|サイド|main|extra|side)\b/i.test(s)) return null;
  // 先頭の箇条書き記号を除去
  s = s.replace(/^[・\-*\u2022]\s*/, '');
  // 「3x カード名」形式
  let m = s.match(/^(\d+)\s*[x×✕*]\s*(.+)$/i);
  if(m) return { name: m[2].trim(), qty: parseInt(m[1],10) };
  // 「カード名 x3」「カード名 ×3」「カード名 3」形式
  m = s.match(/^(.*?)\s*(?:[x×✕*]\s*(\d+)|\s(\d+))\s*$/i);
  if(m && (m[2]||m[3])){
    const nm = (m[1]||"").trim();
    if(nm) return { name: nm, qty: parseInt(m[2]||m[3],10) };
  }
  // 枚数指定なし = 1枚
  return { name: s, qty: 1 };
}

/* テキスト → {main, ex, side, miss, violations}
   enforceLimit=false なら1103上限を無視して指定枚数で採用 */
function parseDeckText(text, enforceLimit){
  if(enforceLimit === undefined) enforceLimit = true;
  const main=[], ex=[], side=[], miss=[];
  const counts={}; const violations=[];
  let inSide = false;

  text.split(/\r?\n/).forEach(raw=>{
    const t = raw.trim();
    // セクション切り替えを検出（■サイド 以降はサイドデッキ）
    if(/^[■◆●【]?\s*サイド/.test(t) || /^\[?\s*side\b/i.test(t)){ inSide = true; return; }
    if(/^[■◆●【]?\s*(メイン|main)/i.test(t)){ inSide = false; return; }
    if(/^[■◆●【]?\s*(エクストラ|extra|EX)/i.test(t)){ inSide = false; return; }

    const parsed = parseDeckLine(raw);
    if(!parsed) return;
    const idx = findCardIndex(parsed.name);
    if(idx < 0){ miss.push(parsed.name); return; }

    if(inSide){
      // サイドはメインに混ぜない（1人回しでは未使用だが枚数だけ保持）
      for(let i=0;i<parsed.qty;i++) side.push({id:idx, face:"down", pos:"atk"});
      return;
    }
    let take = parsed.qty;
    if(enforceLimit){
      const lim = deckLimit(parsed.name);
      const already = counts[parsed.name]||0;
      take = Math.max(0, Math.min(parsed.qty, lim - already));
      if(take < parsed.qty) violations.push({name:parsed.name, requested:parsed.qty+already, limit:lim});
      counts[parsed.name] = already + take;
    }
    for(let i=0;i<take;i++){
      const card = {id:idx, face:"down", pos:"atk"};
      if(CARD_DB[idx].ex) ex.push(card); else main.push(card);
    }
  });
  return {main, ex, side, miss, violations};
}

/* カード名の照合。完全一致 → 正規化一致 の順で探す。
   全角/半角、長音・ハイフン類、空白の揺れを吸収する。 */
let NAME_INDEX = null;
function normName(s){
  return String(s)
    .replace(/[\u30fc\u2010-\u2015\u2212\uff0d\-]/g,'ー')  // 各種ハイフン→長音
    .replace(/[\s\u3000]/g,'')                             // 空白除去
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)) // 全角英数→半角
    .toLowerCase();
}
function buildNameIndex(){
  NAME_INDEX = new Map();
  CARD_DB.forEach((c,i)=>{
    if(!c || !c.n) return;
    if(!NAME_INDEX.has(c.n)) NAME_INDEX.set(c.n, i);
    const k = normName(c.n);
    if(!NAME_INDEX.has(k)) NAME_INDEX.set(k, i);
  });
}
function findCardIndex(name){
  if(!NAME_INDEX) buildNameIndex();
  if(NAME_INDEX.has(name)) return NAME_INDEX.get(name);
  const k = normName(name);
  if(NAME_INDEX.has(k)) return NAME_INDEX.get(k);
  return -1;
}
function loadDeck(p, autostart){
  const text = document.getElementById("deckText").value;
  const parsed = parseDeckText(text);

  // 1103 枚数超過があれば、確認モーダルを挟む（強制カット or 無視して全枚数）
  if(parsed.violations.length){
    const lines = parsed.violations.map(v=>
      `・${v.name}（${limitLabel(v.limit)}／上限${v.limit}枚）: 指定${v.requested}枚`
    ).join("<br>");
    sheet.innerHTML = `
      <h3>1103 枚数チェック</h3>
      <div class="meta">以下は1103環境の上限を超えています。</div>
      <div class="eff">${lines}</div>
      <div class="act-grid">
        <div class="act" onclick="finishLoad(${p},${autostart},true)">上限までに切って読込</div>
        <div class="act warn" onclick="finishLoad(${p},${autostart},false)">無視して指定枚数で読込</div>
      </div>
      <button class="close" onclick="openDeckLoad()">戻る</button>`;
    veil.classList.add("on");
    PENDING_DECK = {p, text};
    return;
  }
  applyLoad(p, parsed, autostart);
}

let PENDING_DECK = null;
function finishLoad(p, autostart, enforce){
  const {text} = PENDING_DECK;
  const parsed = parseDeckText(text, enforce);
  applyLoad(p, parsed, autostart);
}
function applyLoad(p, parsed, autostart){
  const {main, ex, miss} = parsed;
  if(!main.length && !ex.length){
    // 何も読めなかった理由を具体的に伝える
    const why = miss.length
      ? `カード名が ${CARD_DB.length}種のデータベースと一致しませんでした。\n\n例：\n・${[...new Set(miss)].slice(0,5).join("\n・")}`
      : `カード行が見つかりませんでした。「カード名 x3」の形式で入力してください。`;
    sheet.innerHTML = `<div class="grip"></div>
      <h3 style="margin-bottom:8px">読み込めませんでした</h3>
      <div class="eff">${why.replace(/\n/g,"<br>")}</div>
      <div class="meta" style="margin-bottom:10px">index.html の「テキスト」タブからコピーした内容をそのまま貼り付けられます。</div>
      <button class="close" onclick="openDeckLoad()">戻る</button>`;
    veil.classList.add("on");
    return;
  }
  act({type:"LOAD_DECK", player:p, deck:main, ex});
  if(autostart){
    act({type:"SHUFFLE", player:p});
    act({type:"DRAW", player:p, n:5});
    // 1103は先攻ドローあり。ドローフェイズから始める。
    gameState.turn = 1;
    gameState.phase = "draw";
    gameState.drawnThisTurn = false;
    gameState.firstPlayer = p;
    gameState.activePlayer = p;
  }
  closeSheet();
  const missN = [...new Set(miss)].length;
  showToast(`メイン${main.length}枚 / EX${ex.length}枚 読込${missN?`（未一致${missN}種）`:""}`);
  if(missN){
    setTimeout(()=>{
      sheet.innerHTML = `<div class="grip"></div>
        <h3 style="margin-bottom:8px">読み込みました</h3>
        <div class="meta" style="margin-bottom:8px">メイン${main.length}枚 / EX${ex.length}枚。<br>次の${missN}種はカードデータに見つからず、除外しました。</div>
        <div class="eff">・${[...new Set(miss)].join("<br>・")}</div>
        <button class="close" onclick="closeSheet()">閉じる</button>`;
      veil.classList.add("on");
    }, 60);
  }
}

/* 軽量トースト */
function showToast(msg){
  let t = document.getElementById("toast");
  if(!t){
    t = document.createElement("div");
    t.id = "toast"; t.className = "toast";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove("on"), 2200);
}

/* =========================================================================
   起動
   ========================================================================= */
/* カードデータは姉妹アプリ index.html の <script id="carddata"> から読み込む。
   失敗時は carddata.json を試し、それも駄目ならダミーDBで継続する。
   どのソースで動いているかは起動ログとメニューで確認できる。 */
let DB_SOURCE = "dummy";
function extractCarddata(txt){
  const doc = new DOMParser().parseFromString(txt, 'text/html');
  const el = doc.getElementById('carddata');
  if(!el) return null;
  const raw = (el.textContent||"").trim();
  if(!raw) return null;
  const data = JSON.parse(raw);
  return (Array.isArray(data) && data.length) ? data : null;
}
async function loadCardDataFromIndex(){
  const res = await fetch('index.html', {cache:'no-cache'});
  if(!res.ok) throw new Error('index.html HTTP '+res.status);
  const data = extractCarddata(await res.text());
  if(!data) throw new Error('index.html に carddata が見つかりません');
  return data;
}
async function loadCardDataFromJson(){
  const res = await fetch('carddata.json', {cache:'no-cache'});
  if(!res.ok) throw new Error('carddata.json HTTP '+res.status);
  const data = await res.json();
  if(!Array.isArray(data) || !data.length) throw new Error('carddata.json が空です');
  return data;
}
async function boot(){
  const errors = [];
  try{
    // carddata.json を優先（index.html は現在この外部ファイルを読む構成）
    CARD_DB = await loadCardDataFromJson(); DB_SOURCE = "carddata.json";
  }catch(e1){
    errors.push('carddata.json: '+e1.message);
    try{
      // 旧構成（index.html に carddata が埋め込まれている）にも対応
      CARD_DB = await loadCardDataFromIndex(); DB_SOURCE = "index.html";
    }catch(e2){
      errors.push('index.html: '+e2.message);
      CARD_DB = DUMMY_DB.slice(); DB_SOURCE = "dummy";
    }
  }
  NAME_INDEX = null;                 // 名前索引を再構築させる
  gameState = newGame();
  turnActions = [];
  if(DB_SOURCE === "dummy"){
    logIt(gameState, `<b>注意</b> カードデータを読めませんでした（お試し用10種で動作中）`);
    errors.forEach(m=>logIt(gameState, `　${m}`));
  }else{
    logIt(gameState, `<b>決闘開始</b> — ${CARD_DB.length}種読込（${DB_SOURCE}）。デッキを読み込んでください`);
  }
  render();
  initSwipe();
  if(DB_SOURCE === "dummy"){
    setTimeout(()=>{
      sheet.innerHTML = `<div class="grip"></div>
        <h3 style="margin-bottom:8px">カードデータを読み込めませんでした</h3>
        <div class="meta" style="margin-bottom:8px">
          今はお試し用の10種だけで動いています。この状態ではデッキがほとんど読み込めません。</div>
        <div class="eff">${errors.join('<br>')}</div>
        <div class="meta" style="margin-top:8px">
          battle.html は同じフォルダの <b>index.html</b>（または carddata.json）からカードを読みます。<br><br>
          ・GitHub Pages など<b>サーバー経由</b>で開いてください<br>
          ・ファイルを直接開く（file://）と読み込めません<br>
          ・index.html と同じ場所に置いてください</div>
        <button class="close" onclick="closeSheet()">閉じる</button>`;
      veil.classList.add("on");
    }, 300);
  }
}
boot();
</script>
