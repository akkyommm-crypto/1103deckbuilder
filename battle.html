<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DUEL FIELD — 1103 Hot-Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --bg:#120d08; --bg-2:#161007; --surface:#1e1710; --surface-2:#292015; --surface-3:#352a1b;
  --line:rgba(201,162,75,0.22); --line-hi:rgba(201,162,75,0.45);
  --ink:#f0e7d2; --text-dim:#a2937c;
  --gold:#c9a24b; --gold-hi:#e4c06a; --gold-ink:#14100a;
  --parchment:#e9e4d6; --card-brown:#c9a24b; --card-brown-dk:#a8863d;
  --edge:rgba(201,162,75,0.22); --edge-dk:rgba(201,162,75,0.45);
  --panel:#12141c; --panel-lo:#1a1d28;
  --mon:#d29a3a; --spell:#35b08e; --trap:#9d6ede;
  --mon-normal:#d4b158; --mon-effect:#e08544; --mon-ritual:#6f9ff0;
  --mon-fusion:#a97fe8; --mon-synchro:#ece9e2; --mon-xyz:#8d8d9c;
  --forbidden:#ef6b5e; --limited:#e3a94f; --semi:#74a8ec;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(201,162,75,0.07), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
  font-size:14px; line-height:1.5;
  display:flex; flex-direction:column; height:100dvh; overflow:hidden;
}
h1,h2,h3,.mincho{font-family:"Shippori Mincho",serif}
button{font-family:inherit;color:inherit;cursor:pointer}

/* ---------- top bar ---------- */
header{
  flex:0 0 auto; display:flex; align-items:center; gap:12px;
  padding:8px 14px; border-bottom:1px solid var(--line);
  background:linear-gradient(var(--surface),var(--bg-2));
}
header .brand{font-family:"Shippori Mincho",serif;font-weight:800;letter-spacing:.14em;font-size:15px;color:var(--gold-hi)}
header .brand small{display:block;font-size:9px;letter-spacing:.34em;color:var(--text-dim);font-weight:400;font-family:"Zen Kaku Gothic New"}
header .spacer{flex:1}
.turn-flag{
  font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;
  padding:5px 14px;border:1px solid var(--line-hi);border-radius:2px;
  background:var(--surface-2);letter-spacing:.08em;white-space:nowrap;
}
.turn-flag b{color:var(--gold-hi)}

/* ---------- phase strip ---------- */
.phases{
  flex:0 0 auto; display:flex; align-items:stretch; gap:3px; padding:7px 10px; overflow-x:auto;
  border-bottom:1px solid var(--line); background:var(--bg-2);
}
.phase{
  flex:0 0 auto; padding:7px 12px; font-size:11px; letter-spacing:.04em;
  border:1px solid var(--line); border-radius:4px; background:transparent;
  color:var(--text-dim); white-space:nowrap; display:flex; align-items:center;
}
.phase.on{background:var(--gold);color:var(--gold-ink);border-color:var(--gold-hi);
  font-weight:800;font-size:12px;box-shadow:0 0 12px rgba(201,162,75,0.25)}
.phase.done{color:var(--gold);border-color:var(--edge-dk)}
.phase-next{
  flex:0 0 auto;margin-left:auto;padding:7px 14px;font-size:12px;font-weight:700;white-space:nowrap;
  border:1px solid var(--line-hi);border-radius:4px;background:var(--surface-2);color:var(--gold-hi);
}
.phase-next:active{background:var(--surface-3)}

/* ---------- guide strip（今やるべきこと）---------- */
.guide{
  flex:0 0 auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:7px 12px; border-bottom:1px solid var(--line);
  background:linear-gradient(var(--bg-2),var(--surface));
  min-height:36px;
}
.guide .g-phase{
  font-family:"Shippori Mincho",serif; font-weight:800; font-size:13px;
  color:var(--gold-ink); background:var(--gold); border:1px solid var(--gold-hi);
  padding:3px 11px; border-radius:3px; letter-spacing:.06em; white-space:nowrap;
}
.guide .g-can{
  font-size:10.5px; color:var(--gold-hi); border:1px solid var(--edge-dk);
  padding:3px 9px; border-radius:11px; white-space:nowrap; background:rgba(201,162,75,0.06);
}
.guide .g-can.mute{color:var(--text-dim); border-color:var(--line); background:transparent}
.guide .g-chainwarn{
  margin-left:auto; font-size:11px; font-weight:700; color:#0d0a06;
  background:var(--spell); padding:4px 11px; border-radius:12px; white-space:nowrap;
  animation:pulse 1.1s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

/* header menu button */
.hdr-btn{
  width:34px;height:30px;border:1px solid var(--line-hi);border-radius:3px;
  background:var(--surface-2);color:var(--gold-hi);font-size:17px;line-height:1;font-weight:700;
}
.hdr-btn:active{background:var(--surface-3)}

/* ---------- board ---------- */
.board{flex:1 1 auto; overflow-y:auto; padding:10px 10px 4px; display:flex; flex-direction:column; gap:8px}
.side{
  border:1px solid var(--line); border-radius:4px; padding:8px 8px 10px;
  background:linear-gradient(var(--surface),var(--bg-2));
}
.side.opp{border-color:rgba(157,110,222,0.28)}
.side.active-side{border-color:var(--gold-hi);box-shadow:0 0 0 1px var(--gold-hi) inset, 0 0 22px rgba(201,162,75,0.08)}
.side-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.side-name{font-family:"Shippori Mincho",serif;font-weight:700;letter-spacing:.06em}
.side-tag{font-size:9px;letter-spacing:.24em;color:var(--text-dim)}
.lp-box{margin-left:auto;display:flex;align-items:center;gap:4px}
.lp-val{font-family:"Shippori Mincho",serif;font-weight:800;font-size:18px;min-width:66px;text-align:right;letter-spacing:.02em}
.lp-val.low{color:var(--forbidden)}
.lp-btn{
  width:24px;height:24px;line-height:1;border:1px solid var(--line);border-radius:2px;
  background:var(--surface-2);color:var(--ink);font-size:13px;font-weight:700;
}
.lp-btn:active{background:var(--surface-3)}

.zones{display:flex;flex-direction:column;gap:6px}
.zrow{display:grid;grid-template-columns:26px 1fr;gap:6px;align-items:start}
.zrow .lab{font-size:9px;letter-spacing:.08em;color:var(--text-dim);text-align:center;
  writing-mode:vertical-rl;text-orientation:upright;padding-top:6px;justify-self:center}
.slots{display:grid;gap:5px}
.slots.mz,.slots.sz{grid-template-columns:repeat(5,1fr)}
.slots.line5{grid-template-columns:repeat(5,1fr)}
.pile{display:flex;flex-direction:column;align-items:stretch;gap:3px}
.pile .slot{width:100%}
.pile-lab{font-size:8px;letter-spacing:.08em;color:var(--text-dim);text-align:center}
.pile-n{
  position:absolute;bottom:2px;right:2px;z-index:4;min-width:16px;text-align:center;
  font-size:9px;font-weight:800;padding:1px 3px;border-radius:8px;
  background:var(--gold-ink);color:var(--gold-hi);border:1px solid var(--edge-dk);
}
.slot{
  aspect-ratio:59/86; border:1px dashed var(--line); border-radius:3px;
  background:rgba(0,0,0,0.18); display:flex;align-items:center;justify-content:center;
  position:relative; overflow:hidden;
}
.slot.field{aspect-ratio:59/86}
.slot .ph{font-size:8px;color:var(--text-dim);letter-spacing:.1em}

/* ---------- card ---------- */
.card{
  width:100%;height:100%;border-radius:3px;position:relative;overflow:hidden;
  border:1px solid var(--edge-dk); background:var(--surface-3);
  display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;
}
.card.def{aspect-ratio:auto}
.card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card .nm{
  position:relative;z-index:2;font-size:8px;line-height:1.15;padding:2px 3px;
  background:linear-gradient(transparent,rgba(0,0,0,0.82));color:var(--parchment);
  max-height:50%;overflow:hidden;font-weight:500;
}
.card.set-mon{transform:rotate(90deg) scale(.92)} /*守備表示は横向き */
.card .badge{
  position:absolute;top:2px;left:2px;z-index:3;font-size:7px;letter-spacing:.06em;
  padding:1px 4px;border-radius:2px;background:var(--gold);color:var(--gold-ink);font-weight:700;
}
.card.k-s .badge{background:var(--spell)}
.card.k-t .badge{background:var(--trap)}
.card.facedown{background:#0d0a06}
.card.facedown img{opacity:.96}

/* ---------- hand ---------- */
.handbar{
  flex:0 0 auto; border-top:1px solid var(--line);
  background:linear-gradient(var(--bg-2),var(--surface));
}
.hand-head{display:flex;align-items:center;gap:8px;padding:7px 12px 0}
.hand-head .who{font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;letter-spacing:.06em;color:var(--gold-hi)}
.hand-head .cnt{font-size:11px;color:var(--text-dim)}
.hand-head .hint{margin-left:auto;font-size:9px;color:var(--text-dim);letter-spacing:.08em}
.hand{display:flex;gap:7px;overflow-x:auto;padding:9px 12px 13px}
.hand .hcard{flex:0 0 68px;aspect-ratio:59/86}
.hand .hcard .nm{font-size:9px}

/* ---------- controls ---------- */
.controls{
  flex:0 0 auto; display:flex; gap:6px; padding:8px 12px;
  border-top:1px solid var(--line); background:var(--bg-2); overflow-x:auto;
}
.btn{
  flex:0 0 auto; padding:9px 14px; border-radius:3px; font-size:12px; font-weight:700;
  letter-spacing:.04em; border:1px solid var(--line-hi); background:var(--surface-2); color:var(--ink);
}
.btn:active{background:var(--surface-3)}
.btn.gold{background:var(--gold);color:var(--gold-ink);border-color:var(--gold-hi)}
.btn.ghost{background:transparent}

/* ---------- log ---------- */
.log{
  flex:0 0 auto; max-height:82px; overflow-y:auto; padding:6px 12px 10px;
  border-top:1px solid var(--line); background:var(--bg); font-size:10.5px; color:var(--text-dim);
}
.log .li{padding:1px 0;border-bottom:1px solid rgba(201,162,75,0.06)}
.log .li b{color:var(--gold-hi);font-weight:700}

/* ---------- modal (bottom sheet) ---------- */
.veil{
  position:fixed;inset:0;background:rgba(6,4,2,0.72);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center;z-index:50;
}
.veil.on{display:flex}
.sheet{
  width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;
  border:1px solid var(--line-hi);border-bottom:none;
  border-radius:14px 14px 0 0;background:linear-gradient(var(--surface),var(--bg-2));
  padding:14px 16px calc(16px + env(safe-area-inset-bottom,0));
  animation:sheetup .18s ease-out;
}
@keyframes sheetup{from{transform:translateY(14px);opacity:.4}to{transform:translateY(0);opacity:1}}
.sheet .grip{width:38px;height:4px;border-radius:2px;background:var(--line-hi);margin:0 auto 12px}
/* card preview header inside sheet */
.sheet-card{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.sheet-thumb{flex:0 0 66px;aspect-ratio:59/86;border-radius:5px;overflow:hidden;
  border:1px solid var(--edge-dk);background:var(--surface-3);position:relative}
.sheet-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sheet-info{flex:1;min-width:0}
.sheet h3{margin:0 0 5px;font-size:16px;letter-spacing:.03em;color:var(--gold-hi);line-height:1.25}
.sheet .meta{font-size:11px;color:var(--text-dim);line-height:1.6}
.sheet .eff{font-size:11.5px;color:var(--ink);background:rgba(0,0,0,0.22);border:1px solid var(--line);
  border-radius:4px;padding:9px 11px;margin-bottom:14px;max-height:130px;overflow-y:auto;white-space:pre-wrap;line-height:1.55}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.act-grid.wide{grid-template-columns:1fr}
.act-label{font-size:9px;letter-spacing:.18em;color:var(--text-dim);margin:14px 2px 7px;text-transform:none}
.act-label:first-of-type{margin-top:0}
.act{padding:13px 10px;border:1px solid var(--line);border-radius:5px;background:var(--surface-2);
  font-size:13px;text-align:center;font-weight:600;min-height:46px;display:flex;align-items:center;justify-content:center}
.act:active{background:var(--surface-3)}
.act.warn{border-color:var(--forbidden);color:var(--forbidden)}
/* chain */
.chain-list{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.chain-link{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:5px;
  border:1px solid var(--line);background:var(--surface-2)}
.chain-link.top{border-color:var(--gold-hi);box-shadow:0 0 10px rgba(201,162,75,0.18)}
.chain-link .cl-no{font-family:"Shippori Mincho",serif;font-weight:800;color:var(--gold-hi);min-width:18px}
.chain-link .cl-nm{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chain-link .cl-ss{font-size:10px;color:var(--spell);font-weight:700}
.chain-link .cl-who{font-size:9px;color:var(--text-dim);letter-spacing:.06em}
.chain-badge{display:inline-block;min-width:16px;text-align:center;font-size:10px;font-weight:800;
  padding:1px 5px;border-radius:8px;background:var(--spell);color:#0d0a06;margin-left:5px}
.sheet .close{margin-top:14px;width:100%;padding:14px;text-align:center;background:transparent;
  border:1px solid var(--line);border-radius:6px;color:var(--text-dim);font-size:13px;font-weight:600}

textarea{
  width:100%;min-height:120px;background:rgba(0,0,0,0.28);border:1px solid var(--line);
  border-radius:3px;color:var(--ink);font-family:"Zen Kaku Gothic New";font-size:12px;padding:10px;resize:vertical;
}
.sub{font-size:10px;color:var(--text-dim);margin:6px 0 2px;letter-spacing:.04em}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tab-title{font-size:10px;letter-spacing:.2em;color:var(--text-dim);margin:2px 0 8px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* ---------- このターンにやったこと ---------- */
.turnlog{
  flex:0 0 auto; display:flex; gap:5px; align-items:center; overflow-x:auto;
  padding:6px 12px; border-top:1px solid var(--line); background:var(--bg);
  min-height:34px;
}
.turnlog .tl-lab{font-size:9px;letter-spacing:.16em;color:var(--text-dim);white-space:nowrap;flex:0 0 auto}
.turnlog .tl-chip{
  flex:0 0 auto; font-size:10.5px; color:var(--ink); background:var(--surface-2);
  border:1px solid var(--line); border-radius:11px; padding:3px 10px; white-space:nowrap;
}
.turnlog .tl-empty{font-size:10px;color:var(--text-dim)}

/* ---------- collapsible log ---------- */
.logwrap{flex:0 0 auto;border-top:1px solid var(--line);background:var(--bg)}
.log-toggle{
  width:100%; text-align:left; padding:6px 12px; font-size:10.5px; letter-spacing:.06em;
  color:var(--text-dim); background:transparent; border:none; border-bottom:1px solid transparent;
}
.log-toggle:active{color:var(--gold-hi)}
.log{max-height:120px}

/* ---------- 下部固定ドック ---------- */
.dock{
  flex:0 0 auto; border-top:1px solid var(--line-hi);
  background:linear-gradient(var(--surface),var(--bg-2));
  padding:7px 10px calc(7px + env(safe-area-inset-bottom,0));
  display:flex; flex-direction:column; gap:7px;
  box-shadow:0 -6px 18px rgba(0,0,0,0.35);
}
.dock-phase{display:flex; align-items:stretch; gap:6px}
.dock-actions{display:flex; align-items:stretch; gap:6px}

/* フェーズ行：戻る / 現在フェーズ表示 / 進む */
.d-prev,.d-next{
  flex:0 0 auto; min-width:56px; padding:11px 12px; border-radius:5px; font-size:12px; font-weight:700;
  border:1px solid var(--line-hi); background:var(--surface-2); color:var(--ink);
  display:flex; align-items:center; justify-content:center; letter-spacing:.03em;
}
.d-prev:active,.d-next:active{background:var(--surface-3)}
.d-next.primary{
  flex:1 1 auto; background:var(--gold); color:var(--gold-ink); border-color:var(--gold-hi);
  font-size:14px; font-weight:800; letter-spacing:.05em; min-height:48px;
  box-shadow:0 0 14px rgba(201,162,75,0.2);
}
.d-next.endturn{background:var(--surface-2);color:var(--gold-hi);border-color:var(--line-hi)}
.d-phase-cur{
  flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border:1px solid var(--line); border-radius:5px; background:rgba(201,162,75,0.05);
  padding:4px 8px; min-width:0;
}
.d-phase-cur .cur{font-family:"Shippori Mincho",serif;font-weight:800;font-size:14px;color:var(--gold-hi);letter-spacing:.06em}
.d-phase-cur .nxt{font-size:9px;color:var(--text-dim);letter-spacing:.06em;margin-top:1px}

/* アクション行 */
.d-act{
  flex:1 1 0; min-width:0; padding:11px 6px; border-radius:5px; font-size:12px; font-weight:700;
  border:1px solid var(--line); background:var(--surface-2); color:var(--ink);
  display:flex; align-items:center; justify-content:center; gap:4px; min-height:46px; letter-spacing:.02em;
}
.d-act:active{background:var(--surface-3)}
.d-act.gold{background:var(--gold);color:var(--gold-ink);border-color:var(--gold-hi)}
.d-act.undo{color:var(--gold-hi);border-color:var(--line-hi)}
.d-act:disabled{opacity:.34}
.d-act .kb{font-size:10px;font-weight:800;padding:1px 6px;border-radius:9px;background:var(--spell);color:#0d0a06}

/* チェーン解決の強調表示 */
.chain-link.resolving{border-color:var(--spell);box-shadow:0 0 12px rgba(53,176,142,0.3);background:rgba(53,176,142,0.08)}
.chain-next-hint{
  font-size:12px;font-weight:700;color:var(--spell);text-align:center;
  padding:8px;margin:2px 0 8px;border:1px dashed var(--spell);border-radius:5px;background:rgba(53,176,142,0.06);
}
.chain-link .cl-tag{font-size:9px;color:var(--text-dim);letter-spacing:.04em;margin-left:4px}

/* battle step sheet */
.bt-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 12px;
  font-family:"Shippori Mincho",serif;font-size:15px}
.bt-row .vs{color:var(--text-dim);font-size:12px}
.bt-row .a-atk{color:var(--mon-effect);font-weight:800}
.bt-row .a-def{color:var(--spell);font-weight:800}
.bt-outcome{font-size:12px;text-align:center;color:var(--gold-hi);margin-bottom:10px}

/* ---------- LP 計算機 ---------- */
.lp-val{border:none;background:transparent;padding:2px 4px;border-radius:3px}
.lp-val:active{background:var(--surface-3)}
.lp-now{font-size:11.5px;color:var(--text-dim);margin-bottom:10px}
.lp-now b{color:var(--gold-hi);font-size:14px;font-family:"Shippori Mincho",serif}
.lp-prev{color:var(--forbidden);font-weight:700}
.lp-prev.up{color:var(--spell)}
.lp-display{
  font-family:"Shippori Mincho",serif;font-weight:800;font-size:30px;text-align:right;
  padding:10px 14px;border:1px solid var(--line-hi);border-radius:6px;
  background:rgba(0,0,0,0.3);color:var(--gold-hi);margin-bottom:10px;letter-spacing:.04em;
}
.lp-quickrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.lp-quick{
  flex:1 1 auto;min-width:56px;padding:8px 4px;font-size:12px;font-weight:700;
  border:1px solid var(--line);border-radius:4px;background:var(--surface-2);color:var(--ink);
}
.lp-quick:active{background:var(--surface-3)}
.lp-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.lp-key{
  padding:15px 4px;font-size:18px;font-weight:700;font-family:"Shippori Mincho",serif;
  border:1px solid var(--line);border-radius:5px;background:var(--surface-2);color:var(--ink);
}
.lp-key:active{background:var(--surface-3)}
.lp-ops{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:6px}
.lp-op{
  padding:15px 8px;font-size:14px;font-weight:800;border-radius:6px;letter-spacing:.04em;
  border:1px solid var(--line-hi);
}
.lp-op.dmg{background:var(--forbidden);color:#1a0b09;border-color:var(--forbidden)}
.lp-op.heal{background:var(--spell);color:#07130f;border-color:var(--spell)}
.lp-op:active{filter:brightness(.88)}

/* ---------- デッキ読込 ---------- */
.dl-tabs{display:flex;gap:6px;margin-bottom:12px}
.dl-tab{
  flex:1 1 0;padding:10px 8px;font-size:12.5px;font-weight:700;border-radius:5px;
  border:1px solid var(--line);background:transparent;color:var(--text-dim);
}
.dl-tab.on{background:var(--gold);color:var(--gold-ink);border-color:var(--gold-hi)}

<body>

<header>
  <div class="brand">決闘盤<small>DUEL FIELD · 1103</small></div>
  <div class="spacer"></div>
  <button class="hdr-btn" id="menuBtn" onclick="openMenu()" title="メニュー">≡</button>

<!-- guide strip: 今やるべきこと -->

  </div>

</div>

<!-- collapsible full log -->

  <div class="log" id="log" hidden></div>
</div>

<!-- ===== 下部固定ドック（親指ゾーン）===== -->
<div class="dock" id="dock">
  <!-- 上段：フェーズ操作 -->
  <div class="dock-phase" id="dockPhase"></div>
  <!-- 下段：頻用アクション -->
  <div class="dock-actions" id="dockActions"></div>
</div>

<!-- action modal -->
<div class="veil" id="veil"><div class="sheet" id="sheet"></div></div>

<script>
/* =========================================================================
   DUEL FIELD — 2人ホットシート対戦アプリ（土台）
   全状態は gameState に集約。applyAction(gameState, action) だけが状態を変更する。
   描画は render() が gameState を読むだけ（DOM から状態を書き換えない）。
   → 将来: action を相手に送り、双方が同じ applyAction を実行すればオンライン対戦化できる。
   ========================================================================= */

/* ---- ダミーカードデータ（起動時に index.html の完全版へ差し替わる）----
   実データは boot() が index.html の <script id="carddata"> から読み込む。
   各カード: {n,k,atk,def,lv,ra,at,st,ex,sub,e,c,lm?}
*/
const DUMMY_DB = [
  {n:"サイバー・ドラゴン", k:"m", atk:2100, def:1600, lv:5, ra:"機械", at:"光", st:["効果"], ex:false, sub:"", e:"相手フィールドにのみモンスターが存在する場合、このカードはリリースなしで召喚できる。", c:"70095154"},
  {n:"死者蘇生", k:"s", ra:"", at:"", st:[], ex:false, sub:"", e:"自分または相手の墓地のモンスター1体を対象として発動できる。そのモンスターを自分フィールドに特殊召喚する。", c:"83764718"},
  {n:"聖なるバリア －ミラーフォース－", k:"t", ra:"", at:"", st:[], ex:false, sub:"", e:"相手モンスターの攻撃宣言時に発動できる。相手フィールドの攻撃表示モンスターを全て破壊する。", c:"44095762"},
  {n:"E・HERO エアーマン", k:"m", atk:1800, def:300, lv:4, ra:"戦士", at:"風", st:["効果"], ex:false, sub:"", e:"このカードが召喚に成功した時、以下の効果から1つを選択して発動できる。①自分フィールドのHEROの数まで相手にダメージ。②デッキからHEROモンスター1体を手札に加える。", c:"22103890"},
  {n:"増殖するG", k:"m", atk:500, def:200, lv:2, ra:"昆虫", at:"地", st:["効果"], ex:false, sub:"", e:"このカードを手札から捨てて発動できる。このターン、相手が特殊召喚するたびに自分は1枚ドローする。", c:"90953320"},
  {n:"灰流うらら", k:"m", atk:0, def:1800, lv:3, ra:"アンデット", at:"炎", st:["チューナー","効果"], ex:false, sub:"", e:"デッキから手札・墓地・フィールドに加える効果、特殊召喚する効果を無効にする。", c:"14558127"},
  {n:"サンダー・ボルト", k:"s", ra:"", at:"", st:[], ex:false, sub:"", e:"相手フィールドのモンスターを全て破壊する。", c:"71413901"},
  {n:"激流葬", k:"t", ra:"", at:"", st:[], ex:false, sub:"", e:"モンスターが召喚・反転召喚・特殊召喚された時に発動できる。フィールドのモンスターを全て破壊する。", c:"90351981"},
  {n:"ブラック・ホール", k:"s", ra:"", at:"", st:[], ex:false, sub:"", e:"フィールドのモンスターを全て破壊する。", c:"83764719"},
  {n:"サイクロン", k:"s", ra:"", at:"", st:[], ex:false, sub:"速攻", e:"フィールドの魔法・罠カード1枚を対象として発動できる。そのカードを破壊する。", c:"05318639"},
];
let CARD_DB = DUMMY_DB.slice();
const IMG_BASE = "images/cards_small/";
const IMG_BACK = "images/card_back.webp";

/* -------------------- 定数 -------------------- */
const PHASES = [
  {id:"draw", jp:"ドロー"}, {id:"standby", jp:"スタンバイ"},
  {id:"main1", jp:"メイン1"}, {id:"battle", jp:"バトル"},
  {id:"main2", jp:"メイン2"}, {id:"end", jp:"エンド"},
];
const ZONE_LIMITS = { mz:5, sz:5, field:1 };
const PNAME = ["プレイヤー I", "プレイヤー II"];

/* -------------------- gameState -------------------- */
/* players[p] = {lp, hand[], deck[], mz[], sz[], field, grave[], banish[], ex[]}
   各ゾーンは "配置カード" の配列。カード＝{id(DB index), face:'up'|'down', pos:'atk'|'def'} */
let gameState = null;

function makePlayer(){
  return { lp:8000, hand:[], deck:[], mz:[], sz:[], field:null, grave:[], banish:[], ex:[] };
}
function newGame(){
  return { turn:1, phase:"main1", activePlayer:0, players:[makePlayer(), makePlayer()], log:[], chain:[] };
}

/* -------------------- applyAction --------------------
   全ての状態変化はここを通す。副作用は gameState と log のみ。 */
function applyAction(gs, a){
  const P = gs.players[a.player ?? gs.activePlayer];
  switch(a.type){

    case "SET_PHASE":
      gs.phase = a.phase;
      logIt(gs, `${nameOf(gs.activePlayer)}：${phaseJp(a.phase)}へ`);
      break;

    case "PASS_TURN":
      gs.activePlayer = gs.activePlayer === 0 ? 1 : 0;
      gs.turn += 1;
      gs.phase = "draw";
      logIt(gs, `<b>ターン ${gs.turn}</b> — ${nameOf(gs.activePlayer)}の手番`);
      break;

    case "LP":
      P.lp = Math.max(0, P.lp + a.delta);
      logIt(gs, `${nameOf(a.player)} LP ${a.delta>0?"+":""}${a.delta} → ${P.lp}`);
      break;

    case "DRAW": {
      const n = a.n ?? 1;
      for(let i=0;i<n;i++){ if(P.deck.length) P.hand.push(P.deck.shift()); }
      logIt(gs, `${nameOf(a.player)}：${n}枚ドロー`);
      break;
    }

    case "LOAD_DECK":
      P.deck = a.deck;            // [{id,face,pos}...]
      P.ex   = a.ex || [];
      logIt(gs, `${nameOf(a.player)}：デッキ ${a.deck.length}枚 / EX ${(a.ex||[]).length}枚 読込`);
      break;

    case "SHUFFLE":
      shuffle(P.deck);
      logIt(gs, `${nameOf(a.player)}：デッキシャッフル`);
      break;

    case "MOVE": {
      // from/to は "hand","mz","sz","field","grave","banish","deck","ex"
      const card = removeFrom(P, a.from, a.fromIndex);
      if(!card) break;
      if(a.face) card.face = a.face;
      if(a.pos)  card.pos  = a.pos;
      placeInto(P, a.to, card, a.deckPos);
      logIt(gs, `${nameOf(a.player)}：${cardName(card)} を ${zoneJp(a.from)}→${zoneJp(a.to)}${a.face==='down'?'（裏）':''}${a.pos==='def'?'（守備）':''}`);
      break;
    }

    case "FLIP": {
      const card = zoneCard(P, a.zone, a.index);
      if(card){ card.face = card.face==='up'?'down':'up'; logIt(gs, `${nameOf(a.player)}：${cardName(card)} を反転`); }
      break;
    }

    case "TOGGLE_POS": {
      const card = zoneCard(P, a.zone, a.index);
      if(card){ card.pos = card.pos==='atk'?'def':'atk'; logIt(gs, `${nameOf(a.player)}：${cardName(card)} 表示形式変更`); }
      break;
    }

    case "ATTACK": {
      // a: {player, atkIdx, target:'direct'|monsterIdx}
      const atkCard = P.mz[a.atkIdx];
      if(!atkCard){ break; }
      const atkDB = CARD_DB[atkCard.id]||{};
      const oppP = gs.players[a.player===0?1:0];
      const aATK = a.atkOverride!=null ? a.atkOverride : (atkDB.atk||0);
      if(a.target==='direct'){
        oppP.lp = Math.max(0, oppP.lp - aATK);
        logIt(gs, `<b>攻撃</b> ${cardName(atkCard)}(${aATK}) が直接攻撃 → ${nameOf(a.player===0?1:0)} に ${aATK} ダメージ（LP ${oppP.lp}）`);
      } else {
        const defCard = oppP.mz[a.target];
        if(!defCard){ break; }
        const defDB = CARD_DB[defCard.id]||{};
        const defending = defCard.pos==='def';
        const dVal = a.defOverride!=null ? a.defOverride : (defending ? (defDB.def||0) : (defDB.atk||0));
        let msg = `<b>戦闘</b> ${cardName(atkCard)}(攻${aATK}) vs ${cardName(defCard)}(${defending?'守':'攻'}${dVal})：`;
        if(defending){
          // 攻撃表示 vs 守備表示
          if(aATK > dVal){ oppP.mz.splice(a.target,1); oppP.grave.push(reset(defCard)); msg += `守備モンスター破壊`; }
          else if(aATK < dVal){ const dmg=dVal-aATK; P.lp=Math.max(0,P.lp-dmg); msg += `反射ダメージ ${dmg} → ${nameOf(a.player)}（LP ${P.lp}）`; }
          else { msg += `相打ちならず（貫通なし）`; }
        } else {
          // 攻撃表示同士
          if(aATK > dVal){ const dmg=aATK-dVal; oppP.mz.splice(a.target,1); oppP.grave.push(reset(defCard)); oppP.lp=Math.max(0,oppP.lp-dmg); msg += `相手モンスター破壊＋${dmg}ダメージ（LP ${oppP.lp}）`; }
          else if(aATK < dVal){ const dmg=dVal-aATK; const gi=P.mz.indexOf(atkCard); if(gi>=0){P.mz.splice(gi,1);P.grave.push(reset(atkCard));} P.lp=Math.max(0,P.lp-dmg); msg += `自分モンスター破壊＋${dmg}ダメージ（LP ${P.lp}）`; }
          else { const gi=P.mz.indexOf(atkCard); if(gi>=0){P.mz.splice(gi,1);P.grave.push(reset(atkCard));} oppP.mz.splice(a.target,1); oppP.grave.push(reset(defCard)); msg += `相打ち（両者破壊）`; }
        }
        logIt(gs, msg);
      }
      break;
    }

    /* ---- チェーン（手動） ---- */
    case "CHAIN_ADD": {
      // a: {player, from:'hand'|'mz'|'sz'|'field', index, ss}
      gs.chain.push({ player:a.player, cardId:a.cardId, name:a.name, ss:a.ss, from:a.from, index:a.index });
      logIt(gs, `チェーン${gs.chain.length}：${nameOf(a.player)} が ${a.name}（SS${a.ss}）を発動`);
      break;
    }
    case "CHAIN_RESOLVE_TOP": {
      // 逆順解決：末尾（最後に積んだ＝一番上）から1つ処理して取り除く
      if(!gs.chain.length) break;
      const link = gs.chain.pop();
      logIt(gs, `解決：チェーン${gs.chain.length+1} ${link.name}（効果は手動で処理してください）`);
      break;
    }
    case "CHAIN_CLEAR": {
      gs.chain = [];
      logIt(gs, `チェーンをクリア`);
      break;
    }

    case "RESET":
      Object.assign(gs, newGame());
      logIt(gs, "盤面をリセット");
      break;
  }
  return gs;
}

/* -------------------- ゾーン操作ヘルパ -------------------- */
function removeFrom(P, zone, idx){
  if(zone==="field"){ const c=P.field; P.field=null; return c; }
  const arr = P[zone]; if(!arr) return null;
  return arr.splice(idx,1)[0];
}
function placeInto(P, zone, card, deckPos){
  if(zone==="field"){ P.field = card; return; }
  const arr = P[zone];
  if(zone==="deck"){
    if(deckPos==="bottom") arr.push(card); else arr.unshift(card);
    return;
  }
  arr.push(card);
}
function zoneCard(P, zone, idx){ return zone==="field" ? P.field : P[zone]?.[idx]; }
/* 墓地・除外へ送る際にカードの表示状態を正規化 */
function reset(card){ return { id:card.id, face:'up', pos:'atk' }; }

/* -------------------- ログ / 名前 -------------------- */
function logIt(gs, msg){ gs.log.unshift({t:Date.now(), msg}); if(gs.log.length>60) gs.log.pop(); }
function nameOf(p){ return PNAME[p]; }
function phaseJp(id){ return (PHASES.find(x=>x.id===id)||{}).jp || id; }
function zoneJp(z){ return {hand:"手札",mz:"モンスター",sz:"魔法罠",field:"フィールド",grave:"墓地",banish:"除外",deck:"デッキ",ex:"EX"}[z]||z; }
function cardName(card){ return CARD_DB[card.id]?.n || "カード"; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

/* =========================================================================
   RENDER — gameState を読んで描画するだけ
   ========================================================================= */
function render(){
  const gs = gameState;
  const view = gs.activePlayer;          // 手番プレイヤー視点
  const opp  = view===0?1:0;
  const P = gs.players[view];
  const curIdx = PHASES.findIndex(x=>x.id===gs.phase);
  const chN = gs.chain.length;

  document.getElementById("turnFlag").innerHTML =
    `T${gs.turn} · <b>${nameOf(view)}</b>`;

  /* ===== guide strip：今のフェーズ＋できること ===== */
  document.getElementById("guide").innerHTML = guideHTML(gs, view, curIdx, chN);

  /* ===== board：相手を上、手番を下 ===== */
  document.getElementById("board").innerHTML =
    sideHTML(opp, true) + sideHTML(view, false);

  /* ===== hand（手番のみ表向き） ===== */
  document.getElementById("handWho").textContent = `${nameOf(view)} の手札`;
  document.getElementById("handCnt").textContent = `${P.hand.length}枚 / 山${P.deck.length}`;
  document.getElementById("hand").innerHTML = P.hand.map((c,i)=>
    cardHTML(c, "hcard", `openHand(${i})`, true)
  ).join("") || `<div style="color:var(--text-dim);font-size:11px;padding:8px">手札なし — 右上「≡」→デッキ読込で開始</div>`;

  /* ===== このターンにやったこと ===== */
  const tl = document.getElementById("turnlog");
  tl.innerHTML = `<span class="tl-lab">このターン</span>` +
    (turnActions.length
      ? turnActions.slice(-12).map(c=>`<span class="tl-chip">${c}</span>`).join("")
      : `<span class="tl-empty">まだ操作なし</span>`);

  /* ===== full log ===== */
  document.getElementById("log").innerHTML = gs.log.map(l=>`<div class="li">${l.msg}</div>`).join("");

  /* ===== 下部ドック ===== */
  renderDock(gs, curIdx, chN);
}

/* ---- guide strip HTML ---- */
function guideHTML(gs, view, curIdx, chN){
  const P = gs.players[view];
  const loaded = P.deck.length>0 || P.hand.length>0;
  const phase = gs.phase;
  const cans = [];
  const canNormal = (phase==="main1"||phase==="main2");
  if(!loaded){
    cans.push(`<span class="g-can">右上「≡」→デッキ読込</span>`);
  } else {
    if(phase==="draw")    cans.push(`<span class="g-can">ドロー可</span>`);
    if(canNormal){
      cans.push(`<span class="g-can">通常召喚/セット</span>`);
      cans.push(`<span class="g-can">魔法罠 発動/セット</span>`);
    }
    if(phase==="battle"){
      const canAtk = P.mz.some(c=>c && c.face==='up' && c.pos==='atk');
      cans.push(`<span class="g-can ${canAtk?'':'mute'}">攻撃宣言${canAtk?'':'（表側攻撃なし）'}</span>`);
    }
    if(phase==="end") cans.push(`<span class="g-can">手札7枚調整→ターン終了</span>`);
    cans.push(`<span class="g-can mute">効果発動</span>`);
  }
  const chainWarn = chN
    ? `<span class="g-chainwarn">チェーン ${chN} 解決待ち</span>` : "";
  return `<span class="g-phase">${phaseJp(phase)}</span>${cans.join("")}${chainWarn}`;
}

/* ---- 下部ドック HTML ---- */
function renderDock(gs, curIdx, chN){
  const atEnd = gs.phase==="end";
  const nextPh = curIdx < PHASES.length-1 ? PHASES[curIdx+1].jp : null;
  const prevDisabled = curIdx<=0;

  // 上段：フェーズ戻る / 現在 / 進む
  const phaseRow = `
    <button class="d-prev" onclick="doPhasePrev()" ${prevDisabled?'disabled':''}>◂ 戻</button>
    <div class="d-phase-cur">
      <span class="cur">${phaseJp(gs.phase)}</span>
      ${nextPh?`<span class="nxt">次 → ${nextPh}</span>`:`<span class="nxt">ターンを渡す</span>`}
    </div>
    ${atEnd
      ? `<button class="d-next endturn" onclick="doPass()">ターン終了 ⇄</button>`
      : `<button class="d-next primary" onclick="doPhaseNext()">次へ ▸</button>`}`;

  // 下段：頻用アクション（ドロー / 召喚→手札を開く導線 / チェーン / 1つ戻す）
  const canUndo = HISTORY.length>0;
  const actRow = `
    <button class="d-act gold" onclick="doDraw()">ドロー</button>
    <button class="d-act" onclick="focusHandHint()">手札</button>
    <button class="d-act" onclick="openChain()">チェーン${chN?`<span class="kb">${chN}</span>`:""}</button>
    <button class="d-act undo" onclick="undo()" ${canUndo?'':'disabled'}>↺ 戻す</button>`;

  document.getElementById("dockPhase").innerHTML = phaseRow;
  document.getElementById("dockActions").innerHTML = actRow;
}

function sideHTML(p, isOpp){
  const gs = gameState;
  const P  = gs.players[p];
  const isActive = gs.activePlayer===p;
  const lpLow = P.lp<=2000;
  return `
  <section class="side ${isOpp?'opp':''} ${isActive?'active-side':''}">
    <div class="side-head">
      <span class="side-name">${nameOf(p)}</span>
      <span class="side-tag">${isOpp?'相手':'手番'}</span>
      <div class="lp-box">
        <button class="lp-btn" onclick="lpAdj(${p},-500)">−</button>
        <button class="lp-val ${lpLow?'low':''}" onclick="openLP(${p})">${P.lp}</button>
        <button class="lp-btn" onclick="lpAdj(${p},500)">＋</button>
      </div>
    </div>
    <div class="zones">
      ${ isOpp
        ? zoneRowHTML(p,"魔法罠","sz",5,isOpp) + zoneRowHTML(p,"モンスター","mz",5,isOpp)
        : zoneRowHTML(p,"モンスター","mz",5,isOpp) + zoneRowHTML(p,"魔法罠","sz",5,isOpp) }
      <div class="zrow">
        <div class="lab">場外</div>
        <div class="slots line5">
          ${pileSlot(p,"field","フィールド",isOpp)}
          ${pileSlot(p,"grave","墓地",isOpp)}
          ${pileSlot(p,"banish","除外",isOpp)}
          ${pileSlot(p,"deck","デッキ",isOpp)}
          ${pileSlot(p,"ex","EX",isOpp)}
        </div>
      </div>
    </div>
  </section>`;
}

function zoneRowHTML(p, label, zone, count, isOpp){
  const P = gameState.players[p];
  let cells = "";
  for(let i=0;i<count;i++){
    const c = P[zone][i];
    cells += c
      ? `<div class="slot">${cardHTML(c,"", `openZone(${p},'${zone}',${i})`, !isOpp || c.face==='up')}</div>`
      : `<div class="slot"><span class="ph">${label}</span></div>`;
  }
  return `<div class="zrow"><div class="lab">${label}</div><div class="slots ${zone}">${cells}</div></div>`;
}
function pileSlot(p, zone, label, isOpp){
  const P = gameState.players[p];
  if(zone==="field"){
    const c=P.field;
    return `<div class="pile"><div class="slot field">${ c ? cardHTML(c,"",`openZone(${p},'field',0)`, !isOpp||c.face==='up') : `<span class="ph">${label}</span>`}</div><span class="pile-lab">${label}</span></div>`;
  }
  const n = P[zone].length;
  const top = P[zone][n-1];

/* =========================================================================
   UI アクション → applyAction → render のラッパ
   ========================================================================= */
/* ---- Undo（複数段階）＆ このターンにやったこと ---- */
const HISTORY = [];              // 直前スナップショットのスタック
const HISTORY_MAX = 40;
let turnActions = [];            // このターンの短い履歴チップ

/* SET_PHASE / PASS_TURN / SHUFFLE / LOAD_DECK はチップに出さない（ノイズ削減） */
const CHIP_SKIP = new Set(["SET_PHASE","PASS_TURN","SHUFFLE","LOAD_DECK","CHAIN_CLEAR"]);

function snapshot(){
  // 構造が単純なので JSON でディープコピー（DBは別なので安全）
  HISTORY.push(JSON.stringify(gameState));
  if(HISTORY.length>HISTORY_MAX) HISTORY.shift();
}
function act(a){
  snapshot();
  const beforeTurn = gameState.turn;
  applyAction(gameState, a);
  // ターンが変わったらチップ履歴をリセット
  if(gameState.turn !== beforeTurn) turnActions = [];
  const chip = chipFor(a);
  if(chip) turnActions.push(chip);
  render();
}
function undo(){
  if(!HISTORY.length) return;
  gameState = JSON.parse(HISTORY.pop());
  // チップは厳密復元が難しいので直近1つを削るだけ（実用上これで十分）
  turnActions.pop();
  render();
}
/* action を短い日本語チップに変換（このターンにやったこと用） */
function chipFor(a){
  if(CHIP_SKIP.has(a.type)) return null;
  const P = gameState.players[a.player ?? gameState.activePlayer];
  const nm = (c)=> c ? (CARD_DB[c.id]?.n || "カード") : "カード";
  switch(a.type){
    case "DRAW": return `ドロー${(a.n??1)>1?`×${a.n}`:""}`;
    case "LP":   return `LP${a.delta>0?"+":""}${a.delta}`;
    case "MOVE": {
      const to = a.to;
      const label = {mz:"召喚/特殊",sz:"魔法罠",field:"フィールド",grave:"墓地",banish:"除外",hand:"手札戻し",deck:"デッキ戻し",ex:"EX"}[to]||to;
      const faceTag = a.face==='down' ? "セット" : label;
      return faceTag;
    }
    case "FLIP": return "反転";
    case "TOGGLE_POS": return "表示形式変更";
    case "ATTACK": return a.target==='direct' ? "直接攻撃" : "攻撃宣言";
    case "CHAIN_ADD": return `${a.name}発動`;
    case "CHAIN_RESOLVE_TOP": return "チェーン解決";
    default: return null;
  }
}

function doPhase(id){ act({type:"SET_PHASE", phase:id}); }
function doPhaseNext(){
  const i = PHASES.findIndex(x=>x.id===gameState.phase);
  if(i < PHASES.length-1) act({type:"SET_PHASE", phase:PHASES[i+1].id});
}
function doPhasePrev(){
  const i = PHASES.findIndex(x=>x.id===gameState.phase);
  if(i > 0) act({type:"SET_PHASE", phase:PHASES[i-1].id});
}
function doPass(){ act({type:"PASS_TURN"}); }
function doDraw(){ act({type:"DRAW", n:1}); }
function doShuffle(){ act({type:"SHUFFLE"}); }
function doLP(d){ act({type:"LP", player:gameState.activePlayer, delta:d}); }
function lpAdj(p,d){ act({type:"LP", player:p, delta:d}); }

/* ================= ライフ計算機 =================
   LP値をタップして開く。数値入力＋よく使う値、半分/倍（1103は「LPを半分払って」が多い）。 */
let LP_TARGET = 0;
let LP_INPUT  = "";
function openLP(p){
  LP_TARGET = p; LP_INPUT = "";
  renderLP();
}
function renderLP(){
  const p = LP_TARGET;
  const P = gameState.players[p];
  const cur = P.lp;
  const val = parseInt(LP_INPUT||"0",10);
  const after刻 = (d)=> Math.max(0, cur + d);
  const keys = ["7","8","9","4","5","6","1","2","3","00","0","←"];
  const keyHTML = keys.map(k=>
    `<button class="lp-key" onclick="lpKey('${k}')">${k}</button>`
  ).join("");
  const quick = [100,200,300,500,800,1000,1500,2000,2500,3000]
    .map(n=>`<button class="lp-quick" onclick="lpSet(${n})">${n}</button>`).join("");

  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:4px">${nameOf(p)} のライフ</h3>
    <div class="lp-now">現在 <b>${cur}</b>${LP_INPUT?` → <span class="lp-prev">${after刻(-val)}</span> / <span class="lp-prev up">${after刻(val)}</span>`:""}</div>

    <div class="lp-display">${LP_INPUT||"0"}</div>

    <div class="lp-quickrow">${quick}</div>

    <div class="lp-pad">${keyHTML}</div>

    <div class="lp-ops">
      <button class="lp-op dmg" onclick="lpApply(-1)">− ダメージ</button>
      <button class="lp-op heal" onclick="lpApply(1)">＋ 回復</button>
    </div>
    <div class="act-label">よく使う</div>
    <div class="act-grid">
      <div class="act" onclick="lpHalf()">LPを半分にする</div>
      <div class="act" onclick="lpSetExact()">この値ちょうどにする</div>
    </div>
    <button class="close" onclick="closeSheet()">閉じる</button>`;
  veil.classList.add("on");
}
function lpKey(k){
  if(k==="←"){ LP_INPUT = LP_INPUT.slice(0,-1); }
  else if(LP_INPUT.length < 5){ LP_INPUT = (LP_INPUT==="0"?"":LP_INPUT) + k; }
  renderLP();
}
function lpSet(n){ LP_INPUT = String(n); renderLP(); }
function lpApply(sign){
  const v = parseInt(LP_INPUT||"0",10);
  if(!v){ showToast("数値を入力してください"); return; }
  act({type:"LP", player:LP_TARGET, delta: sign*v});
  LP_INPUT = "";
  closeSheet();
}
function lpHalf(){
  const P = gameState.players[LP_TARGET];
  const half = Math.floor(P.lp/2);      // 端数切り捨て（払う側）
  act({type:"LP", player:LP_TARGET, delta: -(P.lp-half)});
  closeSheet();
}
function lpSetExact(){
  const v = parseInt(LP_INPUT||"",10);
  if(isNaN(v)){ showToast("数値を入力してください"); return; }
  const P = gameState.players[LP_TARGET];
  act({type:"LP", player:LP_TARGET, delta: v - P.lp});
  LP_INPUT = "";
  closeSheet();
}

/* ================= チェーン（手動・スペルスピード判定） ================= */
/* SS判定：カウンター罠=3、速攻魔法/通常罠/永続罠=2、それ以外(通常/永続/装備/フィールド魔法・モンスター効果)=1 */
function spellSpeed(db){
  if(db.k==='t'){ return db.sub==='カウンター' ? 3 : 2; }      // 罠は最低SS2、カウンターはSS3
  if(db.k==='s'){ return db.sub==='速攻' ? 2 : 1; }            // 速攻魔法のみSS2
  return 1;                                                     // モンスター効果は簡易的にSS1扱い
}
/* チェーンに新しく積めるか：既存の一番上のSS以上でなければ乗せられない */
function canChainOnto(ss){
  if(!gameState.chain.length) return true;
  const top = gameState.chain[gameState.chain.length-1];
  return ss >= top.ss;
}
function chainAddFromZone(p, zone, idx){
  const c = zoneCard(gameState.players[p], zone, idx);
  const db = CARD_DB[c.id]||{};
  const ss = spellSpeed(db);
  if(!canChainOnto(ss)){
    alert(`スペルスピードが足りません（このカードSS${ss} / 現在チェーン上はSS${gameState.chain[gameState.chain.length-1].ss}）`);
    return;
  }
  // 表側でなければ発動時に表にする（セット→発動）
  if(c.face==='down'){ c.face='up'; }
  act({type:"CHAIN_ADD", player:p, cardId:c.id, name:db.n, ss, from:zone, index:idx});
  closeSheet();
  openChain();
}
function chainAddFromHand(i){
  const p = gameState.activePlayer;
  const c = gameState.players[p].hand[i];
  const db = CARD_DB[c.id]||{};
  const ss = spellSpeed(db);
  if(!canChainOnto(ss)){

    return;
  }
  act({type:"CHAIN_ADD", player:p, cardId:c.id, name:db.n, ss, from:"hand", index:i});

}
/* チェーンパネル：積んだ順を見せ、逆順に1つずつ解決。
   次に解決するリンク（＝一番上＝末尾）を強調し、次のアクションを明示する。 */
function openChain(){
  const ch = gameState.chain;
  if(!ch.length){
    sheet.innerHTML = `<div class="grip"></div><h3>チェーン</h3>
      <div class="act-label">チェーンは積まれていません</div>
      <div class="meta" style="margin-bottom:12px">場・手札のカードの「効果を発動（チェーンへ）」で積みます。<br>速攻魔法・罠は相手ターンでも積めます（スペルスピード判定あり）。</div>
      <button class="close" onclick="closeSheet()">閉じる</button>`;
    veil.classList.add("on"); return;
  }
  const topIdx = ch.length-1;              // 次に解決するリンク
  const topLink = ch[topIdx];

  // チェーン1が下、最後に積んだリンクが上。次に解決するもの＝上を resolving 表示。
  let rows = "";
  for(let i=ch.length-1;i>=0;i--){
    const link = ch[i];
    const resolving = i===topIdx;
    const order = resolving ? "次に解決" : `${topIdx-i+1}番目に解決`;
    rows += `<div class="chain-link ${resolving?'resolving':''}">
      <span class="cl-no">${i+1}</span>
      <span class="cl-nm">${link.name}</span>
      <span class="cl-ss">SS${link.ss}</span>
      <span class="cl-who">${nameOf(link.player)}</span>
      <span class="cl-tag">${order}</span>
    </div>`;
  }

  const nextHint = `<div class="chain-next-hint">▶ 次に解決：チェーン${topIdx+1}「${topLink.name}」<br><span style="font-size:10px;color:var(--text-dim);font-weight:400">効果は手動で処理してから下のボタンで解決</span></div>`;

  sheet.innerHTML = `<div class="grip"></div>
    <h3 style="margin-bottom:8px">チェーン処理（${ch.length}）</h3>
    <div class="meta" style="margin-bottom:8px">チェーン1が最初に積まれた効果。解決は<b style="color:var(--gold-hi)">上（最後）から逆順</b>に1つずつ。</div>
    <div class="chain-list">${rows}</div>
    ${nextHint}
    <div class="act-grid wide">
      <div class="act" style="background:var(--spell);color:#0d0a06;border-color:var(--spell)" onclick="resolveChainStep()">チェーン${topIdx+1}「${topLink.name}」を解決 ▸</div>
    </div>
    <div class="act-label">その他</div>
    <div class="act-grid">
      <div class="act" onclick="closeSheet()">保留（閉じる）</div>
      <div class="act warn" onclick="if(confirm('チェーンを全て取り消します')){act({type:'CHAIN_CLEAR'});closeSheet();}">全て取消</div>
    </div>`;
  veil.classList.add("on");
}
/* 1つ解決して、残りがあれば次の解決画面を続けて出す（テンポ重視） */
function resolveChainStep(){
  act({type:'CHAIN_RESOLVE_TOP'});
  if(gameState.chain.length){ openChain(); }   // 続けて次を解決
  else { closeSheet(); }                        // 全解決したら閉じる
}

/* index.html(1103デッキビルダー) と同じ localStorage を読む。
   保存形式: key "deck1103:<名前>" → {name, cards:[{n,q}], side:[{n,q}], date}
   編集中デッキ: key "work1103:current" → 同形式 */
const DECK_PREFIX = 'deck1103:';
const WORK_KEY    = 'work1103:current';
function LS(){ try{ return window.localStorage; }catch(e){ return null; } }

function listSavedDecks(){
  const out=[]; const ls=LS(); if(!ls) return out;
  try{
    for(let i=0;i<ls.length;i++){
      const k=ls.key(i);
      if(k && k.indexOf(DECK_PREFIX)===0){
        try{ const d=JSON.parse(ls.getItem(k)); if(d && d.cards) out.push(d); }catch(e){}
      }
    }
  }catch(e){}
  out.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  return out;
}
function getWorkDeck(){
  const ls=LS(); if(!ls) return null;
  try{
    const raw=ls.getItem(WORK_KEY); if(!raw) return null;
    const d=JSON.parse(raw);
    if(d && d.cards && d.cards.length) return d;
  }catch(e){}
  return null;
}
/* {cards:[{n,q}]} → 山札配列。保存デッキは既に1103上限が適用済みなのでそのまま採用 */
function cardsToDeck(cards){
  const main=[], ex=[], miss=[];
  (cards||[]).forEach(e=>{
    const idx = findCardIndex(e.n);
    if(idx<0){ miss.push(e.n); return; }
    const q = e.q||1;
    for(let i=0;i<q;i++){
      const card={id:idx, face:"down", pos:"atk"};
      if(CARD_DB[idx].ex) ex.push(card); else main.push(card);
    }
  });
  return {main, ex, side:[], miss, violations:[]};
}

/* 1103環境での同名カード上限（0/1/2/3枚）
   carddata.json の各カードが持つ lm キーを使う（lm:0=禁止,1=制限,2=準制限,無指定=無制限）。
   これによりカード名リストの手管理は不要。 */
function deckLimit(name){
  const c = CARD_DB.find(x=>x.n===name);
  if(c && typeof c.lm === "number") return c.lm;
  return 3;
}
function limitLabel(lim){ return lim===0?"禁止":lim===1?"制限":lim===2?"準制限":""; }

/* デッキテキスト解析
   index.html の書き出し形式に対応:
     # デッキ名
     ■メインデッキ (40)
     [モンスター]
     サイバー・ドラゴン x3
     ■エクストラ (15)
     ■サイド (15)
   加えて素朴な「カード名 x3」だけの羅列にも対応。
   セクション見出し・装飾行はスキップし、■サイド以降はサイドとして分離する。 */

/* 1行を {name, qty} に。カード行でなければ null */
function parseDeckLine(line){
  let s = line.trim();
  if(!s) return null;
  // コメント/見出し/セクション行を除外
  if(/^#/.test(s)) return null;                    // # デッキ名
  if(/^[■◆●▲【]/.test(s)) return null;             // ■メインデッキ (40)
  if(/^\[.*\]$/.test(s)) return null;              // [モンスター]
  if(/^-{2,}$/.test(s)) return null;               // 区切り線
  if(/^(メインデッキ|エクストラ|サイド|main|extra|side)\b/i.test(s)) return null;
  // 先頭の箇条書き記号を除去
  s = s.replace(/^[・\-*\u2022]\s*/, '');
  // 「3x カード名」形式
  let m = s.match(/^(\d+)\s*[x×✕*]\s*(.+)$/i);
  if(m) return { name: m[2].trim(), qty: parseInt(m[1],10) };
  // 「カード名 x3」「カード名 ×3」「カード名 3」形式
  m = s.match(/^(.*?)\s*(?:[x×✕*]\s*(\d+)|\s(\d+))\s*$/i);
  if(m && (m[2]||m[3])){
    const nm = (m[1]||"").trim();
    if(nm) return { name: nm, qty: parseInt(m[2]||m[3],10) };
  }
  // 枚数指定なし = 1枚
  return { name: s, qty: 1 };
}

/* テキスト → {main, ex, side, miss, violations}
   enforceLimit=false なら1103上限を無視して指定枚数で採用 */
function parseDeckText(text, enforceLimit){
  if(enforceLimit === undefined) enforceLimit = true;
  const main=[], ex=[], side=[], miss=[];
  const counts={}; const violations=[];
  let inSide = false;

  text.split(/\r?\n/).forEach(raw=>{
    const t = raw.trim();
    // セクション切り替えを検出（■サイド 以降はサイドデッキ）
    if(/^[■◆●【]?\s*サイド/.test(t) || /^\[?\s*side\b/i.test(t)){ inSide = true; return; }
    if(/^[■◆●【]?\s*(メイン|main)/i.test(t)){ inSide = false; return; }
    if(/^[■◆●【]?\s*(エクストラ|extra|EX)/i.test(t)){ inSide = false; return; }

    const parsed = parseDeckLine(raw);
    if(!parsed) return;
    const idx = findCardIndex(parsed.name);
    if(idx < 0){ miss.push(parsed.name); return; }

    if(inSide){
      // サイドはメインに混ぜない（1人回しでは未使用だが枚数だけ保持）
      for(let i=0;i<parsed.qty;i++) side.push({id:idx, face:"down", pos:"atk"});
      return;
    }
    let take = parsed.qty;
    if(enforceLimit){
      const lim = deckLimit(parsed.name);
      const already = counts[parsed.name]||0;
      take = Math.max(0, Math.min(parsed.qty, lim - already));
      if(take < parsed.qty) violations.push({name:parsed.name, requested:parsed.qty+already, limit:lim});
      counts[parsed.name] = already + take;
    }
    for(let i=0;i<take;i++){
      const card = {id:idx, face:"down", pos:"atk"};
      if(CARD_DB[idx].ex) ex.push(card); else main.push(card);
    }
  });
  return {main, ex, side, miss, violations};
}

/* カード名の照合。完全一致 → 正規化一致 の順で探す。
   全角/半角、長音・ハイフン類、空白の揺れを吸収する。 */
let NAME_INDEX = null;
function normName(s){
  return String(s)
    .replace(/[\u30fc\u2010-\u2015\u2212\uff0d\-]/g,'ー')  // 各種ハイフン→長音
    .replace(/[\s\u3000]/g,'')                             // 空白除去
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)) // 全角英数→半角
    .toLowerCase();
}
function buildNameIndex(){
  NAME_INDEX = new Map();
  CARD_DB.forEach((c,i)=>{
    if(!c || !c.n) return;
    if(!NAME_INDEX.has(c.n)) NAME_INDEX.set(c.n, i);
    const k = normName(c.n);
    if(!NAME_INDEX.has(k)) NAME_INDEX.set(k, i);
  });
}
function findCardIndex(name){
  if(!NAME_INDEX) buildNameIndex();
  if(NAME_INDEX.has(name)) return NAME_INDEX.get(name);
  const k = normName(name);
  if(NAME_INDEX.has(k)) return NAME_INDEX.get(k);
  return -1;
}
function loadDeck(p, autostart){
  const text = document.getElementById("deckText").value;
  const parsed = parseDeckText(text);

  // 1103 枚数超過があれば、確認モーダルを挟む（強制カット or 無視して全枚数）
  if(parsed.violations.length){
    const lines = parsed.violations.map(v=>
      `・${v.name}（${limitLabel(v.limit)}／上限${v.limit}枚）: 指定${v.requested}枚`
    ).join("<br>");
    sheet.innerHTML = `
      <h3>1103 枚数チェック</h3>
      <div class="meta">以下は1103環境の上限を超えています。</div>
      <div class="eff">${lines}</div>
      <div class="act-grid">
        <div class="act" onclick="finishLoad(${p},${autostart},true)">上限までに切って読込</div>
        <div class="act warn" onclick="finishLoad(${p},${autostart},false)">無視して指定枚数で読込</div>
      </div>
      <button class="close" onclick="openDeckLoad()">戻る</button>`;
    veil.classList.add("on");
    PENDING_DECK = {p, text};
    return;
  }
  applyLoad(p, parsed, autostart);
}

let PENDING_DECK = null;
function finishLoad(p, autostart, enforce){
  const {text} = PENDING_DECK;
  const parsed = parseDeckText(text, enforce);
  applyLoad(p, parsed, autostart);
}
function applyLoad(p, parsed, autostart){
  const {main, ex, miss} = parsed;
  if(!main.length && !ex.length){
    // 何も読めなかった理由を具体的に伝える
    const why = miss.length
      ? `カード名が ${CARD_DB.length}種のデータベースと一致しませんでした。\n\n例：\n・${[...new Set(miss)].slice(0,5).join("\n・")}`
      : `カード行が見つかりませんでした。「カード名 x3」の形式で入力してください。`;
    sheet.innerHTML = `<div class="grip"></div>
      <h3 style="margin-bottom:8px">読み込めませんでした</h3>
      <div class="eff">${why.replace(/\n/g,"<br>")}</div>
      <div class="meta" style="margin-bottom:10px">index.html の「テキスト」タブからコピーした内容をそのまま貼り付けられます。</div>
      <button class="close" onclick="openDeckLoad()">戻る</button>`;
    veil.classList.add("on");
    return;
  }
  act({type:"LOAD_DECK", player:p, deck:main, ex});
  if(autostart){
    act({type:"SHUFFLE", player:p});
    act({type:"DRAW", player:p, n:5});
  }
  closeSheet();
  const missN = [...new Set(miss)].length;
  showToast(`メイン${main.length}枚 / EX${ex.length}枚 読込${missN?`（未一致${missN}種）`:""}`);
  if(missN){
    setTimeout(()=>{
      sheet.innerHTML = `<div class="grip"></div>
        <h3 style="margin-bottom:8px">読み込みました</h3>
        <div class="meta" style="margin-bottom:8px">メイン${main.length}枚 / EX${ex.length}枚。<br>次の${missN}種はカードデータに見つからず、除外しました。</div>
        <div class="eff">・${[...new Set(miss)].join("<br>・")}</div>
        <button class="close" onclick="closeSheet()">閉じる</button>`;
      veil.classList.add("on");
    }, 60);
  }
}

/* 軽量トースト */
function showToast(msg){
  let t = document.getElementById("toast");
  if(!t){
    t = document.createElement("div");
    t.id = "toast"; t.className = "toast";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove("on"), 2200);
}

/* =========================================================================
   起動
   ========================================================================= */
/* カードデータは姉妹アプリ index.html の <script id="carddata"> から読み込む。
   失敗時は carddata.json を試し、それも駄目ならダミーDBで継続する。
   どのソースで動いているかは起動ログとメニューで確認できる。 */
let DB_SOURCE = "dummy";
function extractCarddata(txt){
  const doc = new DOMParser().parseFromString(txt, 'text/html');
  const el = doc.getElementById('carddata');
  if(!el) return null;
  const raw = (el.textContent||"").trim();
  if(!raw) return null;
  const data = JSON.parse(raw);
  return (Array.isArray(data) && data.length) ? data : null;
}
async function loadCardDataFromIndex(){
  const res = await fetch('index.html', {cache:'no-cache'});
  if(!res.ok) throw new Error('index.html HTTP '+res.status);
  const data = extractCarddata(await res.text());
  if(!data) throw new Error('index.html に carddata が見つかりません');
  return data;
}
async function loadCardDataFromJson(){
  const res = await fetch('carddata.json', {cache:'no-cache'});
  if(!res.ok) throw new Error('carddata.json HTTP '+res.status);
  const data = await res.json();
  if(!Array.isArray(data) || !data.length) throw new Error('carddata.json が空です');
  return data;
}
async function boot(){
  const errors = [];
  try{
    // carddata.json を優先（index.html は現在この外部ファイルを読む構成）
    CARD_DB = await loadCardDataFromJson(); DB_SOURCE = "carddata.json";
  }catch(e1){
    errors.push('carddata.json: '+e1.message);
    try{
      // 旧構成（index.html に carddata が埋め込まれている）にも対応
      CARD_DB = await loadCardDataFromIndex(); DB_SOURCE = "index.html";
    }catch(e2){
      errors.push('index.html: '+e2.message);
      CARD_DB = DUMMY_DB.slice(); DB_SOURCE = "dummy";
    }
  }
  NAME_INDEX = null;                 // 名前索引を再構築させる
  gameState = newGame();
  turnActions = [];
  if(DB_SOURCE === "dummy"){
    logIt(gameState, `<b>注意</b> カードデータを読めませんでした（お試し用10種で動作中）`);
    errors.forEach(m=>logIt(gameState, `　${m}`));
  }else{
    logIt(gameState, `<b>決闘開始</b> — ${CARD_DB.length}種読込（${DB_SOURCE}）。デッキを読み込んでください`);
  }
  render();
  if(DB_SOURCE === "dummy"){
    setTimeout(()=>{
      sheet.innerHTML = `<div class="grip"></div>
        <h3 style="margin-bottom:8px">カードデータを読み込めませんでした</h3>
        <div class="meta" style="margin-bottom:8px">
          今はお試し用の10種だけで動いています。この状態ではデッキがほとんど読み込めません。</div>
        <div class="eff">${errors.join('<br>')}</div>
        <div class="meta" style="margin-top:8px">
          battle.html は同じフォルダの <b>index.html</b>（または carddata.json）からカードを読みます。<br><br>
          ・GitHub Pages など<b>サーバー経由</b>で開いてください<br>
          ・ファイルを直接開く（file://）と読み込めません<br>
          ・index.html と同じ場所に置いてください</div>
        <button class="close" onclick="closeSheet()">閉じる</button>`;
      veil.classList.add("on");
    }, 300);
  }
}
boot();
</script>
</body>
</html>
